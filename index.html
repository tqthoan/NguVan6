        .grammar-verb-main { color: #facc15 !important; font-weight: 700 !important; }
        .grammar-verb-be { color: #facc15 !important; font-weight: 700 !important; }

        .grammar-verb-modal { color: #d8b4fe !important; font-weight: 700 !important; }

        .grammar-phrase { color: #cbd5e1 !important; font-weight: 500 !important; }

            background-color: rgba(45, 212, 191, 0.15) !important;
            padding: 2px 4px !important;
            border-radius: 4px !important;
        }

        .text-vi-note { color: #a78bfa; }

        .stress-mark {
            color: inherit !important;

            padding-bottom: 2px !important;
        }
        .unstressed { opacity: 0.8; font-weight: inherit; }

        .tutor-box {
            background: rgba(15, 15, 30, 0.85);
            backdrop-filter: blur(20px);
            border-left: 4px solid #00E5FF;
            border-right: 1px solid rgba(0, 229, 255, 0.2);
            border-top: 1px solid rgba(0, 229, 255, 0.2);
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
            padding: 1rem 1.5rem;
            border-radius: 0 1.5rem 1.5rem 0;
            box-shadow: 10px 10px 30px rgba(0, 0, 0, 0.5);
            text-align: left;
            line-height: 1.6;
        }
        .tutor-title {
            color: #00E5FF;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
        }

        .tutor-text { line-height: 2.4 !important; }
        .tutor-text span[class^="grammar-"], .tutor-text span.highlight-signal-word {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.05)) !important;
            padding: 4px 10px !important;
            border-radius: 8px !important;
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            margin: 0 4px !important;
            box-shadow: 0 2px 6px rgba(0,0,0,0.25) !important;
            display: inline-block !important;
            white-space: nowrap !important;
        }

        .hypnotic-bg {
            background: radial-gradient(circle at center, #1A1A2E 0%, #0A0A12 100%);
            height: 100vh; width: 100vw; position: absolute; z-index: -1;
        }

        .diamond-container { width: 90px; height: 75px; filter: drop-shadow(0 0 25px rgba(0, 229, 255, 0.4)); }
        .diamond-3d { width: 100%; height: 100%; animation: float-diamond 4s ease-in-out infinite; }
        @keyframes float-diamond { 0%, 100% { transform: translateY(0) rotateX(10deg); } 50% { transform: translateY(-10px) rotateX(-5deg); } }

        .word-glow { text-shadow: 0 0 15px #00E5FF; }
        .timer-bar { transition: width 0.1s linear; }

        .glass-panel {
            background: rgba(10, 10, 20, 0.98);
            backdrop-filter: blur(35px);
            border: 1px solid rgba(167, 139, 250, 0.1);
        }

        .home-btn-fixed {
            position: fixed; top: 1rem; left: 1.5rem; z-index: 5000;
            color: #4b5563; background: rgba(255, 255, 255, 0.05);
            width: 48px; height: 48px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .home-btn-fixed:hover { color: #00E5FF; transform: scale(1.1); background: rgba(0, 229, 255, 0.1); border-color: #00E5FF; }

        #cortex-btn {
            opacity: 0.1;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.3);
            transition: all 1s ease-in-out;
        }
        .btn-stage-1 { opacity: 0.6 !important; background: #1e3a8a !important; color: #93c5fd !important; border-color: #3b82f6 !important; }
        .btn-stage-2 { opacity: 0.8 !important; background: #701a75 !important; color: #f5d0fe !important; border-color: #d946ef !important; }
        .btn-stage-3-neuron { opacity: 1 !important; background: #00E5FF !important; color: #000 !important; box-shadow: 0 0 30px rgba(0, 229, 255, 0.6) !important; font-weight: 800 !important; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(167, 139, 250, 0.2); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0, 229, 255, 0.3); border-radius: 10px; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center relative">

    <div class="hypnotic-bg"></div>

    <button onclick="goHome()" class="home-btn-fixed" title="Về trang chủ">

        <div class="mb-4 diamond-container">
            <svg class="diamond-3d" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M256 70L150 190H362L256 70Z" fill="#E0F7FA"></path>
                <path d="M150 190L256 440L362 190H150Z" fill="#00E5FF"></path>
                <path d="M70 190L150 190L256 440L70 190Z" fill="#00B8D4"></path>
                <path d="M442 190L362 190L256 440L442 190Z" fill="#00838F"></path>
                <path d="M256 70L70 190L150 190L256 70Z" fill="#B2EBF2" opacity="0.6"></path>
                <path d="M256 70L442 190L362 190L256 70Z" fill="#B2EBF2" opacity="0.6"></path>
            </svg>
        </div>
        <h1 class="text-4xl md:text-6xl font-extralight mb-1 tracking-tighter text-[#00E5FF] word-glow uppercase">Neuro-Lingo</h1>
        <p class="text-gray-500 mb-12 text-sm md:text-xl font-light uppercase tracking-widest text-center">UNIT 1: LEISURE TIME - LỚP 8</p>

        <div class="w-full max-w-xl flex flex-col gap-6 text-center">
            <div class="bg-black/30 p-8 rounded-3xl border border-[#00E5FF]/20 shadow-[0_0_50px_rgba(0,229,255,0.1)]">

                </div>

    </div>

    <!-- MÀN HÌNH NEURON -->
    <div id="screen-neuron" class="hidden flex-col items-center justify-center w-full h-full p-6 relative mx-auto">
        <div class="absolute top-[1.2rem] left-[5.5rem] md:left-[6.5rem] flex flex-wrap items-center gap-2 md:gap-4 z-40 max-w-[calc(100vw-8rem)]">
            <div class="text-[#00E5FF] font-light text-sm md:text-lg whitespace-nowrap" id="neuron-progress"></div>
            <div class="text-red-500 font-medium text-xs bg-red-900/20 px-2 py-1 rounded border border-red-500/20"><span id="neuron-error-num">0</span> sai</div>
        </div>
        <div class="absolute top-4 right-4 w-24 h-1.5 bg-gray-800 rounded-full overflow-hidden"><div id="neuron-timer" class="h-full bg-[#00E5FF] timer-bar w-full"></div></div>
        <div class="flex-1 flex flex-col items-center justify-center w-full px-4 mt-8">
            <div class="w-full max-w-5xl text-center">
                <div id="neuron-word" class="mb-10 text-center uppercase w-full"></div>
                <div class="w-full max-w-2xl mx-auto">
                    <input type="text" id="neuron-input" class="w-full bg-transparent border-b-2 border-white/5 text-4xl md:text-6xl font-light font-mono tracking-widest text-center text-[#00E5FF] focus:outline-none focus:border-[#00E5FF] p-4 transition-all" spellcheck="false" autocomplete="off" placeholder="Gõ từ...">
                    <div class="flex items-center justify-center gap-6 mt-10">
                        <p class="text-vi-note text-[10px] font-light uppercase tracking-widest opacity-50">Nhấn ENTER</p>
                        <button onclick="handleNeuronCheck()" class="px-10 py-3 rounded-full border border-[#00E5FF]/30 text-[#00E5FF] font-light text-sm uppercase transition-colors hover:bg-[#00E5FF] hover:text-black">KIỂM TRA</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL KẾT QUẢ CORTEX -->
    <div id="modal-cortex" class="hidden fixed inset-0 z-[2000] flex items-start justify-center pt-8 pb-4 px-4 bg-black/95 backdrop-blur-3xl transition-opacity" data-is-success="false">
        <div class="w-full max-w-7xl flex flex-col items-center text-center max-h-[95vh] overflow-y-auto custom-scrollbar">
            <div id="cortex-message" class="w-full flex flex-col items-center"></div>
            <button id="cortex-btn" onclick="closeCortex()" class="w-full max-w-sm py-4 rounded-2xl text-[10px] font-black uppercase tracking-[0.4em] mt-4 mb-4 shrink-0 transition-all active:scale-95"></button>
        </div>
    </div>

    <!-- MODAL THƯỞNG -->
    <div id="modal-milestone" class="hidden fixed inset-0 z-[3000] bg-black/98 flex items-center justify-center p-6 text-center">
        <div class="flex flex-col items-center">
            <div id="milestone-icon" class="text-[10rem] mb-8 chest-bounce">💎</div>
            <h2 class="text-5xl font-black text-white mb-4 uppercase" id="milestone-title"></h2>
            <button onclick="closeMilestone()" class="px-16 py-6 bg-white text-black font-black uppercase text-xl rounded-full transition-transform active:scale-95">ĐI TIẾP</button>
        </div>
    </div>

    <!-- SCREEN THƯỞNG CUỐI -->
    <div id="screen-reward" class="hidden flex-col items-center justify-center w-full h-full p-6 text-center z-40 bg-[#0A0A12]">
        <div class="w-32 h-32 mb-4 text-[#FFD700] rounded-full flex items-center justify-center bg-yellow-900/20"><svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138z"></path></svg></div>
        <p class="text-vi-note uppercase tracking-widest text-sm mb-1 font-light underline">CHẶNG HOÀN TẤT</p>
        <h2 id="final-title" class="text-5xl font-extralight text-[#FFD700] mb-4 uppercase"></h2>
        <p class="text-xl text-white mb-6">Độ chính xác: <span id="final-accuracy" class="text-[#00E5FF] font-light"></span></p>
        <div id="reward-error-section" class="hidden glass-panel p-8 border-[#00E5FF]/50 rounded-xl max-w-sm w-full cursor-pointer hover:scale-105 transition-transform" onclick="startRepractice()">
            <p class="text-[#00E5FF] text-sm font-bold uppercase mb-2">LỖI CHƯA ĐỒNG BỘ</p>
            <p class="text-gray-300 mb-4">Còn <span id="reward-error-count" class="text-white font-light text-2xl"></span> lỗi.</p>
            <p class="bg-[#00E5FF] text-black font-bold py-3 rounded-2xl uppercase text-xs">VÀO LUYỆN LẠI</p>
        </div>
        <button onclick="goHome()" class="mt-8 text-gray-500 hover:text-white uppercase font-bold tracking-widest text-xs transition-colors">VỀ CĂN CỨ</button>
    </div>

    <script>
        // BỘ CÔNG CỤ SVG 
        const SVG_PLAY_L = `<svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-[#00E5FF]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /></svg>`;
        const SVG_TUTOR = `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 002-2V9.5a2.5 2.5 0 00-2.5-2.5H15"></path></svg>`;
        const SVG_SYN = `<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" /></svg>`;

        // --- 1. DỮ LIỆU UNIT 1 LỚP 8: LEISURE TIME ---
        const unit1Raw = [
            {w:"leisure", type:"(n)", typeClass:"grammar-noun", w_html:"<span class='stress-mark'>lei</span><span class='unstressed'>sure</span>", vi:"thời gian rảnh rỗi", vi_syn:"lúc thư nhàn", p:"/ˈleʒə(r)/", en_syn_html:"<span class='grammar-noun'><span class='stress-mark'>free</span> <span class='stress-mark'>time</span></span>", ai_n:"Trọng âm rơi vào âm tiết đầu tiên /ˈleʒ/. Âm s đọc là /ʒ/ (như 'gi' rung)."},
            {w:"leisure time", type:"(n phr)", typeClass:"grammar-phrase", w_html:"<span class='stress-mark'>lei</span><span class='unstressed'>sure </span><span class='stress-mark'>time</span>", vi:"thời gian giải trí", vi_syn:"thời gian rảnh", p:"/ˈleʒə(r) taɪm/", en_syn_html:"<span class='grammar-phrase'><span class='stress-mark'>spare</span> <span class='stress-mark'>time</span></span>", ai_n:"Cụm danh từ ghép. Nhấn mạnh vào cả 'leisure' và 'time'."},
            {w:"leisure activity", type:"(n phr)", typeClass:"grammar-phrase", w_html:"<span class='stress-mark'>lei</span><span class='unstressed'>sure ac</span><span class='stress-mark'>ti</span><span class='unstressed'>vity</span>", vi:"hoạt động giải trí", p:"/ˈleʒə(r) ækˈtɪvəti/", ai_n:"Từ 'activity' có trọng âm rơi vào âm tiết thứ hai /tɪ/ do hậu tố -ity."},
            {w:"knit", type:"(v)", typeClass:"grammar-verb-main", w_html:"<span class='stress-mark'>knit</span>", vi:"đan", vi_syn:"đan len", p:"/nɪt/", ai_n:"Chữ 'k' bị câm (silent k). Đọc bắt đầu từ chữ 'n'."},
            {w:"knitting kit", type:"(n)", typeClass:"grammar-noun", w_html:"<span class='stress-mark'>knit</span><span class='unstressed'>ting </span><span class='stress-mark'>kit</span>", vi:"bộ dụng cụ để đan", p:"/ˈnɪtɪŋ kɪt/", ai_n:"Hai từ đều có âm /ɪ/ ngắn. Trọng âm nhấn vào cả hai chữ."},
            {w:"spend", type:"(v)", typeClass:"grammar-verb-main", w_html:"<span class='stress-mark'>spend</span>", vi:"dành (thời gian), tiêu", vi_syn:"trải qua", p:"/spend/", ai_n:"Động từ thường đi với cấu trúc 'spend time/money ON something' hoặc 'spend time V-ing'."},
            {w:"spend time on your own", type:"(v phr)", typeClass:"grammar-phrase", w_html:"<span class='stress-mark'>spend</span> <span class='stress-mark'>time</span> <span class='unstressed'>on your</span> <span class='stress-mark'>own</span>", vi:"dành thời gian cho bản thân", p:"/spend taɪm ɒn jɔːr əʊn/", ai_n:"Cụm từ diễn tả việc ở một mình, tận hưởng không gian riêng. 'On one's own' = by oneself."},
            {w:"DIY", type:"(n)", typeClass:"grammar-noun", w_html:"<span class='unstressed'>D-I-</span><span class='stress-mark'>Y</span>", vi:"tự tay làm", p:"/ˌdiː aɪ ˈwaɪ/", en_syn_html:"<span class='grammar-noun'><span class='stress-mark'>do</span>-it-your<span class='stress-mark'>self</span></span>", ai_n:"Viết tắt của 'Do It Yourself'. Trọng âm chính rơi vào chữ cái cuối cùng (Y)."},
            {w:"puzzle", type:"(n)", typeClass:"grammar-noun", w_html:"<span class='stress-mark'>puz</span><span class='unstressed'>zle</span>", vi:"trò chơi ô chữ", vi_syn:"câu đố", p:"/ˈpʌzl/", ai_n:"Trọng âm ở âm đầu tiên /ˈpʌz/. Âm 'u' đọc là /ʌ/ (âm á)."},
            {w:"do puzzle", type:"(v phr)", typeClass:"grammar-phrase", w_html:"<span class='stress-mark'>do</span> <span class='stress-mark'>puz</span><span class='unstressed'>zle</span>", vi:"giải ô chữ", vi_syn:"chơi xếp hình", p:"/duː ˈpʌzl/", ai_n:"Sử dụng động từ 'do' với puzzle (thường dùng số nhiều: do puzzles)."},
            {w:"surf", type:"(v)", typeClass:"grammar-verb-main", w_html:"<span class='stress-mark'>surf</span>", vi:"lướt, truy cập", p:"/sɜːf/", ai_n:"Âm /ɜː/ dài, cong r. Cuối từ có âm xát /f/."},
            {w:"surf the net", type:"(v phr)", typeClass:"grammar-phrase", w_html:"<span class='stress-mark'>surf</span> <span class='unstressed'>the </span><span class='stress-mark'>net</span>", vi:"lướt net", vi_syn:"truy cập mạng", p:"/sɜːf ðə net/", ai_n:"Cụm từ rất phổ biến chỉ hành động sử dụng Internet."},
            {w:"message", type:"(v/n)", typeClass:"grammar-verb-main", w_html:"<span class='stress-mark'>mes</span><span class='unstressed'>sage</span>", vi:"gửi tin nhắn", vi_syn:"tin nhắn", p:"/ˈmesɪdʒ/", ai_n:"Trọng âm nhấn vào /ˈmes/. Âm đuôi là /dʒ/ (chờ bật nặng). Trong bài này dùng như động từ."},
            {w:"message friends", type:"(v phr)", typeClass:"grammar-phrase", w_html:"<span class='stress-mark'>mes</span><span class='unstressed'>sage </span><span class='stress-mark'>friends</span>", vi:"nhắn tin cho bạn bè", p:"/ˈmesɪdʒ frendz/", ai_n:"Động từ 'message' có thể đi trực tiếp với tân ngữ chỉ người."},
            {w:"cooking", type:"(n)", typeClass:"grammar-noun", w_html:"<span class='stress-mark'>cook</span><span class='unstressed'>ing</span>", vi:"nấu ăn", vi_syn:"việc nấu nướng", p:"/ˈkʊkɪŋ/", ai_n:"Đuôi -ing biến động từ 'cook' thành danh từ chỉ hoạt động. Âm /ʊ/ ngắn."},
            {w:"keen", type:"(adj)", typeClass:"grammar-adjective", w_html:"<span class='stress-mark'>keen</span>", vi:"say mê, ham thích", p:"/kiːn/", en_syn_html:"<span class='grammar-adjective'>ea<span class='stress-mark'>ger</span></span>", ai_n:"Tính từ luôn đi với giới từ ON: 'keen on + V-ing/Noun' (đam mê làm gì)."},

        // 2. STATE & UTILITIES
        let currentMode = 'neuron'; let currentLevel = 0; let activeData = []; let currentIndex = 0;

        let timerInterval; let timeLeft = 10; let brighteningInterval;
        const synth = window.speechSynthesis;

        function getCurrentItem() {
            if (isRepracticing) return currentPool[currentIndex] ? currentPool[currentIndex].item : activeData[0];
            return activeData[currentIndex] || activeData[0];
        }
        function vibrate(ms=20) { if (navigator.vibrate) navigator.vibrate(ms); }
        function clean(str) { return str ? str.trim().replace(/\s+/g, ' ') : ""; }
        function playAudio(txt) { if(!txt) return; if(synth.speaking) synth.cancel(); let u = new SpeechSynthesisUtterance(txt); u.lang='en-US'; u.rate=0.85; synth.speak(u); }

        // BỘ LỌC TÔ MÀU NGỮ PHÁP TỰ ĐỘNG (Cho AI Tutor)
        function highlightGrammar(text) {
            if (!text) return "";
            const getRegex = (words) => new RegExp(`(^|[^\\p{L}])(${words})(?=[^\\p{L}]|$)(?![^<]*>)`, 'giu');

            let modals = "will|won't|can|can't|could|should|shouldn't|would|must|may";
            let bes = "is|are|was|were|been|being|am|be";
            let preps = "on|at|for|with|about|without|under|over|by|from|around|through|inside|behind|into|onto|during|via|opposite|towards|down|out|away|up|off|in|to";
            let deters = "the|my|your|his|her|our|their|its|mine|yours|theirs|ours|any|some|many|all|each|another|this|that|these|those|more|less|a|an";
            let conjs = "and|but|or|because|if|whether|although|that|than|so|for|therefore|otherwise|how|what|why|where|which|who|so";

            text = text.replace(getRegex(modals), "$1<span class='grammar-verb-modal'>$2</span>");
            text = text.replace(getRegex(bes), "$1<span class='grammar-verb-be'>$2</span>");
            text = text.replace(getRegex(preps), "$1<span class='grammar-preposition'>$2</span>");
            text = text.replace(getRegex(deters), "$1<span class='grammar-determiner'>$2</span>");
            text = text.replace(getRegex(conjs), "$1<span class='grammar-conjunction'>$2</span>");

            const doDoes = "do|does|don't|doesn't|did|didn't";
            text = text.replace(getRegex(doDoes), "$1<span class='grammar-verb-aux'>$2</span>");

            return text;
        }

        function markError(item) {
            currentItemFailed = true;
            if (!isRepracticing && !wrongItemsData.find(x => x.item.w === item.w)) {
                wrongItemsData.push({ item: item, streak: 0 });
                updateErrorUI();
            }
        }

        // 3. UI MANAGEMENT
        function hideAll() {
            ['screen-home', 'screen-neuron', 'screen-reward', 'modal-cortex', 'modal-milestone'].forEach(id => {

            });
        }
        function goHome() { clearInterval(timerInterval); clearInterval(brighteningInterval); hideAll(); document.getElementById('screen-home').classList.remove('hidden'); }
        function updateErrorUI() { document.getElementById('neuron-error-num').innerText = wrongItemsData.length; }

        function updateProgressUI() {
            let nProg = document.getElementById('neuron-progress');
            if (isRepracticing) {
                let requiredStreak = 3;
                nProg.innerText = `Luyện lại: ${requiredStreak} lần`;
                nProg.classList.add('text-[#FFD700]');
            } else {
                nProg.innerText = `L${currentLevel + 1} - ${currentIndex + 1}/${activeData.length}`;
                nProg.classList.remove('text-[#FFD700]');
            }
        }

        function renderLevelButtons() {
            const container = document.getElementById('level-buttons-container');
            if (!container) return;
            container.innerHTML = '';
            const totalWords = unit1Raw.length;
            const wordsPerStage = 20;
            const totalStages = Math.ceil(totalWords / wordsPerStage);
            
            if (totalStages === 1) {
                container.className = "flex justify-center";
            } else {
                container.className = "grid grid-cols-2 gap-6 place-items-center";
            }

            for (let i = 0; i < totalStages; i++) {
                const start = i * wordsPerStage + 1;
                const end = Math.min((i + 1) * wordsPerStage, totalWords);
                const btn = document.createElement('button');
                btn.className = "w-full md:w-auto min-w-[200px] py-6 px-8 bg-gray-900/50 border border-[#00E5FF]/30 rounded-2xl font-medium text-lg text-[#00E5FF] hover:bg-[#00E5FF] hover:text-black hover:scale-105 hover:shadow-[0_0_30px_rgba(0,229,255,0.4)] transition-all";
                btn.onclick = () => startMode('neuron', i);
                btn.innerHTML = `L${i + 1} <br><span class="text-xs opacity-60 font-light block mt-1 tracking-widest">TỪ ${start}-${end}</span>`;
                container.appendChild(btn);
            }
        }

        function startMode(mode, levelIdx) {
            if(window.speechSynthesis) window.speechSynthesis.cancel();
            currentMode = mode; currentLevel = levelIdx; isRepracticing = false; wrongItemsData = [];
            
            // Chia chặng mỗi chặng 20 từ
            let start = levelIdx * 20;
            let end = Math.min(start + 20, unit1Raw.length);
            
            // Xử lý dữ liệu
            activeData = unit1Raw.slice(start, end).map(d => {
                let targetHTML = `<span class='${d.typeClass}'>${d.w_html}</span>`;

                const maskToken = "___TGT_MASK___";
                const escapeRegExp = (string) => string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const safeTarget = escapeRegExp(d.w);
                
                let aiN_Masked = (d.ai_n || "").replace(new RegExp(`\\b${safeTarget}\\b`, 'gi'), maskToken);
                let aiN_Highlighted = highlightGrammar(aiN_Masked);
                let aiN_HTML = aiN_Highlighted.replace(new RegExp(maskToken, 'g'), targetHTML);

                return { ...d, ai_n_html: aiN_HTML };
            });

            currentPool = activeData.map(i => ({ item: i, streak: 0 }));
            currentIndex = 0; firstTryCount = 0; updateErrorUI(); hideAll();
            document.getElementById('screen-neuron').classList.remove('hidden'); 
            loadNeuron();
        }

        function showCortex(html, isSuccess = false) {
            const modal = document.getElementById('modal-cortex');
            modal.setAttribute('data-is-success', isSuccess);
            const btn = document.getElementById('cortex-btn');
            const item = getCurrentItem();

            clearInterval(brighteningInterval);
            btn.style.opacity = "0.1";
            btn.className = "w-full max-w-sm py-4 rounded-2xl font-black uppercase tracking-[0.4em] mt-4 mb-4 shrink-0 transition-all active:scale-95";
            btn.innerText = isRepracticing ? "TÁI KẾT NỐI" : "TIẾP TỤC";

            playAudio(item.w);

            let stepInterval = 1600;

            setTimeout(() => {
                let stage = 0;
                brighteningInterval = setInterval(() => {
                    stage++;
                    if (stage === 1) btn.classList.add('btn-stage-1');
                    else if (stage === 2) { btn.classList.remove('btn-stage-1'); btn.classList.add('btn-stage-2'); }
                    else if (stage === 3) {
                        btn.classList.remove('btn-stage-2');
                        btn.classList.add('btn-stage-3-neuron');
                        clearInterval(brighteningInterval);
                    }
                }, stepInterval);
            }, 1000);

            document.getElementById('cortex-message').innerHTML = html;
            modal.classList.remove('hidden');
            clearInterval(timerInterval);
        }

        function closeCortex() { 
            if(window.speechSynthesis) window.speechSynthesis.cancel();
            const isSuccess = document.getElementById('modal-cortex').getAttribute('data-is-success') === 'true';
            document.getElementById('modal-cortex').classList.add('hidden'); 
            advance(isSuccess); 
        }

        function advance(isCorrect) {
            if (!isRepracticing && isCorrect && !currentItemFailed) firstTryCount++;
            if (isCorrect && (currentIndex + 1) % 10 === 0 && !isRepracticing && (currentIndex + 1) !== activeData.length) {
                document.getElementById('modal-milestone').classList.remove('hidden');
                document.getElementById('milestone-title').innerText = "CỰC KỲ XUẤT SẮC!";
                return;
            }
            advanceLogic();
        }

        function advanceLogic() {
            if (isRepracticing) {
                let requiredStreak = 3;
                if (currentPool[currentIndex].streak >= requiredStreak) {
                    currentPool.splice(currentIndex, 1);
                } else {
                    currentIndex++;
                }
                if (currentPool.length === 0) { showReward(); return; }
                if (currentIndex >= currentPool.length) currentIndex = 0;
            } else {
                currentIndex++; if (currentIndex >= activeData.length) { showReward(); return; }
            }
            loadNeuron();
        }
        
        function closeMilestone() { 
            if(window.speechSynthesis) window.speechSynthesis.cancel();
            document.getElementById('modal-milestone').classList.add('hidden'); 
            advanceLogic(); 
        }

        // --- NEURON LOGIC ---
        function loadNeuron() {
            clearInterval(timerInterval);

                        <div class="bg-black/40 p-5 md:p-8 rounded-[2rem] border border-[#4ade80]/20 w-full shadow-2xl text-center">
                            <div class="flex items-center justify-center gap-4 md:gap-6 mt-1 mb-2">

                            ${item.en_syn_html ? `
                            <div class="mt-5 border-t border-white/10 pt-4 flex flex-col items-center">

        function handleNeuronFail(isT, typed = "") {

            hideAll(); document.getElementById('screen-reward').classList.remove('hidden'); document.getElementById('screen-reward').classList.add('flex');

        }

        function startRepractice() { 
            isRepracticing = true; 
            currentPool = [...wrongItemsData]; 
            currentIndex = 0; 
            hideAll(); 
            document.getElementById('screen-neuron').classList.remove('hidden'); 
            loadNeuron(); 
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if(window.speechSynthesis) window.speechSynthesis.cancel();
                const modal = document.getElementById('modal-cortex');
                const milestone = document.getElementById('modal-milestone');
                const neuron = !document.getElementById('screen-neuron').classList.contains('hidden');
                if (modal && !modal.classList.contains('hidden')) { e.preventDefault(); closeCortex(); }
                else if (milestone && !milestone.classList.contains('hidden')) { e.preventDefault(); closeMilestone(); }
                else if (neuron) { e.preventDefault(); handleNeuronCheck(); }
            }
        });

        // Initialize level buttons on load
        window.onload = renderLevelButtons;
    </script>
</body>
</html>
