        :root {
            --theme-bg: rgba(11, 61, 92, 0.05);
            --theme-r1: rgba(255, 191, 0, 0.2);
            --theme-r2: rgba(255, 191, 0, 0.35);
        }

        html, body {
            height: 100%; width: 100%;
            overflow: hidden; overscroll-behavior: none;
            background-color: #000; color: #fff;
            font-family: 'Be Vietnam Pro', 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body.is-paused *, body.is-paused {
            animation-play-state: paused !important;
        }

        .mandala-wrapper {
            position: fixed; inset: 0; z-index: -2; pointer-events: none;
            display: flex; align-items: center; justify-content: center;
            animation: breathMaster 18s ease-in-out infinite alternate;
            will-change: transform, opacity;
        }
        .master-mandala-bg {
            width: 250vmax; height: 250vmax; flex-shrink: 0;
            background-image: repeating-radial-gradient(
                circle at center,
                var(--theme-bg) 0, transparent 60px,
                var(--theme-r1) 60px, var(--theme-r2) 62px
            );
            animation: rotateMandala 300s linear infinite;
            will-change: transform;
            transform: translateZ(0);
        }
        @keyframes rotateMandala { 0% { transform: rotate(0deg) translateZ(0); } 100% { transform: rotate(360deg) translateZ(0); } }
        @keyframes breathMaster { 0% { transform: scale(1) translateZ(0); opacity: 0.6; } 100% { transform: scale(1.08) translateZ(0); opacity: 1; } }

        .aurora-bg {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 50%, #050510 0%, #000 100%);
            transform: translateZ(0);
        }
        .blob {
            position: absolute; filter: blur(60px); opacity: 0.22; border-radius: 50%;
            animation: moveAurora 35s infinite alternate ease-in-out;
            will-change: transform;
            transform: translate3d(0,0,0);
        }
        .b1 { top: -10%; left: -10%; width: 70vw; height: 70vw; background: #20054d; }
        .b2 { bottom: -20%; right: -10%; width: 80vw; height: 80vw; background: #052a4d; }
        @keyframes moveAurora { 0% { transform: translate3d(0,0,0) scale(1); } 100% { transform: translate3d(15%, 12%, 0) scale(1.1); } }

        .flashcard-container {
            perspective: 2000px; 
            width: 100vw;
            height: 100dvh;
            margin: 0 auto; 
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); 
            position: relative;
            will-change: transform;
        }
        .flashcard-container.zoomed { width: 100vw; }
        
        .flashcard {
            position: relative; width: 100%; height: 100%;
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-style: preserve-3d; cursor: pointer;
        }
        .flashcard.is-flipped { transform: rotateY(180deg); }

        .flashcard-face {
            position: absolute; inset: 0; backface-visibility: hidden;
            border-radius: 0; display: flex; flex-direction: column;
            align-items: center; padding: 0;
            background: linear-gradient(145deg, rgba(25,25,30,0.96) 0%, rgba(5,5,10,0.99) 100%);
            backdrop-filter: blur(35px); border: none;
            transition: border-color 0.5s ease;
            width: 100%; height: 100%;
            container-type: inline-size;
            container-name: cardface;
        }
        .flashcard-back { transform: rotateY(180deg); }

        .grid-card-wrapper .flashcard-face {
            border-radius: 1.8rem;
            border: 2px solid var(--theme-r1);
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
        }

        @media (min-width: 768px) {
            .flashcard-container { 
                width: min(calc((100dvh - 200px) * 0.75), 85vw); 
                height: auto;
                aspect-ratio: 3/4;
                max-width: 480px; 
            }
            .flashcard-container.zoomed { 
                width: min(calc((100dvh - 120px) * 0.75), 95vw); 
                max-width: 640px; 
            }
            .flashcard-container .flashcard-face { 
                border-radius: 1.8rem;
                border: 2px solid var(--theme-r1);
                box-shadow: 0 0 50px rgba(0,0,0,0.85);
            }
        }

        .item-mandala-aura {
            position: absolute; top: 50%; left: 50%; translate: -50% -50%;
            width: 155%; height: 155%; z-index: -1; pointer-events: none;
            background-image: repeating-radial-gradient(
                circle at center, transparent 0, transparent 15px,
                var(--theme-r1) 15px, var(--theme-r2) 16px
            );
            border-radius: 50%; animation: rotateMandala 60s linear infinite;
            transform: scale(1) translateZ(0);
            transition: opacity 0.8s ease, transform 0.8s ease;
            will-change: transform, opacity;
            opacity: 0; 
        }
        .flashcard-container .item-mandala-aura { opacity: 0.35; }
        .flashcard-container:hover .item-mandala-aura, 
        .grid-card-wrapper:hover .item-mandala-aura { opacity: 0.8; transform: scale(1.08) translateZ(0); }
        @media (max-width: 767px) { .item-mandala-aura { display: none !important; } }

        .text-fluid-lg { font-size: clamp(1.8rem, 15cqw, 4rem); line-height: 1.1; }
        .text-fluid-md { font-size: clamp(1.5rem, 12cqw, 3.2rem); line-height: 1.1; }
        .text-fluid-sm { font-size: clamp(1.2rem, 9cqw, 2.5rem); line-height: 1.2; }
        .text-fluid-vi { font-size: clamp(1rem, 6.5cqw, 1.6rem); line-height: 1.3; }
        .tag-fluid { font-size: clamp(0.7rem, 4cqw, 1.1rem); padding: 0.3em 0.6em; }
        .num-fluid { font-size: clamp(0.6rem, 3cqw, 0.8rem); }

        .safe-text-rendering { padding-bottom: 0.2em !important; overflow: visible !important; display: block; width: 100%; }

        .btn-glass {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(15px); transition: all 0.3s ease;
        }
        .btn-glass:hover { background: rgba(255,255,255,0.12); border-color: var(--theme-r1); color: var(--theme-r1); transform: translateY(-3px); }

        .grid-card-wrapper {
            position: relative; width: 100%; max-width: min(460px, 90vw);
            aspect-ratio: 3/4; margin: 0 auto; perspective: 1200px;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--theme-r1); border-radius: 10px; }

        /* ==================================================================== */
        /* HỆ THỐNG MÀU SẮC NGỮ PHÁP CHUẨN XÁC 100% THEO YÊU CẦU */
        /* ==================================================================== */
        .grammar-subject { color: #60a5fa !important; font-weight: 700 !important; }
        .grammar-object { color: #4ade80 !important; font-weight: 700 !important; }
        .grammar-noun { color: #86efac !important; font-weight: 700 !important; } /* Xanh lá nhạt */
        .grammar-pronoun { color: #93c5fd !important; font-weight: 700 !important; }
        .grammar-determiner { color: #9ca3af !important; font-weight: 500 !important; }
        
        .grammar-verb-main { color: #facc15 !important; font-weight: 700 !important; } /* Vàng sáng */
        .grammar-verb-be { color: #facc15 !important; font-weight: 700 !important; }
        .grammar-verb-aux { color: #c084fc !important; font-weight: 700 !important; }
        .grammar-verb-modal { color: #d8b4fe !important; font-weight: 700 !important; }
        
        /* Hậu tố đuôi (s, es, ed, ing, -ly, -ness, -ity, -tion, -sion, -al, -ful, -ive, -able) - Màu Cam Đậm (#f59e0b) */
        .grammar-verb-suffix, .grammar-suffix { color: #f59e0b !important; font-weight: 900 !important; } 
        /* Tiền tố (un-, in-, im-) - Màu hồng đậm */
        .grammar-prefix { color: #f472b6 !important; font-weight: 900 !important; }
        
        .grammar-adjective { color: #22d3ee !important; font-weight: 600 !important; } /* Cyan */
        .grammar-adverb { color: #2dd4bf !important; font-style: italic !important; font-weight: 600 !important; } /* Teal */
        .grammar-preposition { color: #fb923c !important; font-weight: 600 !important; }
        .grammar-conjunction { color: #f472b6 !important; font-weight: 700 !important; }
        
        .grammar-irr-v2 { color: #ef4444 !important; font-weight: 700 !important; }
        
        .highlight-signal-word { 
            color: #f472b6 !important; font-weight: 700 !important; font-style: italic !important; background: transparent !important; padding: 0 !important; border-radius: 0 !important;
        }

        .stress-mark {
            color: inherit !important; font-weight: inherit !important; text-shadow: none !important; border-bottom: 3px solid #f59e0b !important; padding-bottom: 2px !important; -webkit-text-stroke: 0 !important;
        }
        .unstressed { opacity: 0.8; font-weight: inherit; }
        
        .reading-text-en { font-family: 'Be Vietnam Pro', sans-serif; letter-spacing: 0.015em; line-height: 1.4; }
        .reading-text-vi { font-family: 'Be Vietnam Pro', sans-serif; letter-spacing: 0.01em; line-height: 1.45; }

        .mobile-slider { -webkit-appearance: none; width: 100%; background: transparent; height: 40px; }
        .mobile-slider:focus { outline: none; }
        .mobile-slider::-webkit-slider-runnable-track { width: 100%; height: 2px; cursor: pointer; background: rgba(255, 255, 255, 0.15); border-radius: 2px; }
        .mobile-slider::-webkit-slider-thumb { height: 8px; width: 8px; border-radius: 50%; background: rgba(245, 158, 11, 0.8); cursor: pointer; -webkit-appearance: none; margin-top: -3px; box-shadow: 0 0 4px rgba(245, 158, 11, 0.4); transition: transform 0.2s ease, background 0.2s ease; }
        .mobile-slider:active::-webkit-slider-thumb { transform: scale(1.8); background: rgba(245, 158, 11, 1); }
        .mobile-slider::-moz-range-track { width: 100%; height: 2px; cursor: pointer; background: rgba(255, 255, 255, 0.15); border-radius: 2px; }
        .mobile-slider::-moz-range-thumb { height: 8px; width: 8px; border-radius: 50%; background: rgba(245, 158, 11, 0.8); cursor: pointer; border: none; box-shadow: 0 0 4px rgba(245, 158, 11, 0.4); transition: transform 0.2s ease, background 0.2s ease; }
        .mobile-slider:active::-moz-range-thumb { transform: scale(1.8); background: rgba(245, 158, 11, 1); }

        /* Custom Tree Styling */
        .tree-container {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

            tho: { bg: 'rgba(60, 40, 0, 0.08)', r1: 'rgba(255, 191, 0, 0.3)', r2: 'rgba(255, 225, 110, 0.5)', label: 'Thổ', color: '#f59e0b' }
        };

        const compressImage = (base64Str, maxWidth = 600) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    if (width > maxWidth) {
                        height = Math.round((height * maxWidth) / width);
                        width = maxWidth;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.75));
                };
                img.src = base64Str;
            });
        };

        const Icon = ({ name, className }) => {
            const icons = {
                volume2: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>,
                mic: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" x2="12" y1="19" y2="22"></line></svg>,
                layoutGrid: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="7" height="7" x="3" y="3" rx="1"></rect><rect width="7" height="7" x="14" y="3" rx="1"></rect><rect width="7" height="7" x="14" y="14" rx="1"></rect><rect width="7" height="7" x="3" y="14" rx="1"></rect></svg>,
                monitor: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="14" x="2" y="3" rx="2"></rect><line x1="8" x2="16" y1="21" y2="21"></line><line x1="12" x2="12" y1="17" y2="21"></line></svg>,
                downloadCloud: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"></path><path d="M12 12v9"></path><path d="m8 17 4 4 4-4"></path></svg>,
                chevronUp: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m18 15-6-6-6 6"></path></svg>,
                chevronDown: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m6 9 6 6 6-6"></path></svg>,
                chevronLeft: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m15 18-6-6 6-6"></path></svg>,
                chevronRight: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"></path></svg>,
                circle: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" stroke="none" className={className}><circle cx="12" cy="12" r="10"></circle></svg>,
                maximize: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M8 3H5a2 2 0 0 0-2 2v3"></path><path d="M21 8V5a2 2 0 0 0-2-2h-3"></path><path d="M3 16v3a2 2 0 0 0 2 2h3"></path><path d="M16 21h3a2 2 0 0 0 2-2v-3"></path></svg>,
                minimize: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M8 3v3a2 2 0 0 1-2 2H3"></path><path d="M21 8h-3a2 2 0 0 1-2-2V3"></path><path d="M3 16h3a2 2 0 0 1 2 2v3"></path><path d="M16 21v-3a2 2 0 0 1 2-2h3"></path></svg>,
                zoomIn: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"></circle><line x1="21" x2="16.65" y1="21" y2="16.65"></line><line x1="11" x2="11" y1="8" y2="14"></line><line x1="8" x2="14" y1="11" y2="11"></line></svg>,
                zoomOut: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"></circle><line x1="21" x2="16.65" y1="21" y2="16.65"></line><line x1="8" x2="14" y1="11" y2="11"></line></svg>,
                wand: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>,
                gitBranch: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="6" y1="3" x2="6" y2="15"></line><circle cx="18" cy="6" r="3"></circle><circle cx="6" cy="18" r="3"></circle><path d="M18 9a9 9 0 0 1-9 9"></path></svg>
            };
            return icons[name] || null;
        };

        const FlashcardItem = memo(({ card, index, total, isGrid, isZoomed, isExported, aiImage, isGenerating, onAction, selectedVoice, readingSpeed }) => {
            const [isFlipped, setIsFlipped] = useState(false);
            const startX = useRef(0);
            const isSwiping = useRef(false);

            const textSizeClass = card.en.length > 13 ? 'text-fluid-sm' : card.en.length > 9 ? 'text-fluid-md' : 'text-fluid-lg';

            const getGrammarClass = (type) => {
                if (!type) return 'text-white font-bold';
                const t = type.toLowerCase().replace(/[\(\)]/g, '').trim();
                if (t === 'adj') return 'grammar-adjective';
                if (t === 'adv') return 'grammar-adverb';
                if (t === 'prep') return 'grammar-preposition';
                if (t === 'conj') return 'grammar-conjunction';
                if (t === 'n') return 'grammar-noun';
                if (t === 'v') return 'grammar-verb-main';
                if (t === 'phr') return 'grammar-phrase';
                return 'text-white font-bold';
            };

            const getTypeTagClass = (type) => {
                if (!type) return 'border-white/20 bg-white/10 text-gray-200';
                const t = type.toLowerCase().replace(/[\(\)]/g, '').trim();
                if (t === 'prefix') return 'border-[#f472b6]/50 bg-[#f472b6]/20 !text-[#f472b6] !font-bold';
                if (t === 'adj') return 'border-[#22d3ee]/50 bg-[#22d3ee]/20 !text-[#22d3ee] !font-bold';
                if (t === 'adv') return 'border-[#2dd4bf]/50 bg-[#2dd4bf]/20 !text-[#2dd4bf] !font-bold italic';
                if (t === 'prep') return 'border-[#fb923c]/50 bg-[#fb923c]/20 !text-[#fb923c] !font-bold';
                if (t === 'conj') return 'border-[#f472b6]/50 bg-[#f472b6]/20 !text-[#f472b6] !font-bold';
                if (t === 'n') return 'border-[#86efac]/50 bg-[#86efac]/20 !text-[#86efac] !font-bold';
                if (t === 'v') return 'border-[#facc15]/50 bg-[#facc15]/20 !text-[#facc15] !font-bold';
                if (t === 'phr') return 'border-[#cbd5e1]/50 bg-[#cbd5e1]/20 !text-[#cbd5e1] !font-bold';
                return 'border-white/20 bg-white/10 text-gray-200';
            };

            const playSpeech = useCallback((text) => {
                if (!text || document.hidden) return;
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'en-US'; 
                u.rate = readingSpeed; 
                if (selectedVoice) {
                    const voiceObj = window.speechSynthesis.getVoices().find(v => v.name === selectedVoice);
                    if (voiceObj) u.voice = voiceObj;
                }
                window.speechSynthesis.speak(u);
            }, [selectedVoice, readingSpeed]);

            useEffect(() => {
                if (!isGrid && !isFlipped && !document.hidden) {
                    const timer = setTimeout(() => {
                        if (!document.hidden) playSpeech(card.en);
                    }, 150);
                    return () => clearTimeout(timer);
                }
            }, [isGrid, card.en, playSpeech, isFlipped]);

            const handleToggle = useCallback((e) => {
                if (isSwiping.current) return;
                setIsFlipped(prev => {
                    const next = !prev;
                    if (next) {
                        playSpeech(card.en);
                    } else {
                        playSpeech(card.en);
                    }
                    return next;
                });
            }, [card.en, playSpeech]);

            useEffect(() => {
                if (isGrid) return;
                const handler = (e) => {
                    if (e.detail === index) handleToggle();
                };
                window.addEventListener('trigger-flip', handler);
                return () => window.removeEventListener('trigger-flip', handler);
            }, [index, isGrid, handleToggle]);

            useEffect(() => {
                if (!isGrid) return;
                const handler = () => setIsFlipped(prev => !prev);
                window.addEventListener('trigger-flip-all', handler);
                return () => window.removeEventListener('trigger-flip-all', handler);
            }, [isGrid]);

            return (
                <div 
                    className={isGrid ? 'grid-card-wrapper' : `flashcard-container ${isZoomed ? 'zoomed' : ''}`}
                    onPointerDown={(e) => {
                        if (!isGrid) {
                            startX.current = e.clientX;
                            isSwiping.current = false;
                        }
                    }}
                    onPointerMove={(e) => {
                        if (!isGrid && startX.current) {
                            if (Math.abs(e.clientX - startX.current) > 10) {
                                isSwiping.current = true;
                            }
                        }
                    }}
                    onPointerUp={(e) => {
                        if (isGrid) return;
                        const diff = startX.current - e.clientX;
                        if (Math.abs(diff) > 40) {
                            window.dispatchEvent(new CustomEvent('nav-slide', { detail: diff > 0 ? 1 : -1 }));
                        }
                        setTimeout(() => { isSwiping.current = false; }, 50);
                        startX.current = 0;
                    }}
                >
                    <div className="item-mandala-aura"></div>
                    <div className={`flashcard ${isFlipped ? 'is-flipped' : ''}`} onClick={handleToggle}>
                        <div className="flashcard-face overflow-hidden">
                            {aiImage ? (
                                <div className="w-full h-full relative flex flex-col justify-end overflow-hidden">
                                    {!isExported && (
                                        <button onClick={(e) => { e.stopPropagation(); onAction(card); }} className="absolute top-4 right-4 z-[60] p-2.5 sm:p-3 rounded-full bg-black/60 border border-white/10 text-gray-200 hover:text-amber-400 backdrop-blur-md active:scale-90 transition-all flex items-center justify-center shadow-lg" title="Tạo lại ảnh AI khác">
                                            {isGenerating ? (
                                                <svg className="animate-spin w-4 h-4 sm:w-5 sm:h-5 text-amber-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                                            ) : (
                                                <Icon name="wand" className="w-4 h-4 sm:w-5 sm:h-5" />
                                            )}
                                        </button>
                                    )}
                                    
                                    <div className="absolute inset-0 bg-cover bg-center opacity-100 z-0 transition-opacity duration-500" style={{ backgroundImage: 'url(' + aiImage + ')' }}></div>
                                    <div className="absolute inset-0 bg-gradient-to-t from-black/90 via-black/40 to-transparent z-0"></div>
                                    
                                    <div className="relative z-10 w-full flex flex-col items-center px-4 sm:px-6 pb-28 sm:pb-16 text-center">
                                        <h2 className={`${textSizeClass} ${getGrammarClass(card.type)} safe-text-rendering tracking-wide w-full pt-4 sm:pt-0`}>
                                            {card.syllables.map((s, i) => <span key={i} className={s.stress ? 'stress-mark' : 'unstressed'}>{s.text}</span>)}
                                        </h2>
                                        
                                        <div className="flex flex-wrap justify-center items-center gap-2 mt-3 mb-5 sm:mt-5 sm:mb-5">
                                            <span className="tag-fluid bg-white/10 rounded-lg font-mono border border-white/5 shadow-inner text-gray-200">{card.phonetic}</span>
                                            <span className={`tag-fluid border rounded-lg italic uppercase ${getTypeTagClass(card.type)}`}>{card.type}</span>
                                        </div>
                                        
                                        <div className="text-fluid-vi font-semibold text-gray-100 border-t border-white/20 pt-4 w-full sm:w-5/6 text-center safe-text-rendering drop-shadow-lg">{card.vi}</div>
                                    </div>
                                    
                                    <div className="absolute bottom-6 sm:bottom-5 left-4 sm:left-5 z-50 num-fluid font-mono opacity-40 uppercase pointer-events-none">{index + 1} / {total}</div>
                                    <button onClick={(e) => { e.stopPropagation(); playSpeech(card.en); }} className="absolute bottom-5 sm:bottom-4 right-4 sm:right-5 z-50 p-3 sm:p-3 rounded-full bg-white/15 text-white hover:text-amber-400 hover:bg-white/25 border border-white/20 active:scale-90 transition-transform shadow-xl backdrop-blur-md"><Icon name="volume2" className="w-5 h-5" /></button>
                                </div>
                            ) : (
                                <div className="w-full h-full flex flex-col items-center justify-between p-0 sm:p-8 relative text-center pb-24 sm:pb-8">
                                    <div className="flex-1 flex flex-col items-center justify-center pt-10 px-4">
                                        <div className="text-amber-400/50 text-[10px] font-black tracking-[0.3em] mb-4 uppercase">Từ Gốc & Nghĩa Tiếng Việt</div>
                                        <h2 className="text-3xl sm:text-5xl font-black text-white safe-text-rendering leading-tight">{card.vi}</h2>
                                    </div>
                                    <div className="h-24 sm:h-32 flex items-center justify-center w-full z-[60] bg-black/40 sm:bg-transparent backdrop-blur-md sm:backdrop-blur-none border-t border-white/10 sm:border-none">
                                        <button onClick={(e) => { e.stopPropagation(); onAction(card); }} className="px-6 sm:px-10 py-3 sm:py-5 rounded-full bg-indigo-600/50 border border-indigo-500/40 text-[10px] sm:text-xs font-black uppercase tracking-[0.2em] text-white hover:bg-indigo-500/70 transition-all active:scale-95 flex items-center gap-2">
                                            {isGenerating ? (
                                                <><svg className="animate-spin w-4 h-4 text-amber-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Đang họa bối cảnh...</>
                                            ) : 'Tạo Hình Ảnh AI'}
                                        </button>
                                    </div>
                                    <div className="absolute bottom-6 sm:bottom-5 left-4 sm:left-5 z-50 num-fluid font-mono opacity-40 uppercase pointer-events-none">{index + 1} / {total}</div>
                                </div>
                            )}
                        </div>
                        
                        {/* MẶT SAU: WORD FAMILY TREE */}
                        <div className="flashcard-face flashcard-back overflow-hidden !p-0 bg-black/90">
                            {aiImage && (
                                <>
                                    <div className="absolute inset-0 bg-cover bg-center opacity-20 z-0 transition-opacity duration-500" style={{ backgroundImage: 'url(' + aiImage + ')' }}></div>
                                    <div className="absolute inset-0 bg-gradient-to-b from-black/95 via-black/80 to-black/95 z-0"></div>
                                </>
                            )}
                            
                            <div className="w-full h-full flex flex-col justify-start px-3 sm:px-5 py-5 sm:py-6 relative z-10 text-left gap-1.5 sm:gap-2 overflow-y-auto no-scrollbar pb-20">
                                
                                {/* Từ Gốc (Root Node) */}
                                <div className="flex items-center flex-wrap gap-x-3 gap-y-1 mb-1 sm:mb-2 bg-gradient-to-r from-white/15 to-transparent p-2 sm:p-3 rounded-xl border border-white/20 shadow-sm">
                                    <div className="flex items-center gap-2 shrink-0">
                                        <span className={`tag-fluid border rounded italic uppercase ${getTypeTagClass(card.type)} px-1.5 py-0.5 !text-[10px]`}>{card.type}</span>
                                        <span className={`text-lg sm:text-xl font-bold ${getGrammarClass(card.type)}`}>{card.en}</span>
                                    </div>
                                    <span className="text-amber-200/90 text-[13px] sm:text-sm italic font-medium">
                                        <span className="text-white/20 mr-2 hidden sm:inline-block">|</span>
                                        <span className="text-white/20 mr-1 sm:hidden">-</span>
                                        {card.vi}
                                    </span>
                                </div>

                                {/* Sơ đồ nhánh (Tree Branches) */}
                                <div className="flex flex-col ml-2 sm:ml-4 border-l-[2px] border-white/20 pl-3 sm:pl-4 relative gap-2 sm:gap-2.5 mt-1">
                                    {card.tree && card.tree.map((item, i) => {
                                        if (item.branchLabel) {
                                            return (
                                                <div key={i} className="text-indigo-300 text-[9px] sm:text-[10px] font-bold uppercase tracking-wider mt-1 mb-0.5 bg-indigo-900/40 inline-block px-2.5 py-1 rounded w-max border border-indigo-500/30">
                                                    {item.branchLabel}
                                                </div>
                                            );
                                        }
                                        return (
                                            <div key={i} className="relative group flex items-start">
                                                {/* Connecting horizontal line */}
                                                <div className="absolute -left-3 sm:-left-4 top-1/2 -translate-y-1/2 w-3 sm:w-4 h-[2px] bg-white/20"></div>
                                                
                                                <div className="flex w-full items-center bg-black/60 border border-white/10 rounded-lg p-1.5 sm:p-2 hover:bg-black/80 hover:border-white/30 transition-colors shadow-sm backdrop-blur-sm">
                                                    <div className="flex-1 flex flex-wrap items-center gap-x-2 gap-y-1 pr-2">
                                                        <span className={`text-[9px] sm:text-[10px] font-bold border rounded italic uppercase px-1.5 py-0.5 shrink-0 ${getTypeTagClass(item.type)}`}>
                                                            {item.type}
                                                        </span>
                                                        <span className="text-[14px] sm:text-[15px] tracking-wide drop-shadow-md shrink-0" dangerouslySetInnerHTML={{__html: item.html}}></span>
                                                        <span className="text-[12px] sm:text-[13px] text-gray-300 font-medium italic">
                                                            <span className="text-white/20 mx-1.5 hidden sm:inline-block">|</span>
                                                            <span className="text-white/20 mr-1 sm:hidden">-</span>
                                                            {item.vi}
                                                        </span>
                                                    </div>
                                                    <button 
                                                        onClick={(e) => { e.stopPropagation(); playSpeech(item.en); }}
                                                        className="p-1.5 sm:p-2 rounded-full bg-white/5 border border-white/10 hover:bg-amber-500 hover:border-amber-400 hover:text-white text-gray-400 transition-all active:scale-90 shrink-0"
                                                        title={`Đọc phát âm từ: ${item.en}`}
                                                    >
                                                        <Icon name="volume2" className="w-3.5 h-3.5" />
                                                    </button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>

                                {/* TẦNG 3: AFFIXES (TIỀN TỐ/HẬU TỐ) DYNAMIC */}
                                {card.affixes && card.affixes.length > 0 && (
                                    <div className="mt-3 sm:mt-4 pt-3 sm:pt-4 border-t border-white/10 w-full animate-fade-in">
                                        <div className="flex items-center gap-2 text-emerald-400/90 text-[10px] sm:text-xs font-black tracking-[0.15em] uppercase mb-2 sm:mb-3">
                                            <Icon name="wand" className="w-3.5 h-3.5 sm:w-4 sm:h-4" /> Giải mã Affixes (Tiền / Hậu tố)
                                        </div>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 sm:gap-2.5">
                                            {card.affixes.map((afx, idx) => (
                                                <div key={idx} className="flex flex-col bg-white/5 border border-white/10 rounded-lg p-2 sm:p-2.5 hover:bg-white/10 transition-colors shadow-inner backdrop-blur-sm">
                                                    <div className="flex items-center gap-2 mb-1.5">
                                                        <span className={`text-[14px] sm:text-[15px] font-black drop-shadow-md ${afx.type === 'prefix' ? 'text-[#f472b6]' : 'text-[#f59e0b]'}`}>
                                                            {afx.affix}
                                                        </span>
                                                        <Icon name="chevronRight" className="w-3 h-3 text-white/30" />
                                                        <span className={`text-[9px] sm:text-[10px] border rounded font-bold px-1.5 py-0.5 shadow-sm ${getTypeTagClass(afx.type)}`}>
                                                            {afx.typeLabel}
                                                        </span>
                                                    </div>
                                                    <span className="text-[11px] sm:text-[12px] text-gray-300 font-medium leading-snug">
                                                        {afx.desc}
                                                    </span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                            
                            <div className="absolute bottom-6 sm:bottom-5 left-4 sm:left-5 z-50 num-fluid font-mono opacity-30 tracking-widest uppercase pointer-events-none">{index + 1} / {total}</div>
                        </div>
                    </div>
                </div>
            );
        });

        const App = () => {
            const initial = window.APP_STATE || { cards: [], ai: {}, theme: 'tho', view: 'single' };
            const isExported = window.IS_EXPORTED === true;
            
            const initMobile = window.innerWidth < 768;
            const [isMobile, setIsMobile] = useState(initMobile);
            
            const [cards] = useState(initial.cards);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isZoomed, setIsZoomed] = useState(false);
            const [isFs, setIsFs] = useState(false);
            const [theme, setTheme] = useState(initial.theme);
            
            const [viewMode, setViewMode] = useState(initMobile ? 'single' : initial.view);
            
            const [aiImages, setAiImages] = useState(initial.ai);
            const [generating, setGenerating] = useState({});
            const generatingRef = useRef(new Set()); 
            const [globalError, setGlobalError] = useState(""); 
            const [isNavActive, setIsNavActive] = useState(true);
            const navTimeoutRef = useRef(null);

            const [voices, setVoices] = useState([]);
            const [selectedVoice, setSelectedVoice] = useState(null);
            const [showVoiceMenu, setShowVoiceMenu] = useState(false);
            const [readingSpeed, setReadingSpeed] = useState(0.85);

            useEffect(() => {
                const handleVisibilityChange = () => {
                    if (document.hidden) {
                        document.body.classList.add('is-paused');
                        window.speechSynthesis.cancel(); 
                    } else {
                        document.body.classList.remove('is-paused');
                    }
                };
                document.addEventListener("visibilitychange", handleVisibilityChange);
                return () => document.removeEventListener("visibilitychange", handleVisibilityChange);
            }, []);

            useEffect(() => {
                const loadVoices = () => {
                    const availableVoices = window.speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
                    setVoices(availableVoices);
                    
                    setSelectedVoice(current => {
                        if (current) return current;
                        if (availableVoices.length === 0) return null;
                        const maleVoice = availableVoices.find(v => 
                            v.name.toLowerCase().includes('male') || 
                            v.name.toLowerCase().includes('david') ||
                            v.name.toLowerCase().includes('mark') ||
                            v.name.toLowerCase().includes('daniel') ||
                            v.name.toLowerCase().includes('arthur') ||
                            v.name.toLowerCase().includes('guy') ||
                            v.name.toLowerCase().includes('aaron')
                        );
                        return maleVoice ? maleVoice.name : availableVoices[0].name;
                    });
                };
                
                loadVoices();
                if (window.speechSynthesis.onvoiceschanged !== undefined) {
                    window.speechSynthesis.onvoiceschanged = loadVoices;
                }
            }, []);

            useEffect(() => {
                const checkMobile = () => {
                    const currentIsMobile = window.innerWidth < 768;
                    setIsMobile(currentIsMobile);
                    if (currentIsMobile && viewMode !== 'single') {
                        setViewMode('single');
                    }
                };
                window.addEventListener('resize', checkMobile);
                return () => window.removeEventListener('resize', checkMobile);
            }, [viewMode]);

            const navigate = useCallback((step) => {
                if (cards.length === 0) return;
                setCurrentIndex(prev => (prev + step + cards.length) % cards.length);
            }, [cards.length]);

            useEffect(() => {
                let lastCall = 0;
                const resetNav = () => {
                    const now = Date.now();
                    if (now - lastCall < 100) return; 
                    lastCall = now;

                    setIsNavActive(prev => {
                        if (!prev) return true;
                        return prev;
                    });

                    if (navTimeoutRef.current) clearTimeout(navTimeoutRef.current);
                    navTimeoutRef.current = setTimeout(() => setIsNavActive(false), 2500);
                };

                const options = { passive: true };
                window.addEventListener('mousemove', resetNav, options);
                window.addEventListener('touchmove', resetNav, options);
                window.addEventListener('click', resetNav, options);
                window.addEventListener('keydown', resetNav, options);
                
                resetNav();
                return () => {
                    window.removeEventListener('mousemove', resetNav);
                    window.removeEventListener('touchmove', resetNav);
                    window.removeEventListener('click', resetNav);
                    window.removeEventListener('keydown', resetNav);
                    if (navTimeoutRef.current) clearTimeout(navTimeoutRef.current);
                };
            }, []);

            useEffect(() => {
                const hFs = () => setIsFs(!!document.fullscreenElement);
                const hNav = (e) => navigate(e.detail);
                document.addEventListener('fullscreenchange', hFs);
                window.addEventListener('nav-slide', hNav);
                return () => {
                    document.removeEventListener('fullscreenchange', hFs);
                    window.removeEventListener('nav-slide', hNav);
                };
            }, [navigate]);

            useEffect(() => {
                if (viewMode !== 'single') return;
                const hKey = (e) => {
                    if (e.key === 'Enter' || e.key === 'ArrowRight') navigate(1);
                    else if (e.key === 'ArrowLeft') navigate(-1);
                };
                window.addEventListener('keydown', hKey);
                return () => window.removeEventListener('keydown', hKey);
            }, [viewMode, navigate]);

            const handleAiGen = useCallback(async (c) => {
                if (generatingRef.current.has(c.id)) return;
                generatingRef.current.add(c.id);
                setGenerating(p => ({...p, [c.id]: true}));
                
                const apiKey = "";
                const seed = Math.floor(Math.random() * 999999);
                const cleanContext = c.en.replace(/['"]/g, '');
                const prompt = `Premium high-end realistic stock photography. 
ACTION AND SCENE TO DEPICT: A creative representation of the concept "${cleanContext}".
INSTRUCTION: Act as a visual director. Translate the concept above into a candid, highly detailed photograph. Show the people, actions, and environment naturally. If the word is an abstract concept or feeling, illustrate it strictly through relatable human emotion, body language, and situation.
CAMERA & STYLE: Wide-angle shot, f/8 aperture, sharp focus on the whole scene, bright natural lighting, 8k resolution.
CRITICAL RULE: Pure visual storytelling. DO NOT INCLUDE ANY TEXT, WORDS, NUMBERS, OR TYPOGRAPHY. Any screens, papers, or boards MUST BE BLANK. Seed: ${seed}`;
                
                const delayMs = ms => new Promise(res => setTimeout(res, ms));
                const delays = [1000, 2000, 4000, 8000, 16000];
                let attempt = 0;
                let successBase64 = null;

                while (attempt < 6) {
                    try {
                        const r = await fetch('https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=' + apiKey, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                instances: { prompt },
                                parameters: { 
                                    sampleCount: 1, 
                                    aspectRatio: "3:4", 
                                    negativePrompt: "text, typography, letters, writing, words, numbers, signature, watermark, logo, branding, sign, label, subtitles, captions, speech bubble, paper, board, blurry, bokeh, out of focus, shallow depth of field, blurred background, painting, illustration, cartoon, 3d render, CGI, graphic design, abstract" 
                                }
                            })
                        });

                        if (r.ok) {
                            const d = await r.json();
                            if(d.predictions && d.predictions[0]) {
                                successBase64 = 'data:image/png;base64,' + d.predictions[0].bytesBase64Encoded;
                                break;
                            }
                        }
                        
                        if (attempt < 5) await delayMs(delays[attempt]);
                        attempt++;
                    } catch (e) {
                        if (attempt < 5) {
                            await delayMs(delays[attempt]);
                            attempt++;
                        } else {
                            break;
                        }
                    }
                }

                if (successBase64) {
                    const compressed = await compressImage(successBase64, 600);
                    setAiImages(p => ({...p, [c.id]: compressed}));
                } else {
                    setGlobalError("Hệ thống tạo ảnh đang quá tải. Xin vui lòng thử lại sau vài giây.");
                    setTimeout(() => setGlobalError(""), 5000);
                }

                generatingRef.current.delete(c.id);
                setGenerating(p => ({...p, [c.id]: false}));
            }, []);

            const handleThemeCycle = useCallback(() => {
                const keys = Object.keys(THEMES);
                const currentIdx = keys.indexOf(theme);
                const nextTheme = keys[(currentIdx + 1) % keys.length];
                setTheme(nextTheme);
            }, [theme]);

            const exportDoc = () => {
                const css = document.getElementById('custom-css').textContent;
                const js = document.getElementById('react-app-code').textContent;
                const state = JSON.stringify({ cards, ai: aiImages, theme, view: viewMode });
                const so = "<script", sc = "</" + "script>";
                let h = '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>Cosmos Elite Offline - Unit 1: Word Family & Affixes</title>';
                
                h += so + '>window.IS_EXPORTED = true;' + sc;
                h += so + ' id="app-state">window.APP_STATE = ' + state + ';' + sc;
                h += so + ' src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js">' + sc;
                h += so + ' src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js">' + sc;
                h += so + ' src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js">' + sc;
                h += so + ' src="https://cdn.tailwindcss.com">' + sc;
                h += '<style id="custom-css">' + css + '</style></head><body>';
                h += '<div id="offline-fallback" style="position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background-color:#000;color:white;z-index:-10;"><div style="border:3px solid rgba(255,255,255,0.1);border-top:3px solid #f59e0b;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin-bottom:20px;"></div><h2 style="font-size:1.2rem;font-weight:bold;color:#f59e0b;">Đang chuẩn bị bộ bài...</h2><p style="color:#a1a1aa;font-size:0.85rem;margin-top:10px;">(Cần kết nối Internet trong lần đầu tiên mở file)</p></div><style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>';
                h += '<div id="root"></div>';
                h += so + ' id="react-app-code" type="text/babel">' + js + sc + '</body></html>';
                
                const b = new Blob([h], { type: 'text/html' });
                const u = URL.createObjectURL(b);
                const a = document.createElement('a'); a.href = u; a.download = "Cosmos_Elite_Study_Unit_1_WordFamily.html"; a.click();
            };

            const themeSet = THEMES[theme];
            const themeStyle = { '--theme-bg': themeSet.bg, '--theme-r1': themeSet.r1, '--theme-r2': themeSet.r2 };

            if (!cards || cards.length === 0) return <div className="text-white p-10">Đang tải dữ liệu...</div>;

            return (
                <div className={'h-[100dvh] w-full overflow-hidden flex flex-col relative bg-black ' + (viewMode==='single'?'touch-none':'')} style={themeStyle}>
                    
                    {globalError && (
                        <div className="fixed top-16 sm:top-20 left-1/2 -translate-x-1/2 z-[200] bg-red-600/90 text-white px-5 py-2.5 rounded-full shadow-2xl backdrop-blur-xl flex items-center gap-3 animate-pulse whitespace-nowrap">
                            <span className="font-semibold text-xs sm:text-sm tracking-wide">{globalError}</span>
                        </div>
                    )}

                    <div className="mandala-wrapper">
                        <div className="master-mandala-bg"></div>
                    </div>
                    <div className="aurora-bg"><div className="blob b1"></div><div className="blob b2"></div></div>
                    
                    <div className="absolute top-4 sm:top-5 left-0 w-full px-4 sm:px-5 z-[100] flex justify-between items-center pointer-events-none">
                        
                        <div className="text-[8px] sm:text-[10px] font-bold tracking-[0.15em] sm:tracking-[0.2em] uppercase text-white/40 select-none ml-2 sm:ml-4 drop-shadow-md">
                            UNIT 1: WORD FAMILY & AFFIXES
                        </div>

                        <div className="pointer-events-auto flex items-center gap-2 sm:gap-3 sm:bg-black/60 p-1.5 sm:p-2 sm:px-4 rounded-full sm:backdrop-blur-xl sm:border sm:border-white/10 sm:shadow-2xl">
                            
                            <button 
                                onClick={() => setReadingSpeed(prev => prev === 1 ? 0.85 : 1)}
                                className="flex items-center justify-center h-6 sm:h-7 px-1 sm:px-1.5 rounded-full hover:bg-white/10 transition-colors cursor-pointer" 
                                title={`Tốc độ đọc: ${readingSpeed}x (Chạm để đổi)`}
                            >
                                <span className="text-[10px] sm:text-[11px] font-bold font-mono tracking-tight transition-colors text-gray-300">
                                    {readingSpeed === 1 ? '1.0x' : '0.85'}
                                </span>
                            </button>

                            <div className="h-3 w-px bg-white/20 mx-0.5"></div>

                            <div className="relative flex items-center justify-center">
                                <button 
                                    onClick={() => setShowVoiceMenu(!showVoiceMenu)}
                                    className="w-6 h-6 sm:w-7 sm:h-7 rounded-full hover:bg-white/10 transition-colors flex items-center justify-center" 
                                    title="Chọn giọng đọc tiếng Anh"
                                >
                                    <Icon name="mic" className={`w-3.5 h-3.5 sm:w-4 sm:h-4 transition-colors ${showVoiceMenu ? 'text-amber-400' : 'text-gray-400'}`} />
                                </button>

                                {showVoiceMenu && (
                                    <>
                                        <div className="fixed inset-0 z-[150]" onClick={() => setShowVoiceMenu(false)}></div>
                                        
                                        <div className="absolute top-full right-0 mt-3 w-64 max-h-[60vh] overflow-y-auto bg-gray-900/95 backdrop-blur-xl border border-white/20 rounded-xl shadow-2xl z-[200] flex flex-col p-2">
                                            <div className="text-[10px] sm:text-xs text-gray-400 uppercase tracking-widest px-3 py-2 font-bold border-b border-white/10 mb-1">
                                                Chọn Giọng Đọc
                                            </div>
                                            {voices.map(v => (
                                                <button 
                                                    key={v.name}
                                                    onClick={() => { setSelectedVoice(v.name); setShowVoiceMenu(false); }}
                                                    className={`text-left px-3 py-2.5 rounded-lg text-sm transition-colors w-full flex items-center justify-between gap-2 ${selectedVoice === v.name ? 'bg-amber-500/20 text-amber-300' : 'text-gray-200 hover:bg-white/10'}`}
                                                >
                                                    <span className="truncate flex-1">{v.name.replace(/Google |Microsoft |Apple /gi, '')}</span>
                                                    <span className="opacity-50 text-[10px] font-mono shrink-0 bg-black/40 px-1.5 py-0.5 rounded">{v.lang}</span>
                                                </button>
                                            ))}
                                            {voices.length === 0 && (
                                                <div className="text-gray-500 text-sm px-3 py-4 text-center">Đang tìm kiếm giọng đọc...</div>
                                            )}
                                        </div>
                                    </>
                                )}
                            </div>

                            <div className="hidden sm:block h-3 w-px bg-white/20 mx-0.5"></div>

                            <button 
                                onClick={handleThemeCycle} 
                                className="hidden sm:flex w-2.5 h-2.5 sm:w-5 sm:h-5 rounded-full opacity-15 sm:opacity-30 hover:opacity-100 transition-all hover:scale-150 items-center justify-center relative cursor-pointer" 
                                style={{ backgroundColor: THEMES[theme].color }}
                                title={`Đổi hệ màu (Đang dùng: ${THEMES[theme].label})`}
                            ></button>

                            {!isMobile && (
                                <>
                                    <div className="h-4 w-px bg-white/20 mx-1"></div>
                                    <button onClick={() => setViewMode(v => v==='single'?'grid':'single')} className="text-gray-400 hover:text-amber-400 p-1 transition-colors">
                                        <Icon name={viewMode==='single' ? 'layoutGrid' : 'monitor'} className="w-4 h-4 sm:w-5 sm:h-5" />
                                    </button>
                                    
                                    {!isExported && (
                                        <button onClick={exportDoc} className="text-indigo-400 pl-3 sm:pl-4 border-l border-white/20 hover:text-indigo-200 transition-colors p-1" title="Xuất file HTML để gửi học sinh">
                                            <Icon name="downloadCloud" className="w-4 h-4 sm:w-5 sm:h-5" />
                                        </button>
                                    )}
                                </>
                            )}
                        </div>
                    </div>

                    {!isMobile && viewMode === 'grid' && (
                        <div className={`fixed bottom-6 right-6 sm:bottom-8 sm:right-8 z-[100] flex flex-col items-center gap-1.5 bg-white/10 backdrop-blur-md border border-white/20 p-1.5 rounded-full transition-opacity duration-700 ${isNavActive ? 'opacity-100' : 'opacity-0 pointer-events-none'} shadow-2xl`}>
                            <button onClick={() => document.getElementById('grid-scroll-container')?.scrollTo({top: 0, behavior: 'smooth'})} className="p-2 text-white/70 hover:text-amber-400 hover:bg-white/20 rounded-full active:scale-90 transition-all" title="Cuộn lên đầu">
                                <Icon name="chevronUp" className="w-5 h-5" />
                            </button>
                            <div className="w-3 h-px bg-white/20"></div>
                            <button onClick={() => {
                                const el = document.getElementById('grid-scroll-container');
                                if(el) el.scrollTo({top: (el.scrollHeight - el.clientHeight) / 2, behavior: 'smooth'});
                            }} className="p-2 text-white/70 hover:text-amber-400 hover:bg-white/20 rounded-full active:scale-90 transition-all" title="Cuộn đến giữa trang">
                                <Icon name="circle" className="w-3 h-3 fill-current opacity-70" />
                            </button>
                            <div className="w-3 h-px bg-white/20"></div>
                            <button onClick={() => {
                                const el = document.getElementById('grid-scroll-container');
                                if(el) el.scrollTo({top: el.scrollHeight, behavior: 'smooth'});
                            }} className="p-2 text-white/70 hover:text-amber-400 hover:bg-white/20 rounded-full active:scale-90 transition-all" title="Cuộn xuống cuối">
                                <Icon name="chevronDown" className="w-5 h-5" />
                            </button>
                        </div>
                    )}

                    {viewMode === 'single' ? (
                        <main className="flex-1 flex flex-col items-center justify-center p-0 sm:p-6 z-10 w-full h-full relative">
                            <FlashcardItem 
                                key={cards[currentIndex].id} 
                                card={cards[currentIndex]} 
                                index={currentIndex} 
                                total={cards.length} 
                                isGrid={false} 
                                isZoomed={isZoomed} 
                                isExported={isExported} 
                                aiImage={aiImages[cards[currentIndex].id]} 
                                isGenerating={!!generating[cards[currentIndex].id]} 
                                onAction={handleAiGen} 
                                selectedVoice={selectedVoice} 
                                readingSpeed={readingSpeed}
                            />
                            
                            {!isMobile && (
                                <div className="flex items-center justify-center gap-6 mt-4 sm:mt-6 z-20 shrink-0">
                                    <button onClick={() => !document.fullscreenElement ? document.documentElement.requestFullscreen().catch(()=>{}) : document.exitFullscreen()} className="btn-glass p-4 rounded-full"><Icon name={isFs ? "minimize" : "maximize"} className="w-6 h-6" /></button>
                                    <button onClick={() => navigate(-1)} className="btn-glass p-6 rounded-full active:scale-90 transition-transform"><Icon name="chevronLeft" className="w-7 h-7" /></button>
                                    <button onClick={() => navigate(1)} className="btn-glass p-6 rounded-full active:scale-90 transition-transform"><Icon name="chevronRight" className="w-7 h-7" /></button>
                                    <button onClick={() => setIsZoomed(!isZoomed)} className="btn-glass p-3.5 rounded-full"><Icon name={isZoomed ? "zoomOut" : "zoomIn"} className="w-5 h-5" /></button>
                                </div>
                            )}

                            {isMobile && cards.length > 1 && (
                                <div 
                                    className="absolute bottom-5 left-1/2 -translate-x-1/2 w-[50%] max-w-[200px] z-[100] pointer-events-auto flex items-center"
                                    onPointerDown={(e) => e.stopPropagation()}
                                >
                                    <input 
                                        type="range" 
                                        min="0" 
                                        max={cards.length - 1} 
                                        value={currentIndex} 
                                        onChange={(e) => {
                                            e.stopPropagation();
                                            setCurrentIndex(parseInt(e.target.value, 10));
                                        }}
                                        className="mobile-slider"
                                        aria-label="Thanh trượt điều hướng thẻ"
                                    />
                                </div>
                            )}
                        </main>
                    ) : (
                        <main id="grid-scroll-container" className="flex-1 w-full h-full overflow-x-hidden overflow-y-auto z-10 scroll-smooth">
                            <div className="w-full max-w-[1200px] mx-auto px-4 sm:px-8 lg:px-12 pt-28 sm:pt-32 pb-40">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-x-12 lg:gap-x-24 gap-y-24 sm:gap-y-36 justify-items-center">
                                    {cards.map((c, idx) => (
                                        <FlashcardItem 
                                            key={c.id} 
                                            card={c} 
                                            index={idx} 
                                            total={cards.length} 
                                            isGrid={true} 
                                            isExported={isExported} 
                                            aiImage={aiImages[c.id]} 
                                            isGenerating={!!generating[c.id]} 
                                            onAction={handleAiGen} 
                                            selectedVoice={selectedVoice} 
                                            readingSpeed={readingSpeed}
                                        />
                                    ))}
                                </div>
                            </div>
                        </main>
                    )}

                    <div className="fixed bottom-1.5 sm:bottom-3 right-2.5 sm:right-4 z-[90] text-[7px] sm:text-[9px] text-white/20 tracking-wider uppercase font-medium select-none pointer-events-none">
                        Developed by Viễn Thông Quy Nhơn
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script></body></html>
