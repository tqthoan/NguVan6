            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
        }

        .tutor-text { line-height: 2.4 !important; }
        .tutor-text span[class^="grammar-"], .tutor-text span.highlight-signal-word {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.05)) !important;
            padding: 4px 10px !important;
            border-radius: 8px !important;
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            margin: 0 4px !important;
            box-shadow: 0 2px 6px rgba(0,0,0,0.25) !important;
            display: inline-block !important;
            white-space: nowrap !important;
        }

        .hypnotic-bg {
            background: radial-gradient(circle at center, #1A1A2E 0%, #0A0A12 100%);
            height: 100vh; width: 100vw; position: absolute; z-index: -1;
        }

        .diamond-container { width: 90px; height: 75px; filter: drop-shadow(0 0 25px rgba(0, 229, 255, 0.4)); }
        .diamond-3d { width: 100%; height: 100%; animation: float-diamond 4s ease-in-out infinite; }
        @keyframes float-diamond { 0%, 100% { transform: translateY(0) rotateX(10deg); } 50% { transform: translateY(-10px) rotateX(-5deg); } }

        .word-glow { text-shadow: 0 0 15px #00E5FF; }
        .timer-bar { transition: width 0.1s linear; }

        .glass-panel {
            background: rgba(10, 10, 20, 0.98);
            backdrop-filter: blur(35px);
            border: 1px solid rgba(167, 139, 250, 0.1);
        }

        .home-btn-fixed {
            position: fixed; top: 1rem; left: 1.5rem; z-index: 5000;
            color: #4b5563; background: rgba(255, 255, 255, 0.05);
            width: 48px; height: 48px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .home-btn-fixed:hover { color: #00E5FF; transform: scale(1.1); background: rgba(0, 229, 255, 0.1); border-color: #00E5FF; }

        #cortex-btn {
            opacity: 0.1;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.3);
            transition: all 1s ease-in-out;
        }
        .btn-stage-1 { opacity: 0.6 !important; background: #1e3a8a !important; color: #93c5fd !important; border-color: #3b82f6 !important; }
        .btn-stage-2 { opacity: 0.8 !important; background: #701a75 !important; color: #f5d0fe !important; border-color: #d946ef !important; }
        .btn-stage-3-neuron { opacity: 1 !important; background: #00E5FF !important; color: #000 !important; box-shadow: 0 0 30px rgba(0, 229, 255, 0.6) !important; font-weight: 800 !important; }
        .btn-stage-3-synapse { opacity: 1 !important; background: #FFD700 !important; color: #000 !important; box-shadow: 0 0 30px rgba(255, 215, 0, 0.6) !important; font-weight: 800 !important; }

        ::-webkit-scrollbar-thumb { background: rgba(167, 139, 250, 0.2); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0, 229, 255, 0.3); border-radius: 10px; }

        // 2. STATE & UTILITIES
        let currentMode = ''; let currentLevel = 0; let activeData = []; let currentIndex = 0;
        let wrongItemsData = []; let currentPool = []; let firstTryCount = 0;
        let isRepracticing = false; let currentItemFailed = false; 
        let timerInterval; let timeLeft = 10; let brighteningInterval;
        const synth = window.speechSynthesis;

        function getCurrentItem() {
            if (isRepracticing) return currentPool[currentIndex] ? currentPool[currentIndex].item : activeData[0];
            return activeData[currentIndex] || activeData[0];
        }
        function vibrate(ms=20) { if (navigator.vibrate) navigator.vibrate(ms); }
        function clean(str) { return str ? str.trim().replace(/\s+/g, ' ') : ""; }
        function playAudio(txt) { if(!txt) return; if(synth.speaking) synth.cancel(); let u = new SpeechSynthesisUtterance(txt); u.lang='en-US'; u.rate=0.85; synth.speak(u); }

        // BỘ LỌC TÔ MÀU NGỮ PHÁP TỰ ĐỘNG & TRIỆT ĐỂ (UNIT 8 - Adverbs of Frequency & Future schedules)
        function highlightGrammar(text, isMixed = false) {
            if (!text) return "";
            
            const getRegex = (words) => new RegExp(`(^|[^\\p{L}])(${words})(?=[^\\p{L}]|$)(?![^<]*>)`, 'giu');

            // 1. Dấu hiệu nhận biết - Các trạng từ tần suất & mốc thời gian lịch trình
            const signals = "always|usually|normally|generally|often|frequently|sometimes|occasionally|rarely|seldom|hardly ever|never|tomorrow|next|every|on Sundays|at 7 a.m.|at 10 p.m.|at 8 p.m.|this weekend";
            text = text.replace(getRegex(signals), "$1<span class='highlight-signal-word'>$2</span>");

            // 2. Phân loại từ
            let modals = "will|won't|can|could|should|would|might|must";
            if (!isMixed) modals += "|may"; 

            let bes = "is|are|was|were|been|being";
            if (!isMixed) bes += "|am|be"; 

            let preps = "on|at|for|with|about|without|under|over|by|from|around|through|inside|behind|into|onto|during|via|opposite";
            if (!isMixed) preps += "|in|to"; 

            let deters = "the|my|your|his|her|our|their|its|mine|yours|theirs|ours|any|some|many|all|each|another|this|that|these|those|more|less";
            if (!isMixed) deters += "|a|an"; 

            let conjs = "and|but|or|because|if|whether|although|that|than|so|for|therefore|otherwise|how|what|why|where|which|who";
            if (!isMixed) conjs += "|so"; 

            text = text.replace(getRegex(modals), "$1<span class='grammar-verb-modal'>$2</span>");
            text = text.replace(getRegex(bes), "$1<span class='grammar-verb-be'>$2</span>");
            text = text.replace(getRegex(preps), "$1<span class='grammar-preposition'>$2</span>");
            text = text.replace(getRegex(deters), "$1<span class='grammar-determiner'>$2</span>");
            text = text.replace(getRegex(conjs), "$1<span class='grammar-conjunction'>$2</span>");

            // 3. Trợ động từ
            const doDoes = "do|does|don't|doesn't|did|didn't";
            text = text.replace(getRegex(doDoes), "$1<span class='grammar-verb-aux'>$2</span>");

            // 4. Xử lý hậu tố động từ/danh từ (Unit 8 Lớp 8)
            if (!isMixed) {
                const ingVerbs = "shop|buy|surf|wander";
                text = text.replace(new RegExp(`\\b(${ingVerbs})(ing)\\b(?![^<]*>)`, 'gi'), "<span class='grammar-verb-main'>$1</span><span class='grammar-verb-suffix'>$2</span>");
                
                // Các động từ ED
                const edVerbs = "addict|order|clos|advertis";
                text = text.replace(new RegExp(`\\b(${edVerbs})(ed)\\b(?![^<]*>)`, 'gi'), "<span class='grammar-verb-main'>$1</span><span class='grammar-verb-suffix'>$2</span>");

                const irrV2 = "had|spent|saw|took|met|went|slept|cried|did|wore|wrote|read|got|built|shone|grew|sang|ran|became|bought|ate|felt|flew|made|thought|won|taught|forgot|rode|came|gave|knew|understood|stared|found|drank|sent|left";
                text = text.replace(new RegExp(`\\b(${irrV2})\\b(?![^<]*>)`, 'gi'), "<span class='grammar-irr-v2'>$&</span>");

                // Thêm hậu tố S/ES của Hiện tại đơn / Số nhiều
                const verbS = "open|close|expire|start|sell|make|attract|provide|cost";
                text = text.replace(new RegExp(`\\b(${verbS})(s)\\b(?![^<]*>)`, 'gi'), "<span class='grammar-verb-main'>$1</span><span class='grammar-verb-suffix'>$2</span>");

                const nounS = "shop|discount|thing|advertisement|customer|item|vegetable|cake|product|brand";
                text = text.replace(new RegExp(`\\b(${nounS})(s)\\b(?![^<]*>)`, 'gi'), "<span class='grammar-noun'>$1</span><span class='grammar-verb-suffix'>$2</span>");
            }

            return text;
        }

        // THUẬT TOÁN TÌM LỖI SAI (DIFF)
        function getSentenceDiffHTML(typed, correct) {
            if (!typed) return `<span class="text-red-500">(Bạn chưa gõ gì cả)</span>`;
            const typedWords = typed.trim().split(/\s+/).filter(w => w);
            const correctWords = correct.trim().split(/\s+/).filter(w => w);
            
            let dp = Array(typedWords.length + 1).fill(null).map(() => Array(correctWords.length + 1).fill(0));
            for (let i = 1; i <= typedWords.length; i++) {
                for (let j = 1; j <= correctWords.length; j++) {
                    if (typedWords[i-1].toLowerCase().replace(/[.,!?]/g, '') === correctWords[j-1].toLowerCase().replace(/[.,!?]/g, '')) {
                        dp[i][j] = dp[i-1][j-1] + 1;
                    } else {
                        dp[i][j] = Math.max(dp[i-1][j], dp[i][j-1]);
                    }
                }
            }
            
            let i = typedWords.length, j = correctWords.length;
            let diff = [];
            while (i > 0 || j > 0) {
                if (i > 0 && j > 0 && typedWords[i-1].toLowerCase().replace(/[.,!?]/g, '') === correctWords[j-1].toLowerCase().replace(/[.,!?]/g, '')) {
                    diff.unshift({ type: 'equal', value: correctWords[j-1] });
                    i--; j--;
                } else if (j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) {
                    diff.unshift({ type: 'insert', value: correctWords[j-1] });
                    j--;
                } else if (i > 0 && (j === 0 || dp[i][j-1] < dp[i-1][j])) {
                    diff.unshift({ type: 'delete', value: typedWords[i-1] });
                    i--;
                }
            }
            
            let html = '';
            diff.forEach(part => {
                if (part.type === 'equal') {
                    html += `<span class="text-gray-300">${part.value}</span> `;
                } else if (part.type === 'delete') {
                    html += `<span class="text-red-500 line-through decoration-red-500/50">${part.value}</span> `;
                } else if (part.type === 'insert') {
                    html += `<span class="text-[#0ea5e9] bg-[#0ea5e9]/20 px-1.5 py-0.5 rounded-md font-bold shadow-sm border border-[#0ea5e9]/30">${part.value}</span> `;
                }
            });
            return html.trim();
        }

        function isSentenceMatch(typed, original, alternatives) {
            let cleanTyped = clean(typed).toLowerCase().replace(/[.,!?]/g, '');
            let valid = [clean(original).toLowerCase().replace(/[.,!?]/g, '')];
            if (alternatives) {
                alternatives.forEach(alt => valid.push(clean(alt).toLowerCase().replace(/[.,!?]/g, '')));
            }
            return valid.includes(cleanTyped);
        }

        function markError(item) {
            currentItemFailed = true;
            if (!isRepracticing && !wrongItemsData.find(x => x.item.w === item.w)) {
                wrongItemsData.push({ item: item, streak: 0 });
                updateErrorUI();
            }
        }

        // 3. UI MANAGEMENT
        function hideAll() {
            ['screen-home', 'screen-neuron', 'screen-synapse', 'screen-reward', 'modal-cortex', 'modal-milestone'].forEach(id => {
                const el = document.getElementById(id); if(el) el.classList.add('hidden');
            });
        }
        function goHome() { clearInterval(timerInterval); clearInterval(brighteningInterval); hideAll(); document.getElementById('screen-home').classList.remove('hidden'); }
        function updateErrorUI() { 
            document.getElementById('neuron-error-num').innerText = wrongItemsData.length;
            document.getElementById('synapse-error-num').innerText = wrongItemsData.length;
        }

        function updateProgressUI() {
            let nProg = document.getElementById('neuron-progress');
            let sProg = document.getElementById('synapse-progress');
            if (isRepracticing) {
                let requiredStreak = currentMode === 'neuron' ? 3 : 2;
                nProg.innerText = `Luyện lại: ${requiredStreak} lần`;
                sProg.innerText = `Luyện lại: ${requiredStreak} lần`;
                nProg.classList.add('text-[#FFD700]'); sProg.classList.add('text-[#FFD700]');
            } else {
                nProg.innerText = `L${currentLevel + 1} - ${currentIndex + 1}/${activeData.length}`;
                sProg.innerText = `L${currentLevel + 1} - ${currentIndex + 1}/${activeData.length}`;
                nProg.classList.remove('text-[#FFD700]'); sProg.classList.remove('text-[#FFD700]');
            }
        }

        function startMode(mode, levelIdx) {
            if(window.speechSynthesis) window.speechSynthesis.cancel();
            currentMode = mode; currentLevel = levelIdx; isRepracticing = false; wrongItemsData = [];
            
            // Chia chặng cho 60 từ (L1: 1-20, L2: 21-40, L3: 41-60)
            let start = 0; let end = 10;
            if (mode === 'neuron') {
                if(levelIdx === 0) { start = 0; end = 20; }
                else if(levelIdx === 1) { start = 20; end = 40; }
                else { start = 40; end = unit8Raw.length; }
            } else {
                // Synapse chia thành 6 chặng, mỗi chặng 10 câu
                start = levelIdx * 10; end = Math.min(start + 10, unit8Raw.length);
            }
            
            // Xử lý dữ liệu và highlight grammar một cách triệt để
            activeData = unit8Raw.slice(start, end).map(d => {
                let regexTarget = new RegExp(`\\b(${d.w})\\b`, 'gi');
                let targetHTML = `<span class='${d.typeClass}'>${d.w_html}</span>`;

                // Câu chuẩn & đồng nghĩa TA 100% tiếng Anh -> Không Mixed
                let sHTML = d.s.replace(regexTarget, targetHTML);
                sHTML = highlightGrammar(sHTML, false);

                let en_syn_html = d.en_syn_html ? highlightGrammar(d.en_syn_html, false) : undefined;
                let alt_s_html = (d.alt_s || []).map(alt => {
                    let altHTML = alt.replace(regexTarget, targetHTML);
                    return highlightGrammar(altHTML, false);
                });

                // AI Tutor: Để tránh việc highlightGrammar bọc thêm lớp làm vỡ w_html 
                const maskToken = "___TGT_MASK___";
                const escapeRegExp = (string) => string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const safeTarget = escapeRegExp(d.w);
                
                let aiN_Masked = d.ai_n.replace(new RegExp(`\\b${safeTarget}\\b`, 'gi'), maskToken);
                let aiN_Highlighted = highlightGrammar(aiN_Masked, true);
                let aiN_HTML = aiN_Highlighted.replace(new RegExp(maskToken, 'g'), targetHTML);

                let aiS_Masked = d.ai_s.replace(new RegExp(`\\b${safeTarget}\\b`, 'gi'), maskToken);
                let aiS_Highlighted = highlightGrammar(aiS_Masked, true);
                let aiS_HTML = aiS_Highlighted.replace(new RegExp(maskToken, 'g'), targetHTML);

                return { ...d, s_html: sHTML, ai_n_html: aiN_HTML, ai_s_html: aiS_HTML, alt_s_html: alt_s_html, en_syn_html: en_syn_html };
            });

            currentPool = activeData.map(i => ({ item: i, streak: 0 }));
            currentIndex = 0; firstTryCount = 0; updateErrorUI(); hideAll();
            if(mode === 'neuron') { document.getElementById('screen-neuron').classList.remove('hidden'); loadNeuron(); }
            else { document.getElementById('screen-synapse').classList.remove('hidden'); loadSynapse(); }
        }

        function showCortex(html, isSuccess = false) {
            const modal = document.getElementById('modal-cortex');
            modal.setAttribute('data-is-success', isSuccess);
            const btn = document.getElementById('cortex-btn');
            const item = getCurrentItem();

            clearInterval(brighteningInterval);
            btn.style.opacity = "0.1";
            btn.className = "w-full max-w-sm py-4 rounded-2xl font-black uppercase tracking-[0.4em] mt-4 mb-4 shrink-0 transition-all active:scale-95";
            btn.innerText = isRepracticing ? "TÁI KẾT NỐI" : "TIẾP TỤC";

            playAudio(currentMode === 'neuron' ? item.w : item.s);

            let totalWait = currentMode === 'neuron' ? 5000 : 8000;
            let stepInterval = currentMode === 'neuron' ? 1600 : 2600;

            setTimeout(() => {
                let stage = 0;
                brighteningInterval = setInterval(() => {
                    stage++;
                    if (stage === 1) btn.classList.add('btn-stage-1');
                    else if (stage === 2) { btn.classList.remove('btn-stage-1'); btn.classList.add('btn-stage-2'); }
                    else if (stage === 3) {
                        btn.classList.remove('btn-stage-2');
                        btn.classList.add(currentMode === 'neuron' ? 'btn-stage-3-neuron' : 'btn-stage-3-synapse');
                        clearInterval(brighteningInterval);
                    }
                }, stepInterval);
            }, 1000);

            document.getElementById('cortex-message').innerHTML = html;
            modal.classList.remove('hidden');
            clearInterval(timerInterval);
        }

        function closeCortex() { 
            if(window.speechSynthesis) window.speechSynthesis.cancel();
            const isSuccess = document.getElementById('modal-cortex').getAttribute('data-is-success') === 'true';
            document.getElementById('modal-cortex').classList.add('hidden'); 
            advance(isSuccess); 
        }

        function advance(isCorrect) {
            if (!isRepracticing && isCorrect && !currentItemFailed) firstTryCount++;
            if (isCorrect && (currentIndex + 1) % 10 === 0 && !isRepracticing && (currentIndex + 1) !== activeData.length) {
                document.getElementById('modal-milestone').classList.remove('hidden');
                document.getElementById('milestone-title').innerText = "CỰC KỲ XUẤT SẮC!";
                return;
            }
            advanceLogic();
        }

        function advanceLogic() {
            if (isRepracticing) {
                let requiredStreak = currentMode === 'neuron' ? 3 : 2;
                if (currentPool[currentIndex].streak >= requiredStreak) {
                    currentPool.splice(currentIndex, 1);
                } else {
                    currentIndex++;
                }
                if (currentPool.length === 0) { showReward(); return; }
                if (currentIndex >= currentPool.length) currentIndex = 0;
            } else {
                currentIndex++; if (currentIndex >= activeData.length) { showReward(); return; }
            }
            if (currentMode === 'neuron') loadNeuron(); else loadSynapse();
        }
        
        function closeMilestone() { 
            if(window.speechSynthesis) window.speechSynthesis.cancel();
            document.getElementById('modal-milestone').classList.add('hidden'); 
            advanceLogic(); 
        }

        // --- NEURON LOGIC ---
        function loadNeuron() {
            clearInterval(timerInterval);
            const item = getCurrentItem(); currentItemFailed = false;
            updateProgressUI();
            document.getElementById('neuron-word').innerHTML = `<span class="text-gray-100 tracking-wide text-4xl md:text-5xl font-medium px-4 leading-tight">${item.vi}</span>`;
            document.getElementById('neuron-input').value = ''; document.getElementById('neuron-input').focus();
            timeLeft = 10; document.getElementById('neuron-timer').style.width = '100%';
            timerInterval = setInterval(() => { timeLeft -= 0.1; document.getElementById('neuron-timer').style.width = `${timeLeft * 10}%`; if (timeLeft <= 0) { clearInterval(timerInterval); markError(item); handleNeuronFail(true); } }, 100);
        }
        
        function handleNeuronCheck() {
            if(window.speechSynthesis) window.speechSynthesis.cancel();
            const item = getCurrentItem(); const val = document.getElementById('neuron-input').value;
            const typed = clean(val).toLowerCase();
            if (typed === item.w.toLowerCase()) {
                if (isRepracticing) currentPool[currentIndex].streak++;
                showCortex(`
                    <div class="text-[10px] text-[#4ade80] uppercase font-black tracking-widest text-center border-b border-[#4ade80]/20 pb-2 mb-4 w-full">✅ CHÍNH XÁC</div>
                    <div class="bg-black/40 p-5 md:p-8 rounded-[2rem] border border-[#4ade80]/20 w-full shadow-2xl text-center">
                        <div class="flex items-center justify-center gap-4 md:gap-6 mt-1 mb-2">
                            <span class="${item.typeClass} text-5xl md:text-7xl tracking-tighter">${item.w_html}</span>
                            <button onclick="playAudio('${item.w.replace(/'/g, "\\'")}')" class="p-3 opacity-80 hover:opacity-100 bg-[#00E5FF]/10 rounded-full transition-transform hover:scale-110 shadow-lg border border-[#00E5FF]/30 flex-shrink-0">
                                ${SVG_PLAY_L}
                            </button>
                        </div>
                        
                        <div class="mt-3 italic text-2xl md:text-3xl font-mono flex flex-wrap items-center justify-center gap-x-3 gap-y-2">
                            <span class="${item.typeClass} font-bold">${item.type}</span>
                            <span class="text-[#FF00FF]">${item.p}</span>
                            <span class="text-gray-500 hidden md:inline-block">—</span>
                            <span class="text-white font-medium not-italic">${item.vi}</span>
                            ${item.vi_syn ? `<span class="text-gray-400 text-lg not-italic">(${item.vi_syn})</span>` : ''}
                        </div>

                        ${item.en_syn_html ? `
                        <div class="mt-5 border-t border-white/10 pt-4 flex flex-col items-center">
                            <p class="text-[11px] text-gray-400 uppercase opacity-80 mb-2 font-bold tracking-widest flex items-center gap-2">
                                ${SVG_SYN} Từ đồng nghĩa
                            </p>
                            <div class="text-xl md:text-2xl tracking-wide">${item.en_syn_html}</div>
                        </div>` : ''}
                    </div>
                    <div class="tutor-box w-full mt-3 p-4 md:p-5">
                        <div class="tutor-title mb-1">${SVG_TUTOR} AI TUTOR: NGỮ ÂM & NGỮ DỤNG</div>
                        <div class="tutor-text text-lg md:text-xl text-gray-200 leading-relaxed">${item.ai_n_html}</div>
                    </div>`, true);
            } else { markError(item); handleNeuronFail(false, typed); }
        }
        
        function handleNeuronFail(isT, typed = "") {
            const item = getCurrentItem();
            if (isRepracticing) currentPool[currentIndex].streak = 0; 
            showCortex(`
                    <div class="text-sm text-red-500 font-bold uppercase tracking-widest bg-red-900/20 inline-block px-4 py-1.5 rounded-full border border-red-500/30 mb-3">
                        ${isT ? "⏳ Hết giờ" : "❌ Chưa đúng"}
                    </div>
                    ${!isT ? `<div class="mb-3 text-gray-400 text-base md:text-lg">Bạn đã gõ: <span class="text-red-400 line-through font-mono ml-2 text-2xl md:text-3xl font-medium">${typed || "(trống)"}</span></div>` : ""}
                    <div class="bg-black/40 p-5 md:p-8 rounded-[2rem] border border-[#4ade80]/20 w-full shadow-2xl text-center">
                        <div class="flex items-center justify-center gap-4 md:gap-6 mt-1 mb-2">
                            <span class="${item.typeClass} text-5xl md:text-7xl tracking-tighter">${item.w_html}</span>
                            <button onclick="playAudio('${item.w.replace(/'/g, "\\'")}')" class="p-3 opacity-80 hover:opacity-100 bg-[#00E5FF]/10 rounded-full transition-transform hover:scale-110 shadow-lg border border-[#00E5FF]/30 flex-shrink-0">
                                ${SVG_PLAY_L}
                            </button>
                        </div>
                        
                        <div class="mt-3 italic text-2xl md:text-3xl font-mono flex flex-wrap items-center justify-center gap-x-3 gap-y-2">
                            <span class="${item.typeClass} font-bold">${item.type}</span>
                            <span class="text-[#FF00FF]">${item.p}</span>
                            <span class="text-gray-500 hidden md:inline-block">—</span>
                            <span class="text-white font-medium not-italic">${item.vi}</span>
                            ${item.vi_syn ? `<span class="text-gray-400 text-lg not-italic">(${item.vi_syn})</span>` : ''}
                        </div>

                        ${item.en_syn_html ? `
                        <div class="mt-5 border-t border-white/10 pt-4 flex flex-col items-center">
                            <p class="text-[11px] text-gray-400 uppercase opacity-80 mb-2 font-bold tracking-widest flex items-center gap-2">
                                ${SVG_SYN} Từ đồng nghĩa
                            </p>
                            <div class="text-xl md:text-2xl tracking-wide">${item.en_syn_html}</div>
                        </div>` : ''}
                    </div>
                    <div class="tutor-box w-full mt-3 p-4 md:p-5">
                        <div class="tutor-title mb-1">${SVG_TUTOR} AI TUTOR: NGỮ ÂM & NGỮ DỤNG</div>
                        <div class="tutor-text text-lg md:text-xl text-gray-200 leading-relaxed">${item.ai_n_html}</div>
                    </div>`, false);
        }

        // --- SYNAPSE LOGIC ---
        function loadSynapse() {
            const item = getCurrentItem(); currentItemFailed = false;
            updateProgressUI();
            document.getElementById('synapse-vi-sen').innerText = item.vis;
            document.getElementById('synapse-input').value = ''; document.getElementById('synapse-input').focus();
        }
        
        function handleSynapseCheck() {
            if(window.speechSynthesis) window.speechSynthesis.cancel();
            const item = getCurrentItem(); 
            const typed = clean(document.getElementById('synapse-input').value);
            if(!typed) { vibrate(50); return; }
            
            const isC = isSentenceMatch(typed, item.s, item.alt_s);
            
            let altSentencesHTML = '';
            if (item.alt_s_html && item.alt_s_html.length > 0) {
                altSentencesHTML = `
                <div class="mt-4 border-t border-white/10 pt-3 text-left">
                    <p class="text-[11px] text-[#FFD700] uppercase opacity-90 mb-2 font-bold tracking-widest flex items-center gap-2">
                        ${SVG_CORRECT} Các câu đúng khác được chấp nhận:
                    </p>
                    <ul class="space-y-2">
                        ${item.alt_s_html.map(alt => `
                            <li class="flex items-start gap-3">
                                <span class="text-[#FFD700] mt-1">✓</span>
                                <span class="text-lg md:text-xl tracking-wide leading-relaxed text-gray-200">${alt}</span>
                            </li>
                        `).join('')}
                    </ul>
                </div>`;
            }

            if (isC) {
                if (isRepracticing) currentPool[currentIndex].streak++;
                showCortex(`
                    <div class="text-sm text-[#4ade80] font-bold uppercase tracking-widest bg-[#4ade80]/10 inline-block px-4 py-1.5 rounded-full border border-[#4ade80]/30 mb-3">🎉 Chính xác</div>
                    <div class="bg-black/40 p-5 md:p-6 rounded-[2rem] border border-[#4ade80]/20 w-full shadow-2xl text-left mb-3">
                        <p class="text-[11px] text-[#4ade80] uppercase opacity-80 mb-2 font-bold tracking-widest flex items-center gap-2">${SVG_CHECK} Câu chuẩn (Khuyến nghị):</p>
                        <div class="flex items-start justify-between gap-4 mb-2">
                            <div class="text-xl md:text-3xl tracking-wide leading-snug text-white flex-1">${item.s_html}</div>
                            <button onclick="playAudio('${item.s.replace(/'/g, "\\'")}')" class="p-2 md:p-3 opacity-80 hover:opacity-100 bg-[#4ade80]/10 rounded-full transition-transform hover:scale-110 shadow-lg border border-[#4ade80]/30 flex-shrink-0">
                                ${SVG_PLAY_D}
                            </button>
                        </div>
                        ${altSentencesHTML}
                    </div>
                    <div class="tutor-box w-full mt-0 p-4 md:p-5">
                        <div class="tutor-title mb-1">${SVG_TUTOR} AI TUTOR: PHÂN TÍCH CẤU TRÚC</div>
                        <div class="tutor-text text-base md:text-lg text-gray-200 leading-snug">${item.ai_s_html}</div>
                    </div>`, true);
            } else {
                markError(item);
                if (isRepracticing) currentPool[currentIndex].streak = 0; 
                const diffHTML = getSentenceDiffHTML(typed, item.s);
                
                showCortex(`
                    <div class="text-sm text-red-500 font-bold uppercase tracking-widest bg-red-900/20 inline-block px-4 py-1.5 rounded-full border border-red-500/30 mb-3">❌ Chưa đúng</div>
                    <div class="bg-[#1A1A2E]/80 p-4 md:p-5 rounded-3xl mb-3 w-full text-left border border-red-500/20 shadow-inner">
                        <div class="text-xs text-[#00E5FF] uppercase font-bold mb-2 opacity-80 tracking-widest flex items-center gap-2">${SVG_ERR} Phân tích lỗi sai:</div>
                        <div class="text-xl md:text-3xl font-medium tracking-wide leading-relaxed bg-black/60 p-4 rounded-xl border border-red-500/30 flex flex-wrap gap-x-1 gap-y-1 shadow-inner">${diffHTML}</div>
                    </div>
                    <div class="bg-black/40 p-5 md:p-6 rounded-[2rem] border border-[#00E5FF]/20 w-full shadow-2xl text-left mb-3">
                        <p class="text-[11px] text-[#00E5FF] uppercase opacity-80 mb-2 font-bold tracking-widest flex items-center gap-2">${SVG_CHECK} Đáp án đúng chuẩn:</p>
                        <div class="flex items-start justify-between gap-4 mb-2">
                            <div class="text-xl md:text-3xl tracking-wide leading-snug text-white flex-1">${item.s_html}</div>
                            <button onclick="playAudio('${item.s.replace(/'/g, "\\'")}')" class="p-2 md:p-3 opacity-80 hover:opacity-100 bg-[#00E5FF]/10 rounded-full transition-transform hover:scale-110 shadow-lg border border-[#00E5FF]/30 flex-shrink-0">
                                ${SVG_PLAY_E}
                            </button>
                        </div>
                        ${altSentencesHTML}
                    </div>
                    <div class="tutor-box w-full mt-0 p-4 md:p-5">
                        <div class="tutor-title mb-1">${SVG_TUTOR} AI TUTOR: PHÂN TÍCH CẤU TRÚC</div>
                        <div class="tutor-text text-base md:text-lg text-gray-200 leading-snug">${item.ai_s_html}</div>
                    </div>`, false);
            }
        }

        function showReward() {
            hideAll(); document.getElementById('screen-reward').classList.remove('hidden'); document.getElementById('screen-reward').classList.add('flex');
            document.getElementById('final-accuracy').innerText = `${firstTryCount}/${activeData.length}`;
            const t = document.getElementById('final-title'); const acc = (firstTryCount/activeData.length)*100;
            if(acc < 50) t.innerText = "TÂN BINH TƯƠNG LAI"; else if(acc<100) t.innerText = "KỸ SƯ KHÔNG GIAN"; else t.innerText = "HUYỀN THOẠI SYNAPSE";
            if(isRepracticing || wrongItemsData.length === 0) document.getElementById('reward-error-section').classList.add('hidden');
            else { document.getElementById('reward-error-section').classList.remove('hidden'); document.getElementById('reward-error-count').innerText = wrongItemsData.length; }
            vibrate(100);
        }

        function startRepractice() { isRepracticing = true; currentPool = [...wrongItemsData]; currentIndex = 0; hideAll(); if (currentMode === 'neuron') { document.getElementById('screen-neuron').classList.remove('hidden'); loadNeuron(); } else { document.getElementById('screen-synapse').classList.remove('hidden'); loadSynapse(); } }

        function exportApp() {
            const clone = document.documentElement.cloneNode(true);
            const exportBtns = clone.querySelectorAll('.export-btn-ui');
            exportBtns.forEach(btn => btn.remove()); 
            const blob = new Blob(["<!DOCTYPE html>\n" + clone.outerHTML], { type: "text/html;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); 
            a.href = url; 
            a.download = "Neuro_Lingo_Unit8_Grade8.html";
            document.body.appendChild(a); 
            a.click(); 
            document.body.removeChild(a); 
            URL.revokeObjectURL(url);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if(window.speechSynthesis) window.speechSynthesis.cancel();
                const modal = document.getElementById('modal-cortex');
                const milestone = document.getElementById('modal-milestone');
                const neuron = !document.getElementById('screen-neuron').classList.contains('hidden');
                const synapse = !document.getElementById('screen-synapse').classList.contains('hidden');
                if (modal && !modal.classList.contains('hidden')) { e.preventDefault(); closeCortex(); }
                else if (milestone && !milestone.classList.contains('hidden')) { e.preventDefault(); closeMilestone(); }
                else if (neuron) { e.preventDefault(); handleNeuronCheck(); }
                else if (synapse) { e.preventDefault(); handleSynapseCheck(); }
            }
        });
    </script>

</body></html>
