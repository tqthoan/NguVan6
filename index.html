             alt_s: ["Keeping a good balance between work and play is enjoyed by him."], ai_n: "Sự phân bổ thời gian hợp lý giữa các khía cạnh trong cuộc sống.", ai_s: "'enjoys keeping' (Verb of liking + V-ing)."},

             s: "He likes lifting weights to build his muscle.", vis: "Anh ấy thích việc nâng tạ để xây dựng cơ bắp của mình.",

            {w: "muscle strength", type: "(n. phr.)", typeClass: "grammar-noun", w_html: "<span class='stress-mark'>mus</span><span class='unstressed'>cle</span> <span class='stress-mark'>strength</span>", vi: "Sức mạnh cơ bắp", p: "/ˈmʌsl streŋθ/", en_syn_html: "<span class='grammar-noun'><span class='stress-mark'>phy</span>sical <span class='stress-mark'>po</span>wer</span>", 
             s: "He is interested in improving his muscle strength at the gym.", vis: "Anh ấy rất thích thú với việc cải thiện sức mạnh cơ bắp của mình tại phòng tập thể hình.",

        // 2. STATE & UTILITIES
        let currentMode = ''; let currentLevel = 0; let activeData = []; let currentIndex = 0;
        let wrongItemsData = []; let currentPool = []; let firstTryCount = 0;
        let isRepracticing = false; let currentItemFailed = false; 
        let timerInterval; let timeLeft = 10; let brighteningInterval;
        const synth = window.speechSynthesis;

        function getCurrentItem() {
            if (isRepracticing) return currentPool[currentIndex] ? currentPool[currentIndex].item : activeData[0];
            return activeData[currentIndex] || activeData[0];
        }
        function vibrate(ms=20) { if (navigator.vibrate) navigator.vibrate(ms); }
        function clean(str) { return str ? str.trim().replace(/\s+/g, ' ') : ""; }
        function playAudio(txt) { if(!txt) return; if(synth.speaking) synth.cancel(); let u = new SpeechSynthesisUtterance(txt); u.lang='en-US'; u.rate=0.85; synth.speak(u); }

        // BỘ LỌC TÔ MÀU NGỮ PHÁP (TẬP TRUNG VERBS OF LIKING + GERUND/TO-V)
        function highlightGrammar(text, isMixed = false) {
            if (!text) return "";
            
            const getRegex = (words) => new RegExp(`(^|[^\\p{L}])(${words})(?=[^\\p{L}]|$)(?![^<]*>)`, 'giu');

            // 0. Điểm Ngữ Pháp Unit 1: Verbs of liking + V-ing/To-V (Dạ quang nổi bật)
            const targetRegex = new RegExp(`\\b(enjoy spending|loves having|are fond of doing|likes knitting|is keen on buying|enjoys spending|prefer spending|loves doing|is crazy about solving|fancy doing|likes surfing|enjoy surfing|prefer to message|loves messaging|is interested in learning|is keen on playing|am fond of listening|are interested in exploring|is crazy about collecting|like to go|love walking|enjoys watching|fancy going|prefer reading|hates getting|detest washing|dislike playing|love eating|is fond of making|enjoy folding|are interested in joining|likes to relax|is crazy about snowboarding|loves staying|like practicing|enjoys keeping|likes lifting|is interested in improving)\\b(?![^<]*>)`, 'gi');
            text = text.replace(targetRegex, "<span class='grammar-verb-main highlight-signal-word'>$&</span>");

            // 1. Phân loại từ cơ bản
            let modals = "will|won't|can|could|would|might|must|may";
            text = text.replace(getRegex(modals), "$1<span class='grammar-verb-modal'>$2</span>");

            let bes = "is|are|was|were|been|being|am|be";
            text = text.replace(getRegex(bes), "$1<span class='grammar-verb-be'>$2</span>");
            
            let haves = "have|has|had";
            text = text.replace(getRegex(haves), "$1<span class='grammar-verb-main'>$2</span>");

            let preps = "on|at|for|with|about|without|under|over|by|before|after|from|around|through|inside|behind|into|along|to|of|off|out|up|down|back|across"; 
            let deters = "the|my|your|his|her|our|their|its|mine|yours|theirs|ours|any|many|all|each|every|another|this|that|these|those|a|an";
            let conjs = "and|but|or|because|when|if|that|than|since|so|while";

            text = text.replace(getRegex(modals), "$1<span class='grammar-verb-modal'>$2</span>");
            text = text.replace(getRegex(preps), "$1<span class='grammar-preposition'>$2</span>");
            text = text.replace(getRegex(deters), "$1<span class='grammar-determiner'>$2</span>");
            text = text.replace(getRegex(conjs), "$1<span class='grammar-conjunction'>$2</span>");

            // 3. Trợ động từ
            const doDoes = "do|does|don't|doesn't|did|didn't";
            text = text.replace(getRegex(doDoes), "$1<span class='grammar-verb-aux'>$2</span>");

            // 4. Xử lý V-ed Có quy tắc 
            const edVerbsExact = "prepared";
            text = text.replace(new RegExp(`\\b(${edVerbsExact})\\b(?![^<]*>)`, 'gi'), function(match) {
                let lower = match.toLowerCase();
                let root = lower;
                let suffix = 'ed';
                if (lower === 'prepared') { root = 'prepar'; suffix = 'ed'; }
                let displayRoot = match.substring(0, root.length);
                let displaySuffix = match.substring(root.length);
                return `<span class='grammar-verb-main'>${displayRoot}</span><span class='grammar-verb-suffix'>${displaySuffix}</span>`;
            });

            // V-ing (Những từ nằm ngoài cụm ngữ pháp)
            const ingVerbsExact = "knitting|buying|solving|messaging|exploring|watching|reading|getting|washing|playing|eating|making|folding|joining|staying|practicing|keeping|lifting|improving|spending|having|doing|surfing|learning|listening|collecting|walking";
            text = text.replace(new RegExp(`\\b(${ingVerbsExact})\\b(?![^<]*>)`, 'gi'), function(match) {
                let lower = match.toLowerCase();
                let root = lower.slice(0, -3);
                let suffix = match.slice(-3);
                if (lower === 'knitting') { root = "knit"; suffix = "ting"; }
                else if (lower === 'getting') { root = "get"; suffix = "ting"; }
                return `<span class='grammar-verb-main'>${root}</span><span class='grammar-verb-suffix'>${suffix}</span>`;
            });

            // V1 số ít (s/es)
            const verbsS = "likes|loves|enjoys|prefers|hates|detests|dislikes";
            text = text.replace(new RegExp(`\\b(${verbsS})\\b(?![^<]*>)`, 'gi'), function(match) {
                let root = match.endsWith('es') ? match.slice(0, -2) : match.slice(0, -1);
                let suffix = match.endsWith('es') ? 'es' : 's';
                return `<span class='grammar-verb-main'>${root}</span><span class='grammar-verb-suffix'>${suffix}</span>`;
            });

            // Nouns số nhiều S/ES
            const nounS = "books|hobbies|activities|sweaters|grandchildren|friends|projects|puzzles|teenagers|cakes|shapes|weights";
            text = text.replace(new RegExp(`\\b(${nounS})\\b(?![^<]*>)`, 'gi'), function(match) {
                let root = match.endsWith('es') ? match.slice(0, -2) : match.slice(0, -1);
                let suffix = match.endsWith('es') ? 'es' : 's';
                if(match.toLowerCase() === 'activities') return `<span class='grammar-noun'>activiti</span><span class='grammar-verb-suffix'>es</span>`;
                if(match.toLowerCase() === 'hobbies') return `<span class='grammar-noun'>hobbi</span><span class='grammar-verb-suffix'>es</span>`;
                return `<span class='grammar-noun'>${root}</span><span class='grammar-verb-suffix'>${suffix}</span>`;
            });

            return text;
        }

        // THUẬT TOÁN TÌM LỖI SAI (DIFF)
        function getSentenceDiffHTML(typed, correct) {
            if (!typed) return `<span class="text-red-500">(Bạn chưa gõ gì cả)</span>`;
            const typedWords = typed.trim().split(/\s+/).filter(w => w);
            const correctWords = correct.trim().split(/\s+/).filter(w => w);
            
            let dp = Array(typedWords.length + 1).fill(null).map(() => Array(correctWords.length + 1).fill(0));
            for (let i = 1; i <= typedWords.length; i++) {
                for (let j = 1; j <= correctWords.length; j++) {
                    if (typedWords[i-1].toLowerCase().replace(/[.,!?;]/g, '') === correctWords[j-1].toLowerCase().replace(/[.,!?;]/g, '')) {
                        dp[i][j] = dp[i-1][j-1] + 1;
                    } else {
                        dp[i][j] = Math.max(dp[i-1][j], dp[i][j-1]);
                    }
                }
            }
            
            let i = typedWords.length, j = correctWords.length;
            let diff = [];
            while (i > 0 || j > 0) {
                if (i > 0 && j > 0 && typedWords[i-1].toLowerCase().replace(/[.,!?;]/g, '') === correctWords[j-1].toLowerCase().replace(/[.,!?;]/g, '')) {
                    diff.unshift({ type: 'equal', value: correctWords[j-1] });
                    i--; j--;
                } else if (j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) {
                    diff.unshift({ type: 'insert', value: correctWords[j-1] });
                    j--;
                } else if (i > 0 && (j === 0 || dp[i][j-1] < dp[i-1][j])) {
                    diff.unshift({ type: 'delete', value: typedWords[i-1] });
                    i--;
                }
            }
            
            let html = '';
            diff.forEach(part => {
                if (part.type === 'equal') {
                    html += `<span class="text-gray-300">${part.value}</span> `;
                } else if (part.type === 'delete') {
                    html += `<span class="text-red-500 line-through decoration-red-500/50">${part.value}</span> `;
                } else if (part.type === 'insert') {
                    html += `<span class="text-[#0ea5e9] bg-[#0ea5e9]/20 px-1.5 py-0.5 rounded-md font-bold shadow-sm border border-[#0ea5e9]/30">${part.value}</span> `;
                }
            });
            return html.trim();
        }

        function isSentenceMatch(typed, original, alternatives) {
            let cleanTyped = clean(typed).toLowerCase().replace(/[.,!?;]/g, '');
            let valid = [clean(original).toLowerCase().replace(/[.,!?;]/g, '')];
            if (alternatives) {
                alternatives.forEach(alt => valid.push(clean(alt).toLowerCase().replace(/[.,!?;]/g, '')));
            }
            return valid.includes(cleanTyped);
        }

        function startMode(mode, levelIdx) {
            if(window.speechSynthesis) window.speechSynthesis.cancel();

        // --- NEURON LOGIC CÓ ĐIỀU CHỈNH TỐC ĐỘ TƯƠNG THÍCH ĐỘ DÀI TỪ ---

        }
        
        function handleNeuronFail(isT, typed = "") {
            const item = getCurrentItem();
            if (isRepracticing) currentPool[currentIndex].streak = 0; 
            showCortex(`
                    <div class="text-sm text-red-500 font-bold uppercase tracking-widest bg-red-900/20 inline-block px-4 py-1.5 rounded-full border border-red-500/30 mb-3">
                        ${isT ? "⏳ Hết giờ" : "❌ Chưa đúng"}
                    </div>
                    ${!isT ? `<div class="mb-3 text-gray-400 text-base md:text-lg">Bạn đã gõ: <span class="text-red-400 line-through font-mono ml-2 text-2xl md:text-3xl font-medium">${typed || "(trống)"}</span></div>` : ""}
                    <div class="bg-black/40 p-5 md:p-8 rounded-[2rem] border border-white/10 w-full shadow-2xl text-center">
                        <div class="flex items-center justify-center gap-4 md:gap-6 mt-1 mb-2">
                            <span class="${item.typeClass} text-5xl md:text-7xl tracking-tighter">${item.w_html}</span>
                            <button onclick="playAudio('${item.w.replace(/'/g, "\\'")}')" class="p-3 opacity-80 hover:opacity-100 bg-[#00E5FF]/10 rounded-full transition-transform hover:scale-110 shadow-lg border border-[#00E5FF]/30 flex-shrink-0">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-[#00E5FF]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /></svg>
                            </button>
                        </div>
                        
                        <div class="mt-3 italic text-2xl md:text-3xl font-mono flex flex-wrap items-center justify-center gap-x-3 gap-y-2">
                            <span class="${item.typeClass} font-bold">${item.type}</span>
                            <span class="text-[#FF00FF]">${item.p}</span>
                            <span class="text-gray-500 hidden md:inline-block">—</span>
                            <span class="text-white font-medium not-italic">${item.vi}</span>
                            ${item.vi_syn ? `<span class="text-gray-400 text-lg not-italic">(${item.vi_syn})</span>` : ''}
                        </div>

                        ${item.en_syn_html ? `
                        <div class="mt-5 border-t border-white/10 pt-4 flex flex-col items-center">
                            <p class="text-[11px] text-gray-400 uppercase opacity-80 mb-2 font-bold tracking-widest flex items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" /></svg> Từ đồng nghĩa
                            </p>
                            <div class="text-xl md:text-2xl tracking-wide">${item.en_syn_html}</div>
                        </div>` : ''}
                    </div>
                    <div class="tutor-box w-full mt-3 p-4 md:p-5">
                        <div class="tutor-title mb-1"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 002-2V9.5a2.5 2.5 0 00-2.5-2.5H15"></path></svg> AI TUTOR: NGỮ ÂM & NGỮ DỤNG</div>
                        <div class="tutor-text text-lg md:text-xl text-gray-200 leading-relaxed">${item.aiN_html}</div>
                    </div>`, false);
        }

        // --- SYNAPSE LOGIC ---
        function loadSynapse() {
            const item = getCurrentItem(); currentItemFailed = false;
            updateProgressUI();
            document.getElementById('synapse-vi-sen').innerText = item.vis;
            document.getElementById('synapse-input').value = ''; document.getElementById('synapse-input').focus();
        }
        
        function handleSynapseCheck() {
            if(window.speechSynthesis) window.speechSynthesis.cancel();
            const item = getCurrentItem(); 
            const typed = clean(document.getElementById('synapse-input').value);
            if(!typed) { vibrate(50); return; }
            
            const isC = isSentenceMatch(typed, item.s, item.alt_s);
            
            let altSentencesHTML = '';
            if (item.alt_s_html && item.alt_s_html.length > 0) {
                altSentencesHTML = `
                <div class="mt-4 border-t border-white/10 pt-3 text-left">
                    <p class="text-[11px] text-[#FFD700] uppercase opacity-90 mb-2 font-bold tracking-widest flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" /></svg> Các câu đúng khác được chấp nhận:
                    </p>
                    <ul class="space-y-2">
                        ${item.alt_s_html.map(alt => `
                            <li class="flex items-start gap-3">
                                <span class="text-[#FFD700] mt-1">✓</span>
                                <span class="text-lg md:text-xl tracking-wide leading-relaxed text-gray-200">${alt}</span>
                            </li>
                        `).join('')}
                    </ul>
                </div>`;
            }

            if (isC) {
                if (isRepracticing) currentPool[currentIndex].streak++;
                showCortex(`
                    <div class="text-sm text-[#4ade80] font-bold uppercase tracking-widest bg-[#4ade80]/10 inline-block px-4 py-1.5 rounded-full border border-[#4ade80]/30 mb-3">🎉 Chính xác</div>
                    <div class="bg-black/40 p-5 md:p-6 rounded-[2rem] border border-[#4ade80]/20 w-full shadow-2xl text-left mb-3">
                        <p class="text-[11px] text-[#4ade80] uppercase opacity-80 mb-2 font-bold tracking-widest flex items-center gap-2"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg> Câu chuẩn (Khuyến nghị):</p>
                        <div class="flex items-start justify-between gap-4 mb-2">
                            <div class="text-xl md:text-3xl tracking-wide leading-snug text-white flex-1">${item.s_html}</div>
                            <button onclick="playAudio('${item.s.replace(/'/g, "\\'")}')" class="p-2 md:p-3 opacity-80 hover:opacity-100 bg-[#4ade80]/10 rounded-full transition-transform hover:scale-110 shadow-lg border border-[#4ade80]/30 flex-shrink-0">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 md:h-8 md:w-8 text-[#4ade80]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /></svg>
                            </button>
                        </div>
                        ${altSentencesHTML}
                    </div>
                    <div class="tutor-box w-full mt-0 p-4 md:p-5">
                        <div class="tutor-title mb-1"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 002-2V9.5a2.5 2.5 0 00-2.5-2.5H15"></path></svg> AI TUTOR: PHÂN TÍCH CẤU TRÚC</div>
                        <div class="tutor-text text-base md:text-lg text-gray-200 leading-snug">${item.ai_s_html}</div>
                    </div>`, true);
            } else {
                markError(item);
                if (isRepracticing) currentPool[currentIndex].streak = 0; 
                const diffHTML = getSentenceDiffHTML(typed, item.s);
                
                showCortex(`
                    <div class="text-sm text-red-500 font-bold uppercase tracking-widest bg-red-900/20 inline-block px-4 py-1.5 rounded-full border border-red-500/30 mb-3">❌ Chưa đúng</div>
                    <div class="bg-[#1A1A2E]/80 p-4 md:p-5 rounded-3xl mb-3 w-full text-left border border-red-500/20 shadow-inner">
                        <div class="text-xs text-[#00E5FF] uppercase font-bold mb-2 opacity-80 tracking-widest flex items-center gap-2"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg> Phân tích lỗi sai:</div>
                        <div class="text-xl md:text-3xl font-medium tracking-wide leading-relaxed bg-black/60 p-4 rounded-xl border border-red-500/30 flex flex-wrap gap-x-1 gap-y-1 shadow-inner">${diffHTML}</div>
                    </div>
                    <div class="bg-black/40 p-5 md:p-6 rounded-[2rem] border border-[#00E5FF]/20 w-full shadow-2xl text-left mb-3">
                        <p class="text-[11px] text-[#00E5FF] uppercase opacity-80 mb-2 font-bold tracking-widest flex items-center gap-2"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg> Đáp án đúng chuẩn:</p>
                        <div class="flex items-start justify-between gap-4 mb-2">
                            <div class="text-xl md:text-3xl tracking-wide leading-snug text-white flex-1">${item.s_html}</div>
                            <button onclick="playAudio('${item.s.replace(/'/g, "\\'")}')" class="p-2 md:p-3 opacity-80 hover:opacity-100 bg-[#00E5FF]/10 rounded-full transition-transform hover:scale-110 shadow-lg border border-[#00E5FF]/30 flex-shrink-0">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 md:h-8 md:w-8 text-[#00E5FF]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /></svg>
                            </button>
                        </div>
                        ${altSentencesHTML}
                    </div>
                    <div class="tutor-box w-full mt-0 p-4 md:p-5">
                        <div class="tutor-title mb-1"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 002-2V9.5a2.5 2.5 0 00-2.5-2.5H15"></path></svg> AI TUTOR: PHÂN TÍCH CẤU TRÚC</div>
                        <div class="tutor-text text-base md:text-lg text-gray-200 leading-snug">${item.ai_s_html}</div>
                    </div>`, false);
            }
        }

        function showReward() {
            hideAll(); document.getElementById('screen-reward').classList.remove('hidden'); document.getElementById('screen-reward').classList.add('flex');
            document.getElementById('final-accuracy').innerText = `${firstTryCount}/${activeData.length}`;
            const t = document.getElementById('final-title'); const acc = (firstTryCount/activeData.length)*100;
            if(acc < 50) t.innerText = "TÂN BINH TƯƠNG LAI"; else if(acc<100) t.innerText = "KỸ SƯ KHÔNG GIAN"; else t.innerText = "HUYỀN THOẠI SYNAPSE";
            if(isRepracticing || wrongItemsData.length === 0) document.getElementById('reward-error-section').classList.add('hidden');
            else { document.getElementById('reward-error-section').classList.remove('hidden'); document.getElementById('reward-error-count').innerText = wrongItemsData.length; }
            vibrate(100);
        }

        function startRepractice() { isRepracticing = true; currentPool = [...wrongItemsData]; currentIndex = 0; hideAll(); if (currentMode === 'neuron') { document.getElementById('screen-neuron').classList.remove('hidden'); loadNeuron(); } else { document.getElementById('screen-synapse').classList.remove('hidden'); loadSynapse(); } }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if(window.speechSynthesis) window.speechSynthesis.cancel();
                const modal = document.getElementById('modal-cortex');
                const milestone = document.getElementById('modal-milestone');
                const neuron = !document.getElementById('screen-neuron').classList.contains('hidden');
                const synapse = !document.getElementById('screen-synapse').classList.contains('hidden');
                if (modal && !modal.classList.contains('hidden')) { e.preventDefault(); closeCortex(); }
                else if (milestone && !milestone.classList.contains('hidden')) { e.preventDefault(); closeMilestone(); }
                else if (neuron) { e.preventDefault(); handleNeuronCheck(); }
                else if (synapse) { e.preventDefault(); handleSynapseCheck(); }
            }
        });
    </script>
</body>
</html>
