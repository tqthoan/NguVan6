<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neuro-Matrix Flashcards | Hack Tiềm Thức Word Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        /* ================= HỆ THỐNG MÀU NEON ================= */
        :root {
            --bg-deep: #05050A;
            --bg-panel: rgba(15, 15, 25, 0.85);
            
            --c-noun: #4ade80;     /* Noun */
            --c-verb: #facc15;     /* Verb */
            --c-adj:  #22d3ee;     /* Adj */
            --c-adv:  #2dd4bf;     /* Adv */
            
            --c-suf-n:   #86efac;
            --c-suf-v:   #fef08a;
            --c-suf-adj: #67e8f9;
            --c-suf-adv: #5eead4;

            --c-pre-neg: #f43f5e;  /* Negative Prefix */
            --c-pre-att: #d946ef;  /* Attitude Prefix */
            
            --grid-color: rgba(255, 255, 255, 0.03);
            --card-width: 850px;
            
            --active-color: var(--c-adj); /* Thay đổi động bằng JS */
        }

        /* Thêm nền tối cho Option của Dropdown để hiển thị rõ chữ */
        select option {
            background-color: var(--bg-deep) !important;
            color: #f8fafc !important;
        }

        body {
            font-family: 'Inter', sans-serif; background-color: var(--bg-deep); color: #f8fafc;
            margin: 0; height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; overflow: hidden; -webkit-font-smoothing: antialiased;
        }

        /* BACKGROUND EFFECTS */
        .cyber-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2;
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .aurora-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
            overflow: hidden; pointer-events: none; opacity: 0.3;
        }
        .aurora-blob {
            position: absolute; filter: blur(120px); border-radius: 50%;
            animation: float-aurora 20s infinite alternate ease-in-out; transition: background 1s ease;
        }
        .a1 { background: rgba(34, 211, 238, 0.3); width: 40vw; height: 40vh; top: -10%; left: -10%; }
        .a2 { background: rgba(244, 63, 94, 0.2); width: 50vw; height: 50vh; top: 40%; right: -20%; animation-delay: -5s; }

        @keyframes float-aurora { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(5vw, 5vh) scale(1.1); } }

        /* APP HEADER */
        .app-header { position: absolute; top: 28px; left: 30px; text-align: left; z-index: 10; opacity: 0.25; transition: opacity 0.3s; }
        .app-header:hover { opacity: 0.8; }
        .app-title { font-size: 14px; font-weight: 700; color: white; letter-spacing: 4px; text-transform: uppercase; margin: 0; font-family: 'JetBrains Mono', monospace; display: flex; align-items: center; }

        /* TOP RIGHT CONTROLS (Audio & Counter) */
        .top-right-controls {
            position: absolute; top: 20px; right: 30px; display: flex; align-items: center; gap: 15px; z-index: 100;
        }

        /* CARD COUNTER (Moved out of card) */
        .card-counter {
            width: 36px; height: 36px;
            border-radius: 50%; background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1); color: #94a3b8;
            font-size: 11px; font-family: 'JetBrains Mono', monospace;
            display: flex; align-items: center; justify-content: center; letter-spacing: 0.5px;
        }

        /* FLASHCARD CONTAINER - KHÓA CHẶT CHIỀU CAO TỔNG THỂ */
        .flashcard-wrapper { 
            width: 95%; max-width: 900px; perspective: 1500px; z-index: 10; 
            height: calc(100vh - 140px); /* Giữ chiều cao cố định để không đẩy nút xuống dưới */
            min-height: 520px; display: flex; 
        }
        .flashcard {
            position: relative; width: 100%; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s;
            background: var(--bg-panel); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            padding: 30px 40px; display: flex; flex-direction: column; box-sizing: border-box; flex: 1;
            overflow: hidden; /* CẤM TUYỆT ĐỐI THANH CUỘN Ở THẺ TỔNG */
        }

        /* TYPOGRAPHY (Màu ngữ pháp) */
        .g-pre-neg { color: var(--c-pre-neg); font-weight: 900; text-shadow: 0 0 10px rgba(244, 63, 94, 0.5); }
        .g-pre-att { color: var(--c-pre-att); font-weight: 900; text-shadow: 0 0 10px rgba(217, 70, 239, 0.5); }
        .root-n   { color: var(--c-noun); font-weight: 800; text-transform: lowercase; text-shadow: 0 0 10px rgba(74, 222, 128, 0.4); }
        .root-v   { color: var(--c-verb); font-weight: 800; text-transform: lowercase; text-shadow: 0 0 10px rgba(250, 204, 21, 0.4); }
        .root-adj { color: var(--c-adj);  font-weight: 800; text-transform: lowercase; text-shadow: 0 0 10px rgba(34, 211, 238, 0.4); }
        .root-adv { color: var(--c-adv);  font-weight: 800; text-transform: lowercase; font-style: italic; text-shadow: 0 0 10px rgba(45, 212, 191, 0.4); }
        .suf-n   { color: var(--c-suf-n); font-weight: 900; text-shadow: 0 0 8px rgba(134, 239, 172, 0.6); }
        .suf-v   { color: var(--c-suf-v); font-weight: 900; text-shadow: 0 0 8px rgba(254, 240, 138, 0.6); }
        .suf-adj { color: var(--c-suf-adj); font-weight: 900; text-shadow: 0 0 8px rgba(103, 232, 249, 0.6); }
        .suf-adv { color: var(--c-suf-adv); font-weight: 900; text-shadow: 0 0 8px rgba(94, 234, 212, 0.6); font-style: italic;}
        
        .t-noun { color: var(--c-noun); font-weight: 700; text-shadow: 0 0 5px rgba(74, 222, 128, 0.3); }
        .t-verb { color: var(--c-verb); font-weight: 700; text-shadow: 0 0 5px rgba(250, 204, 21, 0.3); }
        .t-adj  { color: var(--c-adj);  font-weight: 700; text-shadow: 0 0 5px rgba(34, 211, 238, 0.3); }
        .t-adv  { color: var(--c-adv);  font-weight: 700; font-style: italic; text-shadow: 0 0 5px rgba(45, 212, 191, 0.3); }

        .w-box {
            display: inline-flex; align-items: baseline; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px; padding: 4px 12px; margin: 0 4px; font-family: 'JetBrains Mono', monospace; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); line-height: 1.2;
        }
        .w-box.massive { font-size: 38px; padding: 8px 24px; border-radius: 16px; margin-bottom: 15px; transition: all 0.4s ease; }
        
        .badge-type { font-size: 14px; padding: 3px 10px; border-radius: 6px; font-weight: 900; text-transform: uppercase; border: 2px solid; margin-left: 12px; vertical-align: middle; font-family: 'JetBrains Mono', monospace; }

        /* ROOT INFO SECTION (Đóng băng không cho co rút) */
        .card-header-btn {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 25px; border-radius: 16px; cursor: pointer; transition: all 0.3s;
            display: flex; justify-content: center; align-items: center; margin-bottom: 20px;
            width: fit-content; margin-left: auto; margin-right: auto;
            flex-shrink: 0; /* Khóa cứng kích thước */
        }
        .card-header-btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }
        .card-header-btn.active {
            background: rgba(0,0,0,0.5); border-color: var(--active-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5), inset 0 0 15px rgba(255,255,255,0.1), 0 0 15px var(--active-color);
            transform: scale(1.03);
        }
        .base-word-info { color: #cbd5e1; font-size: 22px; font-weight: 700; letter-spacing: 1px; display: flex; align-items: center; flex-wrap: wrap; justify-content: center; gap: 8px;}

        /* TEXT CLASSES FOR RESPONSIVENESS */
        .root-meaning-text { color: #94a3b8; font-size: 18px; font-weight: 500; font-style: italic; font-family: 'Inter', sans-serif; letter-spacing: 0; text-transform: none; }
        .example-en { font-size: 22px; line-height: 1.5; color: #f8fafc; }
        .example-vi { font-size: 18px; color: #94a3b8; font-style: italic; margin-top: 8px; }

        /* VARIANT NAVIGATOR - KHU VỰC DUY NHẤT CÓ THANH CUỘN TỰ ĐỘNG */
        .variant-list { 
            display: flex; flex-direction: column; align-items: flex-start; width: 100%; max-width: 600px;
            margin: 0 auto 20px auto; gap: 10px; 
            padding-right: 10px;
            flex: 1 1 auto; /* Tự động phình to/co rút lấp đầy khoảng trống ở giữa */
            min-height: 0; /* Bắt buộc để Flexbox tính toán scroll đúng */
            overflow-y: auto; /* THANH CUỘN CHỈ XUẤT HIỆN Ở ĐÂY NẾU DANH SÁCH QUÁ DÀI */
        }
        
        /* Tùy chỉnh thanh cuộn cho danh sách biến thể */
        .variant-list::-webkit-scrollbar { width: 4px; }
        .variant-list::-webkit-scrollbar-track { background: transparent; }
        .variant-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

        .variant-btn {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: #94a3b8;
            padding: 12px 24px; border-radius: 12px; cursor: pointer; transition: all 0.3s; font-family: 'JetBrains Mono', monospace; font-size: 18px; /* Tăng 20% (từ 15px lên 18px) */
            opacity: 0.6; text-align: left; display: flex; align-items: center; flex-wrap: wrap; gap: 10px; width: 100%; box-sizing: border-box;
        }
        
        @keyframes btn-glow {
            0% { box-shadow: 0 4px 15px rgba(0,0,0,0.5), inset 0 0 5px transparent; border-color: rgba(255,255,255,0.2); }
            100% { box-shadow: 0 4px 15px rgba(0,0,0,0.5), 0 0 15px var(--btn-color), inset 0 0 10px var(--btn-color); border-color: var(--btn-color); }
        }
        .variant-btn:hover { background: rgba(255,255,255,0.1); color: white; transform: translateX(8px); opacity: 0.95; animation: btn-glow 1.2s infinite alternate ease-in-out; }
        
        @keyframes active-btn-glow {
            0% { box-shadow: 0 4px 15px rgba(0,0,0,0.5), inset 0 0 15px rgba(255,255,255,0.1), 0 0 2px transparent; }
            100% { box-shadow: 0 4px 15px rgba(0,0,0,0.5), inset 0 0 15px rgba(255,255,255,0.1), 0 0 15px var(--btn-color); }
        }
        .variant-btn.active {
            background: rgba(0,0,0,0.5); border-color: var(--btn-color); color: white; opacity: 1; transform: translateX(8px);
            animation: active-btn-glow 2s infinite alternate ease-in-out;
        }
        
        /* Tắt hiệu ứng viền sáng chói (glow) trên các nút nhỏ để font chữ sắc nét hơn */
        .variant-btn span { text-shadow: none !important; }

        /* ================= HIỆU ỨNG NEON CHUYỂN ĐỘNG (HOVER) CHO CÁC THÀNH PHẦN ================= */
        /* ĐÃ LOẠI BỎ NEON BAO QUANH TOÀN BỘ THẺ THEO YÊU CẦU */

        @keyframes word-glow {
            0% { filter: drop-shadow(0 0 2px transparent); transform: scale(1); }
            100% { filter: drop-shadow(0 0 15px var(--active-color)) brightness(1.15); transform: scale(1.03); }
        }
        .w-box.massive:hover { animation: word-glow 1.2s infinite alternate ease-in-out; cursor: crosshair; }

        @keyframes box-glow {
            0% { box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.4), 0 0 0px transparent; }
            100% { box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.6), 0 0 20px var(--box-color, var(--active-color)); }
        }
        .card-bottom:hover { animation: box-glow 1.5s infinite alternate ease-in-out; }

        /* VARIANT DETAILS SECTION (Đóng băng không cho co rút) */
        .variant-details { 
            text-align: center; transition: opacity 0.3s, transform 0.3s; 
            display: flex; flex-direction: column; justify-content: flex-end; 
            flex-shrink: 0; /* Khóa cứng phần dưới cùng */
        }
        .variant-details.fading { opacity: 0; transform: translateY(10px); }
        .word-meaning { font-size: 20px; color: #cbd5e1; font-weight: 500; font-style: italic;}
        
        .card-bottom {
            background: rgba(0, 0, 0, 0.2); border: 1px solid var(--box-color, var(--active-color)); padding: 20px 25px; border-radius: 16px;
            text-align: left; transition: border-color 0.4s, box-shadow 0.4s;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.4);
        }

        /* CONTROLS - THU NHỎ, TINH TẾ, VIỀN MỎNG */
        .controls { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 20px; z-index: 10; }
        .btn-nav, .btn-jump { 
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); /* Viền cực mỏng */
            color: rgba(255,255,255,0.6); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; 
            cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); backdrop-filter: blur(10px); 
        }
        .btn-nav { width: 42px; height: 42px; font-size: 18px; }
        .btn-jump { width: 42px; height: 42px; font-size: 18px; font-family: 'JetBrains Mono', monospace; font-weight: 400; }
        
        .btn-nav:hover:not(:disabled) { background: rgba(255,255,255,0.1); transform: scale(1.1); color: white; border-color: rgba(255,255,255,0.3);}
        .btn-jump:hover { background: rgba(255,255,255,0.1); transform: scale(1.1); color: white; border-color: rgba(255,255,255,0.3);}
        .btn-nav:disabled { opacity: 0.2; cursor: not-allowed; }

        .btn-play-sm { 
            width: 44px; height: 44px; font-size: 18px; flex-shrink: 0; background: rgba(0,0,0,0.4); 
            border: 1px solid; border-radius: 50%; cursor: pointer; transition: 0.3s; 
            display: inline-flex; justify-content: center; align-items: center;
        }
        .btn-play-sm:hover { transform: scale(1.1); box-shadow: 0 0 15px currentColor; }
        .btn-play-sm.playing { background: currentColor !important; color: black !important; box-shadow: 0 0 20px currentColor; }

        @keyframes pulse-audio { 0% { box-shadow: 0 0 0 0 var(--active-color); } 70% { box-shadow: 0 0 0 20px transparent; } 100% { box-shadow: 0 0 0 0 transparent; } }

        /* ================= AUDIO SETTINGS & MINI SPEAKER ================= */
        .audio-settings {
            display: flex; gap: 8px; opacity: 0.25; transition: opacity 0.3s;
        }
        .audio-settings:hover { opacity: 0.9; }
        .audio-settings select {
            background: rgba(0, 0, 0, 0.4); color: #cbd5e1; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px;
            padding: 5px 10px; font-size: 11px; outline: none; cursor: pointer; font-family: 'JetBrains Mono', monospace;
            max-width: 110px; text-overflow: ellipsis; backdrop-filter: blur(5px);
        }
        .mini-speaker {
            background: none; border: none; cursor: pointer; opacity: 0.4; font-size: 14px; transition: all 0.2s; padding: 0 5px; filter: grayscale(100%);
        }
        .mini-speaker:hover { opacity: 1; filter: grayscale(0%); transform: scale(1.2); }

        /* FULLSCREEN BUTTON */
        .btn-fullscreen {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            color: #94a3b8;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            z-index: 100;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        .btn-fullscreen:hover { background: rgba(255,255,255,0.15); color: white; transform: scale(1.1); }

        /* ================= MOBILE OPTIMIZATION ================= */
        @media (max-width: 768px) {
            /* Tối ưu góc trên và setting */
            .app-header { top: 15px; left: 12px; opacity: 0.6; }
            .app-title { font-size: 12px; letter-spacing: 2px; }
            
            .top-right-controls { top: 8px; right: 12px; gap: 8px; }
            .audio-settings { opacity: 0.8; }
            .audio-settings select { max-width: 80px; font-size: 10px; padding: 4px 6px; }
            .card-counter { width: 30px; height: 30px; font-size: 10px; }
            
            /* Tối ưu không gian thẻ để vừa 1 màn hình */
            .flashcard-wrapper { height: calc(100vh - 80px); margin-top: 20px; align-items: center;}
            .flashcard { padding: 25px 15px 15px 15px; }
            
            /* Tối ưu lề và các thẻ biến thể */
            .card-header-btn { padding: 10px 15px; margin-bottom: 12px; width: 100%; box-sizing: border-box;}
            .base-word-info { font-size: 18px; }
            .root-meaning-text { font-size: 14px; }
            
            .variant-list { margin-bottom: 12px; gap: 8px; width: 100%; }
            .variant-btn { padding: 8px 12px; font-size: 14px; gap: 6px; } 
            
            /* Từ vựng khổng lồ & Nghĩa nhắm mục tiêu cùng dòng */
            .w-box.massive { font-size: 20px; padding: 4px 12px; margin-bottom: 0; }
            .word-meaning { font-size: 14px; margin-bottom: 0; }
            
            /* Khung ví dụ & Size chữ ví dụ cho di động */
            .card-bottom { padding: 12px 15px; }
            .example-en { font-size: 15px; }
            .example-vi { font-size: 13px; margin-top: 4px; }
            
            /* Nút điều khiển bên trong và bên ngoài thẻ */
            .btn-play-sm { width: 32px; height: 32px; font-size: 14px; }
            
            .controls { margin-top: 15px; gap: 15px; }
            .btn-nav, .btn-jump { width: 38px; height: 38px; font-size: 16px;}
            
            /* ẨN NÚT FULLSCREEN TRÊN ĐIỆN THOẠI */
            .btn-fullscreen { display: none !important; }
        }
    </style>
</head>
<body>

    <div class="cyber-bg"></div>
    <div class="aurora-container">
        <div class="aurora-blob a1" id="aurora1"></div>
        <div class="aurora-blob a2" id="aurora2"></div>
    </div>

    <div class="app-header">
        <div class="app-title">NEURO-MATRIX</div>
    </div>

    <!-- TOP RIGHT CONTROLS -->
    <div class="top-right-controls">
        <div class="audio-settings">
            <select id="voiceSelect" title="Giọng đọc"></select>
            <select id="rateSelect" title="Tốc độ">
                <option value="0.6">0.6x</option>
                <option value="0.85" selected>0.85x</option>
                <option value="1.0">1.0x</option>
                <option value="1.2">1.2x</option>
            </select>
        </div>
        <div class="card-counter" id="cardCounter">1/5</div>
    </div>

    <div class="flashcard-wrapper">
        <div class="flashcard" id="flashcard">
            
            <!-- Root Word Header as Button -->
            <div class="card-header-btn" id="rootWordHeader" onclick="renderVariant(-1)">
                <div class="base-word-info" id="rootWordBox">
                    <!-- Injected Root Word -->
                </div>
            </div>
            
            <!-- Variant List (Pills) -->
            <div class="variant-list" id="variantList">
                <!-- Injected Variant Buttons -->
            </div>

            <!-- Variant Details (Main Content) -->
            <div class="variant-details" id="variantDetails">
                <!-- Gộp Tên, Loại từ, Nghĩa và Loa trên cùng một dòng -->
                <div style="display: flex; justify-content: center; align-items: center; flex-wrap: wrap; margin-bottom: 20px; gap: 10px;">
                    <div class="w-box massive" id="targetWordBox" style="margin-bottom: 0;"></div>
                    <span class="badge-type" id="targetTypeBadge" style="margin-left: 0;"></span>
                    <span class="word-meaning" id="targetMeaning"></span>
                    <span class="mini-speaker" onclick="playCurrentWordAudio(event)" style="font-size: 24px; cursor: pointer; margin-left: 2px;" title="Nghe phát âm từ này">🔊</span>
                </div>
                <div class="card-bottom" id="exampleBox">
                    <!-- Ví dụ được chèn từ JS với nút loa -->
                </div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-nav" id="btnPrev" onclick="prevCard()">←</button>
        <button class="btn-jump" id="btnJump" onclick="jumpToMiddle()" title="Nhảy đến điểm giữa (Median / Mean)">µ</button>
        <button class="btn-nav" id="btnNext" onclick="nextCard()">→</button>
    </div>

    <!-- Thay thế thẻ Hướng dẫn bằng nút Fullscreen -->
    <button class="btn-fullscreen" onclick="toggleFullScreen()" title="Toàn màn hình">⛶</button>

    <script>
        // ================= DATABASE: PROTOCOL BETA (HẬU TỐ ĐA HÌNH - 20 TỪ ĐẦU) =================
        const flashcards = [
            {
                baseWord: "create", baseMeaning: "Tạo ra, sáng tạo", baseType: "V", baseClass: "root-v", baseColor: "var(--c-verb)",
                baseExEn: `We need to <span class="w-box" style="border-color: var(--c-verb);"><span class="root-v">create</span></span> a detailed plan before starting.`,
                baseExVi: `Chúng ta cần <span class="t-verb">tạo ra</span> một kế hoạch chi tiết trước khi bắt đầu.`,
                baseAudio: "We need to create a detailed plan before starting.",
                variants: [
                    {
                        wordText: "creative", label: "creative (Adj)", type: "Adj", color: "var(--c-adj)",

        // ================= APP LOGIC & STATE =================
        let currentCardIndex = 0;
        let currentVariantIndex = -1; // -1 represents the Root Word selection
        const totalCards = flashcards.length;
        
        const cardEl = document.getElementById('flashcard');
        const cardCounterEl = document.getElementById('cardCounter');
        const rootWordHeader = document.getElementById('rootWordHeader');
        const rootWordBox = document.getElementById('rootWordBox');
        const variantListEl = document.getElementById('variantList');
        const detailsEl = document.getElementById('variantDetails');
        
        // Element references inside details
        const tWordBox = document.getElementById('targetWordBox');
        const tTypeBadge = document.getElementById('targetTypeBadge');
        const tMeaning = document.getElementById('targetMeaning');
        const exampleBox = document.getElementById('exampleBox');
        
        const btnPrev = document.getElementById('btnPrev');
        const btnNext = document.getElementById('btnNext');

        function jumpToMiddle() {
            if(synth.speaking) synth.cancel();
            const middleIndex = Math.floor(totalCards / 2);
            currentCardIndex = middleIndex;
            renderCard(currentCardIndex);
        }

        function updateThemeColor(color) {
            document.documentElement.style.setProperty('--active-color', color);
            // Add a soft glow to background auroras matching the active grammar color
            document.getElementById('aurora1').style.background = color;
            document.getElementById('aurora1').style.opacity = '0.15';
        }

        function renderVariant(vIndex) {
            currentVariantIndex = vIndex;
            const data = flashcards[currentCardIndex];
            
            // 1. Update active states for Header and Variant Buttons
            const buttons = variantListEl.querySelectorAll('.variant-btn');
            
            if (vIndex === -1) {
                // Root Word is selected
                rootWordHeader.classList.add('active');
                buttons.forEach(btn => btn.classList.remove('active'));
            } else {
                // A Variant is selected
                rootWordHeader.classList.remove('active');
                buttons.forEach((btn, idx) => {
                    if(idx === currentVariantIndex) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                });
            }

            // 2. Fade details section, inject data, fade back in
            detailsEl.classList.add('fading');
            
            setTimeout(() => {
                let color, html, type, meaning, exEn, exVi, audio;
                
                if (vIndex === -1) {
                    color = data.baseColor;
                    html = `<span class="${data.baseClass}">${data.baseWord}</span>`;
                    type = data.baseType;
                    meaning = data.baseMeaning;
                    exEn = data.baseExEn;
                    exVi = data.baseExVi;
                    audio = data.baseAudio;
                } else {
                    const vData = data.variants[vIndex];
                    color = vData.color;
                    html = vData.html;
                    type = vData.type;
                    meaning = vData.meaning;
                    exEn = vData.exEn;
                    exVi = vData.exVi;
                    audio = vData.audio;
                }
                
                updateThemeColor(color);
                
                tWordBox.innerHTML = html;
                tWordBox.style.borderColor = color;
                tWordBox.style.boxShadow = `inset 0 0 20px rgba(0,0,0,0.8), 0 0 30px ${color}40`;
                
                tTypeBadge.textContent = type;
                tTypeBadge.style.color = color;
                tTypeBadge.style.borderColor = color;
                tTypeBadge.style.boxShadow = `0 0 10px ${color}40`;
                
                tMeaning.innerHTML = "- " + meaning;
                
                // Inject nội dung
                exampleBox.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 15px;">
                        <div style="flex: 1; text-align: left;">
                            <div class="example-en">${exEn}</div>
                            <div class="example-vi">${exVi}</div>
                        </div>
                        <button class="btn-play-sm" style="color: ${color}; border-color: ${color};" onclick="playSentenceAudio(event, '${audio.replace(/'/g, "\\'")}')" title="Nghe câu này">🔊</button>
                    </div>
                `;
                
                detailsEl.classList.remove('fading');

                // --- AUTO PLAY: Tự động phát âm từ vừa được hiển thị ---
                setTimeout(() => {
                    playCurrentWordAudio();
                }, 50);

            }, 200); // 200ms matches CSS transition
        }

        function renderCard(index) {
            const data = flashcards[index];
            currentVariantIndex = -1; // Default to selecting Root Word
            
            // Animation Out Card
            cardEl.classList.remove('animating-in');
            cardEl.classList.add('animating-out');
            
            setTimeout(() => {
                // 1. Inject Root Word Info (Cùng dòng với nghĩa tiếng Việt) - Đã xóa Nút Loa ở đây
                rootWordBox.innerHTML = `[ <span class="${data.baseClass}">${data.baseWord}</span> ] <span class="badge-type" style="color:${data.baseColor}; border-color:${data.baseColor}; font-size:12px; margin:0 8px;">${data.baseType}</span> <span class="root-meaning-text">- ${data.baseMeaning}</span>`;
                
                // 2. Build Variant Nav Buttons
                variantListEl.innerHTML = '';
                
                // Đã gỡ bỏ logic JS đếm > 5 biến thể. Flexbox sẽ tự động tính toán không gian.

                data.variants.forEach((v, vIdx) => {
                    const btn = document.createElement('button');
                    btn.className = 'variant-btn';
                    btn.style.setProperty('--btn-color', v.color); // Lưu màu sắc riêng biệt của từng loại từ vào thẻ
                    // Font chữ ở đây sẽ kế thừa từ .variant-btn - Đã xóa Nút Loa ở đây
                    btn.innerHTML = `<div>${v.html} <span style="color: #64748b; font-size: 0.85em; font-weight: normal; margin-left: 4px;">(${v.type})</span></div> <span style="color: #cbd5e1; font-family: 'Inter', sans-serif; font-size: 0.95em;">- ${v.meaning}</span>`;
                    btn.onclick = () => {
                        if(currentVariantIndex !== vIdx) {
                            if(synth.speaking) synth.cancel();
                            renderVariant(vIdx);
                        }
                    };
                    variantListEl.appendChild(btn);
                });

                // Update Progress UI
                cardCounterEl.textContent = `${index + 1}/${totalCards}`;

                // Call render variant to populate bottom section automatically (Mặc định chọn vIndex = -1)
                renderVariant(-1);

                // Animation In Card
                cardEl.classList.remove('animating-out');
                cardEl.classList.add('animating-in');
                
                setTimeout(() => {
                    cardEl.classList.remove('animating-in');
                }, 400);

            }, 300); 
        }

        function nextCard() {
            if(synth.speaking) synth.cancel();
            currentCardIndex = (currentCardIndex + 1) % totalCards; // Xoay vòng về 0 nếu đang ở cuối
            renderCard(currentCardIndex);
        }

        function prevCard() {
            if(synth.speaking) synth.cancel();
            currentCardIndex = (currentCardIndex - 1 + totalCards) % totalCards; // Xoay vòng về cuối nếu đang ở 0
            renderCard(currentCardIndex);
        }
        
        function nextVariant() {
            const maxVariants = flashcards[currentCardIndex].variants.length;
            if (currentVariantIndex < maxVariants - 1) {
                if(synth.speaking) synth.cancel();
                renderVariant(currentVariantIndex + 1);
            }
        }
        
        function prevVariant() {
            if (currentVariantIndex > -1) {
                if(synth.speaking) synth.cancel();
                renderVariant(currentVariantIndex - 1);
            }
        }

        // ================= AUDIO ENGINE =================
        const synth = window.speechSynthesis;
        let availableVoices = [];
        const voiceSelect = document.getElementById('voiceSelect');
        const rateSelect = document.getElementById('rateSelect');

        function loadVoices() {
            availableVoices = synth.getVoices().filter(v => v.lang.startsWith('en'));
            voiceSelect.innerHTML = '';
            availableVoices.forEach((voice, index) => {
                const option = document.createElement('option');
                option.textContent = voice.name.replace('Google ', '').replace('Microsoft ', ''); // Rút gọn tên
                option.value = index;
                voiceSelect.appendChild(option);
            });
            
            // Ưu tiên tìm giọng David làm mặc định
            let bestVoice = availableVoices.findIndex(v => v.name.includes('David'));
            
            // Nếu không có David, tìm các giọng nghe tự nhiên khác
            if (bestVoice === -1) {
                bestVoice = availableVoices.findIndex(v => v.name.includes('Google') || v.name.includes('Natural') || v.name.includes('Samantha'));
            }
            
            if(bestVoice !== -1) voiceSelect.selectedIndex = bestVoice;
        }
        if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;

        // Hàm phát âm TỪ VỰNG hiện tại (Đã gộp chung thay vì nhận tham số text)
        function playCurrentWordAudio(e) {
            if (e) e.stopPropagation();
            if (!synth) return;
            if (synth.speaking) synth.cancel();
            
            let textToPlay = "";
            if (currentVariantIndex === -1) {
                textToPlay = flashcards[currentCardIndex].baseWord;
            } else {
                textToPlay = flashcards[currentCardIndex].variants[currentVariantIndex].wordText;
            }

            let utterance = new SpeechSynthesisUtterance(textToPlay);
            if(availableVoices.length > 0) utterance.voice = availableVoices[voiceSelect.value];
            utterance.rate = parseFloat(rateSelect.value);
            synth.speak(utterance);
        }

        function playSentenceAudio(e, text) {
            e.stopPropagation(); // Ngăn nhấn vào loa làm lật thẻ
            if (!synth) return;
            if (synth.speaking) synth.cancel();
            
            // Tắt hiệu ứng màu loa cũ (nếu có)
            document.querySelectorAll('.btn-play-sm').forEach(btn => btn.classList.remove('playing'));
            let currentBtn = e.currentTarget;

            let utterance = new SpeechSynthesisUtterance(text);
            if(availableVoices.length > 0) utterance.voice = availableVoices[voiceSelect.value];
            utterance.rate = parseFloat(rateSelect.value);
            
            currentBtn.classList.add('playing');
            utterance.onend = () => { currentBtn.classList.remove('playing'); };
            utterance.onerror = () => { currentBtn.classList.remove('playing'); };

            synth.speak(utterance);
        }

        function playCurrentAudio() {
            if (!synth) return;
            let text = "";
            if (currentVariantIndex === -1) {
                text = flashcards[currentCardIndex].baseAudio;
            } else {
                text = flashcards[currentCardIndex].variants[currentVariantIndex].audio;
            }
            
            if (synth.speaking) {
                synth.cancel();
                return;
            }

            let utterance = new SpeechSynthesisUtterance(text);
            if(availableVoices.length > 0) utterance.voice = availableVoices[voiceSelect.value];
            utterance.rate = parseFloat(rateSelect.value);
            
            synth.speak(utterance);
        }

        // ================= TOUCH SWIPE FOR MOBILE =================
        let touchstartX = 0;
        let touchendX = 0;
        const flashcardWrapper = document.querySelector('.flashcard-wrapper');

        flashcardWrapper.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
        }, {passive: true});

        flashcardWrapper.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            handleSwipe();
        }, {passive: true});

        function handleSwipe() {
            if (touchendX < touchstartX - 40) nextCard(); // Vuốt sang trái -> Thẻ tiếp theo
            if (touchendX > touchstartX + 40) prevCard(); // Vuốt sang phải -> Thẻ trước đó
        }

        // Hàm bật/tắt toàn màn hình
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Lỗi fullscreen: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        // ================= KEYBOARD BINDINGS =================
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextCard();
            if (e.key === 'ArrowLeft') prevCard();
            if (e.key === 'ArrowDown') { e.preventDefault(); nextVariant(); }
            if (e.key === 'ArrowUp') { e.preventDefault(); prevVariant(); }
            if (e.key === ' ' || e.code === 'Space') {
                e.preventDefault(); 
                playCurrentAudio(); // Dấu cách nay dùng để đọc phát âm ví dụ
            }
        });

        // Initialize First Card
        renderCard(0);

    </script>
</body>
</html>
