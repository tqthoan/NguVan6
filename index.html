ions":["Khoe chữ","Đánh đố","Tạo sắc thái trang trọng, nâng tầm vẻ đẹp đạo đức","Hợp phòng tranh"],"answer":2,"explanation":"Nâng tầm tình cảm của em gái thành biểu tượng cao cả của cái thiện."},{"q":"Trạng từ 'Ngay trước mắt' trong cuộc thi vẽ nhấn mạnh?","options":["Phòng thi","Tính minh bạch, khẳng định tài năng chân thực","Vị trí","Sự nghiêm khắc"],"answer":1,"explanation":"Xác nhận chiến thắng của Mèo là hoàn toàn thuyết phục, không thể gian lận."},{"q":"Từ 'hoàn hảo' gợi triết lý nghệ thuật nào?","options":["Kích thước đúng","Nghệ thuật thăng hoa từ tình yêu thương","Màu xịn","Giấu khuyết điểm"],"answer":1,"explanation":"Cái đẹp đích thực bắt nguồn từ trái tim nhân ái hướng tới sự hoàn thiện."},{"q":"Biểu tượng 'bức tranh' trong truyện ẩn dụ cho?","options":["Tài chính","Nghề nghiệp","Tấm gương soi chiếu và thanh lọc tâm hồn","Kỉ vật"],"answer":2,"explanation":"Nơi con người nhận ra khiếm khuyết của mình để trở nên tốt đẹp hơn."},{"q":"Bản chất đố kị theo tác giả mổ xẻ là gì?","options":["Bản tính ác độc","Tội ác","Khuyết tật tâm lý có thể chữa bằng lòng tốt","Động lực"],"answer":2,"explanation":"Nhìn nhận đố kị như một hạt sạn của sự trưởng thành cần cảm hóa bằng tình thương."},{"q":"Giọt nước mắt chực trào mang dư âm gì?","options":["Bi thảm","Thanh tẩy và gieo niềm tin hướng thiện","Mâu thuẫn tiếp","Tức giận"],"answer":1,"explanation":"Để lại ấn tượng đẹp về sự chiến thắng của phần 'người' cao cả."},{"q":"Bài học sâu sắc về ứng xử trước thành công của người khác?","options":["Hạ bệ họ","Thảo mai","Vượt qua cái tôi, thực tâm trân trọng","Tránh xa"],"answer":2,"explanation":"Răn dạy con người sống cao thượng, dẹp bỏ ích kỷ cá nhân."},{"q":"Từ Hán Việt 'thí sinh', 'ban giám khảo' có tác dụng?","options":["Tên nhân vật","Xác lập uy tín, quy mô trang trọng của cuộc thi","Phong phú từ","Cổ trang"],"answer":1,"explanation":"Nâng tầm giá trị giải thưởng mà Kiều Phương đạt được."},{"q":"Tác phẩm này viết về nghệ thuật hay đạo đức?","options":["Nghệ thuật","Đạo đức","Sự hòa quyện: mượn nghệ thuật tôn vinh đạo đức","Không cái nào"],"answer":2,"explanation":"Dùng bức tranh làm phương tiện để soi sáng những giá trị nhân văn cao cả."}]},{"id":"dieu-khong-tinh","title":"Điều không tính trước","author":"Nguyễn Nhật Ánh","questions":[{"q":"Tác giả của truyện ngắn 'Điều không tính trước' là ai?","options":["Tạ Duy Anh","Nguyễn Nhật Ánh","Cao Duy Sơn","Tô Hoài"],"answer":1,"explanation":"Nguyễn Nhật Ánh là cây bút quen thuộc gắn liền với tuổi thơ."},{"q":"Văn bản 'Điều không tính trước' thuộc thể loại văn học nào?","options":["Tiểu thuyết","Hồi kí","Truyện ngắn","Truyện đồng thoại"],"answer":2,"explanation":"Tác phẩm tập trung vào một tình huống xích mích cụ thể của trẻ em."},{"q":"Phương thức biểu đạt chính được sử dụng trong văn bản là gì?","options":["Miêu tả","Biểu cảm","Tự sự","Nghị luận"],"answer":2,"explanation":"Tác phẩm kể lại chuỗi sự kiện từ mâu thuẫn đến hòa giải bất ngờ."},{"q":"Tác phẩm được trần thuật theo ngôi kể thứ mấy?","options":["Ngôi thứ nhất","Ngôi thứ hai","Ngôi thứ ba","Luân phiên ngôi 1 và 3"],"answer":0,"explanation":"Câu chuyện dẫn dắt qua lời kể của nhân vật xưng 'tôi'."},{"q":"Tình huống nào đã khơi mào cho mâu thuẫn giữa 'tôi' và Nghi?","options":["Tranh sách","Quả bóng đập trúng mặt","Chê đá bóng kém","Nghi đánh Phước"],"answer":1,"explanation":"Việc bóng văng trúng mặt khiến nhân vật 'tôi' cho rằng Nghi trả thù."},{"q":"Ai là người rủ nhân vật 'tôi' đi đánh thằng Nghi?","options":["Chú Tiến Lê","Anh trai","Thằng Phước","Bạn lớp"],"answer":2,"explanation":"Phước hỏi: 'Chiều nay mày có đi đánh nhau với tao không?'."},{"q":"'Vũ khí' mà Phước mang theo để đánh nhau là gì?","options":["Gậy gỗ","Cái ná thun","Súng nước","Hòn đá"],"answer":1,"explanation":"Phước hớn hở chuẩn bị chiếc ná thun bắn chim."},{"q":"Địa điểm 'tôi' và Phước nấp sẵn để chờ đánh Nghi?","options":["Sân bóng","Nhà Nghi","Bụi cây ở ngã tư","Rạp rạp phim"],"answer":2,"explanation":"Văn bản ghi rõ cả hai nấp sẵn trong bụi cây ở ngã tư đường."},{"q":"Nghi đã rút từ trong túi ra vật gì thay vì vũ khí?","options":["Sách luật bóng đá","Ná thun to hơn","Vé xem phim","Hộp kẹo"],"answer":0,"explanation":"Nghi rút ra cuốn sách nhỏ để giảng hòa thấu đáo về luật."},{"q":"Tên bộ phim Nghi rủ hai bạn cùng đi xem?","options":["Trộm mắt Phật","Siêu nhân","Người khổng lồ","Kẻ giấu mặt"],"answer":0,"explanation":"Nghi rủ bạn đi xem phim 'Trộm mắt Phật' vì có vé dư."},{"q":"Vì sao nhân vật 'tôi' quả quyết Nghi cố tình sút bóng vào mặt?","options":["Có thù lâu","Nghĩ Nghi trả đũa do mình bắt lỗi việt vị trước đó","Nghi đe dọa trước","Thấy Nghi cười"],"answer":1,"explanation":"Tâm lý nhạy cảm tự suy diễn ra thuyết âm mưu trả thù sai lầm."},{"q":"Mục đích thực sự của Nghi khi mang sách luật đến?","options":["Thách thức","Khoe sách","Giải thích để tránh cãi vã về sau","Trả thù"],"answer":2,"explanation":"Nghi muốn dùng tri thức để hóa giải tận gốc mâu thuẫn sân cỏ."},{"q":"Thái độ của Phước khi nghe rủ đi xem phim cho thấy?","options":["Xảo quyệt","Vô tư, dễ bị cảm hóa","Nhát gan","Ích kỷ"],"answer":1,"explanation":"Bản chất trẻ con bồng bột nhưng không hề thù dai, dễ bị cảm hóa."},{"q":"'Điều không tính trước' trong tựa đề mang ý nghĩa?","options":["Trời mưa","Quên ná thun","Kết cục hòa giải bất ngờ đầy tình người","Nghi bị tai nạn"],"answer":2,"explanation":"Sự tử tế của Nghi bẻ lái toàn bộ cốt truyện sang cái kết nhân văn."},{"q":"Tại sao nhân vật 'tôi' lại đứng 'ngơ ngác' khi thấy Nghi rút sách?","options":["Sách dày","Không biết chữ","Suy diễn ác ý bị sụp đổ trước lòng tốt","Đợi Phước bắn"],"answer":2,"explanation":"Nhận ra mình đã lấy dạ tiểu nhân đo lòng quân tử trước bạn."},{"q":"Nhân vật Nghi hiện lên với phẩm chất nào?","options":["Thâm hiểm","Điềm đạm, bao dung, hòa bình","Nhút nhát","Thù dai"],"answer":1,"explanation":"Hình mẫu lý tưởng của sự quân tử và văn minh ở lứa tuổi học trò."},{"q":"Nguyên nhân sâu xa dẫn đến rắc rối là gì?","options":["Gia cảnh","Luật bóng đá","Góc nhìn chủ quan, suy diễn nóng vội","Xúi giục"],"answer":2,"explanation":"Thiếu đối thoại dẫn đến biến một tai nạn nhỏ thành mâu thuẫn lớn."},{"q":"Việc Nghi trách hai bạn làm chim bay mất cho thấy?","options":["Đánh lạc hướng","Ghét người","Điềm nhiên, không mang tâm thế đánh nhau","Lãng tai"],"answer":2,"explanation":"Thái độ thong dong chú ý đến thiên nhiên khẳng định sự vô tư của Nghi."},{"q":"Nhân vật Phước đóng vai trò gì trong cốt truyện?","options":["Trọng tài","Chất xúc tác đẩy kịch tính và phá ngượng ngùng","Ngoài cuộc","Chủ mưu"],"answer":1,"explanation":"Phước vừa kích động bạo lực nhưng lại mở lời rủ đi chơi đầu tiên."},{"q":"Tình huống truyện mang sắc thái gì?","options":["Bi tráng","Kì ảo","Bất ngờ, hóm hỉnh, sâu sắc","Bế tắc"],"answer":2,"explanation":"Nút thắt cởi bằng cuốn sách và vé xem phim đầy thú vị."},{"q":"Việc lựa chọn ngôi kể 'tôi' mang lại tác dụng?","options":["Biết suy nghĩ cả 3 người","Khách quan","Bộc lộ chân thực suy diễn bồng bột và hối lỗi","Sử thi"],"answer":2,"explanation":"Hóa thân vào tâm lý học trò để bài học phục thiện trở nên thấm thía."},{"q":"Tương phản giữa 'ná thun' và 'sách luật' ẩn dụ?","options":["Đồ chơi 2 miền","Bạo lực mù quáng đối lập văn minh thiện chí","Lười học","Giàu nghèo"],"answer":1,"explanation":"Sự chiến thắng của tri thức trước hành động trả đũa nguyên thủy."},{"q":"Hành động 'thò tay vào túi quần' của Nghi nhằm?","options":["Đẩy kịch tính, tạo ảo giác rút vũ khí","Tìm tiền","Thói quen xấu","Kéo dài truyện"],"answer":0,"explanation":"Thủ pháp tạo bước ngoặt xuất sắc bẫy tâm lý người đọc."},{"q":"Vì sao 'tôi' không trả lời ngay mà lại 'ngơ ngác'?","options":["Phim không hay","Đấu tranh giữ sĩ diện","Bị 'đứng hình' trước sự thiện chí rẽ nhánh","Chờ lệnh"],"answer":2,"explanation":"Cơn sốc tâm lý tích cực làm tê liệt ý định thù hằn ban đầu."},{"q":"Ngôn ngữ dùng các từ 'nghen mày', 'chớ', 'tao', 'mày'?","options":["Giảm giá trị","Đậm khẩu ngữ học trò, gần gũi, hóm hỉnh","Thiếu giáo dục","Khó hiểu"],"answer":1,"explanation":"Xóa bỏ khoảng cách trang trọng, tạo vẻ hồn nhiên của tuổi thơ."},{"q":"Nếu đánh nhau thực sự xảy ra rồi mới hòa giải?","options":["Hay hơn","Phá vỡ thông điệp ngăn chặn bạo lực từ trứng nước","Mạnh mẽ hơn","Không đổi"],"answer":1,"explanation":"Tổn thương vật lý làm sự hòa giải mất đi tính bất ngờ và trọn vẹn."},{"q":"Chi tiết 'Phước lén giấu ná thun' chứng minh tâm lý?","options":["Thích giấu đồ","Nhát gan","Bạo lực bốc đồng tự triệt tiêu trước tình yêu thương","Hay quên"],"answer":2,"explanation":"Sự thức tỉnh của phần thiện khi đối diện với sự tử tế của bạn."},{"q":"Tại sao không để Nghi kể chuyện?","options":["Không biết kể","Làm mất tính kịch tính của 'điều không tính trước'","Nhân vật phụ","Tác giả ghét Nghi"],"answer":1,"explanation":"Điểm nhìn từ kẻ thù oán giúp giấu kín thiện chí của Nghi đến phút chót."},{"q":"Câu chuyện gần với thể loại nào nhất?","options":["Thần thoại","Ngụ ngôn (bài học cách làm người)","Kinh dị","Trinh thám"],"answer":1,"explanation":"Cốt truyện tinh gọn truyền tải bài học triết lý đạo đức rõ ràng."},{"q":"Bài học thiết thực nhất đối với học sinh là gì?","options":["Mang sách luật","Đi xem phim","Bình tĩnh tìm hiểu, tránh nóng vội quy kết bạo lực","Mang ná tự vệ"],"answer":2,"explanation":"Lời khuyên thực tế để ngăn chặn bạo lực học đường qua giao tiếp."},{"q":"Trạng từ 'Chiều nay' ở câu rủ đánh nhau có hiệu quả?","options":["Thời tiết đẹp","Xác lập 'deadline' kịch tính, đẩy nhanh nhịp độ","Phước đúng giờ","Kéo dài truyện"],"answer":1,"explanation":"Xác lập ngay thời hạn cho một xung đột sắp nổ ra."},{"q":"Trạng từ 'bỗng' trong 'Nghi bỗng rút ra...' đóng vai trò?","options":["Cú 'twist' đánh sập mạch suy diễn bạo lực","Thao tác vụng về","Sợ hãi","Kì ảo"],"answer":0,"explanation":"Bẻ gãy dự đoán logic, biến căng thẳng thành sự nhẹ nhõm."},{"q":"Dùng từ Hán Việt 'vũ khí' cho ná thun và sách luật?","options":["Nghiêm trọng hóa","Đối lập trào phúng, tôn vinh tri thức là vũ khí mạnh nhất","Khoe vốn từ","Gây khó hiểu"],"answer":1,"explanation":"Mỉa mai bạo lực và             const h = document.createElement('div'); h.className = "shrink-0 mb-2 flex flex-col gap-1";
            h.innerHTML = `
                <div class="flex justify-between items-center px-1 pt-1">
                    <div class="flex items-center gap-2" onclick="goHome()" style="cursor:pointer">
                        <div class="p-1.5 bg-slate-800 rounded-lg"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="3"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></div>
                        <span class="text-xs font-black text-slate-400 tracking-tighter uppercase">Cosmos Mastery Elite</span>
                    </div>
                </div>
                ${s.step==='quiz' ? `<div class="flex justify-between items-center glass p-2.5 rounded-xl border border-slate-700 shadow-xl">
                    <div class="flex flex-col pl-2 text-left"><span class="text-[7px] font-black text-slate-500 uppercase leading-none">Luyện tập</span>
                    <span class="text-lg font-black text-sky-400 uppercase tracking-tighter truncate max-w-[180px] sm:max-w-none">${s.st.title}</span></div>
                    <div class="flex gap-4 items-center font-mono border-l border-slate-800 pl-4">
                        <div class="flex flex-col items-center"><span class="text-emerald-400 font-black text-base">${s.c}</span><span class="text-[7px] font-black text-slate-500 uppercase">ĐÚNG</span></div>
                        <div class="flex flex-col items-center"><span class="text-rose-400 font-black text-base">${s.w}</span><span class="text-[7px] font-black text-slate-500 uppercase">SAI</span></div>
                        ${s.wr.size > 0 && !s.rev ? '<button onclick="startRev()" class="bg-amber-600/20 text-amber-500 px-3 py-1 rounded-lg text-[9px] font-black uppercase border border-amber-500/20 shadow-lg leading-none"> Mastery</button>' : ''}
                    </div>
                </div>` : ''}`;
            m.appendChild(h);
            const content = document.createElement('div'); content.className = "flex-1 overflow-y-auto hide-scroll px-1";
            if(s.step==='home') renderHome(content); else if(s.step==='quiz') renderQuiz(content); else renderRes(content);
            m.appendChild(content);
        }
        function goHome() { s.step='home'; s.st=null; s.rev=false; render(); }
        function startRev() { s.q=Array.from(s.wr); s.rev=true; s.idx=0; s.step='quiz'; s.c=0; s.w=0; s.lock=false; render(); }
        function renderHome(m) {
            m.innerHTML = '<div class="text-center py-6 text-white text-pretty leading-none"><h2 class="text-3xl md:text-5xl font-black mb-2 uppercase tracking-tighter drop-shadow-2xl">COSMOS MASTERING</h2><p class="text-slate-400 text-sm italic font-medium">Học sâu • Đúng 2 lần để hoàn thành</p></div>';
            const grid = document.createElement('div'); grid.className = "grid gap-3 max-w-2xl mx-auto mt-4";
            data.forEach(item => {
                const b = document.createElement('button'); b.className = "w-full p-6 glass rounded-[2.5rem] text-left flex justify-between items-center hover:scale-[1.01] hover:bg-slate-800 transition-all";
                b.innerHTML = `<div><div class="font-black text-xl text-white uppercase">${item.title}</div><div class="text-[10px] text-slate-500 font-bold uppercase">${item.author}</div></div><div class="text-sky-400">➔</div>`;
                b.onclick = () => { s = {...s, st: item, step: 'quiz', idx: 0, c: 0, w: 0, rev: false, wr: new Set(), m: {}}; render(); };
                grid.appendChild(b);
            });
            m.appendChild(grid);
        }
        function renderQuiz(m) {
            const qS = s.rev ? s.q : s.st.questions; const qI = s.rev ? s.q[s.idx] : s.idx; const qD = s.st.questions[qI];
            m.innerHTML = `<div class="mb-4 px-1 flex flex-col gap-1.5"><div class="flex justify-between items-center text-[8px] font-bold text-slate-500 uppercase"><span>${s.rev?'MASTERY CHALLENGE':'PROGRESSION'}</span><span>Câu ${s.idx+1} / ${qS.length}</span></div>
                <div class="h-1.5 bg-slate-800 rounded-full overflow-hidden shadow-inner"><div class="h-full bg-gradient-to-r from-sky-600 to-sky-400 transition-all duration-700" style="width:${(s.idx+1)/qS.length*100}%"></div></div></div>`;
            if(s.rev) {
                const streak = s.m[qI] || 0;
                const tracker = document.createElement('div'); tracker.className = "flex gap-3 mb-3 items-center text-[10px] font-bold text-slate-400 uppercase bg-slate-900/50 p-2 rounded-xl w-fit mx-1";
                tracker.innerHTML = `<div class="mastery-dot ${streak>=1?'on':''}"></div><div class="mastery-dot ${streak>=2?'on':''}"></div> <span class="text-sky-400 ml-1">Đúng 2 lần để Master</span>`;
                m.appendChild(tracker);
            }
            const qT = document.createElement('div'); qT.className = "text-xl md:text-2xl font-black mb-6 text-white leading-tight tracking-tight drop-shadow-md text-left text-pretty"; qT.innerText = qD.q; m.appendChild(qT);
            const optGrid = document.createElement('div'); optGrid.className = "grid gap-2";
            qD.options.forEach((o, i) => {
                const b = document.createElement('button'); b.disabled = s.lock;
                let cls = "w-full text-left p-3 rounded-2xl border-2 text-lg font-bold transition-all flex items-center leading-tight ";
                if(!s.lock) cls += "border-slate-800 bg-slate-900/40 hover:border-sky-500/50";
                else { if(i===qD.answer) cls+="border-emerald-500 bg-emerald-500/10 text-emerald-100";
                       else if(i===s.opt) cls+="border-rose-500 bg-rose-500/10 text-rose-100";
                       else cls+="border-slate-900 opacity-20"; }
                b.className = cls; b.innerHTML = `<span class="mr-4 text-slate-600 font-black font-mono text-sm uppercase shrink-0">${String.fromCharCode(65+i)}</span><span class="flex-1">${o}</span>`;
                b.onclick = () => { s.lock=true; s.opt=i; if(i===qD.answer){ s.c++; if(s.rev) s.m[qI]=(s.m[qI]||0)+1; }else{ s.w++; if(!s.rev) s.wr.add(qI); else s.m[qI]=0; } render(); };
                optGrid.appendChild(b);
            });
            m.appendChild(optGrid);
            if(s.lock) {
                const ex = document.createElement('div'); ex.className="glass mt-4 p-4 rounded-2xl border-l-4 border-sky-500 text-base md:text-lg text-slate-300 italic mb-4 shadow-inner leading-relaxed";
                ex.innerHTML = `<div class="font-black text-sky-400 uppercase text-[9px] mb-1 leading-none tracking-widest">Giải thích kiến thức</div>${qD.explanation}`;
                m.appendChild(ex);
                const n = document.createElement('button'); n.className="w-full py-4 bg-slate-800 hover:bg-slate-700 text-sky-400 font-black rounded-3xl border border-slate-700 uppercase text-xs transition-all";
                n.innerText = s.idx < qS.length-1 ? "Câu tiếp theo (Enter)" : "Xem kết quả (Enter)";
                n.onclick = next; m.appendChild(n);
            }
        }
        function next() {
            if(s.rev) { if(s.idx >= s.q.length-1){ const rem = s.q.filter(id=>(s.m[id]||0)<2); if(rem.length===0) s.step='res'; else { s.q=rem; s.idx=0; } }else s.idx++; }
            else { if(s.idx < s.st.questions.length-1) s.idx++; else s.step='res'; }
            s.lock=false; s.opt=null; render();
        }
        function renderRes(m) {
            m.innerHTML = '<div class="text-center py-10"><div class="text-5xl mb-4">🏆</div><h2 class="text-4xl font-black mb-10 uppercase tracking-tighter text-white">HOÀN TẤT</h2></div>';
            const hm = document.createElement('button'); hm.className="w-full py-5 glass text-white font-black rounded-3xl uppercase text-sm";
            hm.innerText = "QUAY LẠI DANH MỤC"; hm.onclick = goHome; m.appendChild(hm);
        }
        window.addEventListener('keydown', (e) => { if(e.key === 'Enter' && s.lock) next(); });
        render();
    </script>
</body>
</html>
