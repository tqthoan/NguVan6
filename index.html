        :root {
            --theme-bg: rgba(11, 61, 92, 0.05);
            --theme-r1: rgba(255, 191, 0, 0.2);
            --theme-r2: rgba(255, 191, 0, 0.35);
        }

        html, body {
            height: 100%; width: 100%;
            overflow: hidden; overscroll-behavior: none;
            background-color: #000; color: #fff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        /* Neuro-Mandala Background */
        .master-mandala-bg {
            position: fixed; top: 50%; left: 50%; translate: -50% -50%;
            width: 400vw; height: 400vw; z-index: -2; pointer-events: none;
            background-image: repeating-radial-gradient(
                circle at center,
                var(--theme-bg) 0, transparent 60px,
                var(--theme-r1) 60px, var(--theme-r2) 62px
            );
            animation: rotateMandala 300s linear infinite, breathMaster 18s ease-in-out infinite alternate;
            transition: background-image 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0.95;
            will-change: transform, opacity;
            transform: translateZ(0); /* Ép chạy bằng GPU chống nóng máy */
        }

        @keyframes rotateMandala { from { rotate: 0deg; } to { rotate: 360deg; } }
        @keyframes breathMaster { from { scale: 1; opacity: 0.6; } to { scale: 1.08; opacity: 1; } }

        .aurora-bg {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 50%, #050510 0%, #000 100%);
            transform: translateZ(0);
        }
        .blob {
            position: absolute; filter: blur(60px); opacity: 0.22; border-radius: 50%; /* Tối ưu độ mờ giảm tải CPU */
            animation: moveAurora 35s infinite alternate ease-in-out;
            will-change: transform;
            transform: translate3d(0,0,0);
        }
        .b1 { top: -10%; left: -10%; width: 70vw; height: 70vw; background: #20054d; }
        .b2 { bottom: -20%; right: -10%; width: 80vw; height: 80vw; background: #052a4d; }
        @keyframes moveAurora { 0% { transform: translate3d(0,0,0) scale(1); } 100% { transform: translate3d(15%, 12%, 0) scale(1.1); } }

        /* Card System */
        .flashcard-container {
            perspective: 2000px; 
            height: 72dvh; aspect-ratio: 3/4; max-width: 82vw; /* Giảm 70% kích thước, hiện nền Mandala xung quanh */
            margin: 0 auto; transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); position: relative;
            will-change: transform;
        }
        .flashcard-container.zoomed { max-width: 100vw; height: 85dvh; }
        
        .flashcard {
            position: relative; width: 100%; height: 100%;
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-style: preserve-3d; cursor: pointer;
        }
        .flashcard.is-flipped { transform: rotateY(180deg); }

        .flashcard-face {
            position: absolute; inset: 0; backface-visibility: hidden;
            border-radius: 1.8rem; display: flex; flex-direction: column; /* Phục hồi bo góc */
            align-items: center; padding: 1.5rem;
            background: linear-gradient(145deg, rgba(25,25,30,0.96) 0%, rgba(5,5,10,0.99) 100%);
            backdrop-filter: blur(35px); border: 2px solid var(--theme-r1); /* Phục hồi viền */
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            transition: border-color 0.5s ease;
            width: 100%; height: 100%;
        }
        .flashcard-back { transform: rotateY(180deg); }

        @media (min-width: 768px) {
            .flashcard-container { width: 85vw; max-width: 360px; height: auto; }
            .flashcard-container.zoomed { max-width: 480px; }
            .flashcard-face { box-shadow: 0 0 50px rgba(0,0,0,0.85); }
        }

        .item-mandala-aura {
            position: absolute; top: 50%; left: 50%; translate: -50% -50%;
            width: 155%; height: 155%; z-index: -1; pointer-events: none;
            background-image: repeating-radial-gradient(
                circle at center, transparent 0, transparent 15px,
                var(--theme-r1) 15px, var(--theme-r2) 16px
            );
            border-radius: 50%; animation: rotateMandala 60s linear infinite;
            opacity: 0.35; transition: all 0.8s ease;
        }
        .flashcard-container:hover .item-mandala-aura, .grid-card-wrapper:hover .item-mandala-aura { 
            opacity: 0.8; width: 165%; 
        }

        .safe-text-rendering {
            padding-bottom: 0.4em !important; line-height: 1.4 !important;
            overflow: visible !important; display: block; width: 100%;
        }

        .btn-glass {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(15px); transition: all 0.3s ease;
        }
        .btn-glass:hover {
            background: rgba(255,255,255,0.12); border-color: var(--theme-r1);
            color: var(--theme-r1); transform: translateY(-3px);
        }

        /* GRID VIEW FIX */
        .grid-card-wrapper {
            position: relative; 
            width: 100%; 
            max-width: min(340px, 90vw);
            aspect-ratio: 3/4;
            margin: 0 auto; 
            perspective: 1200px;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--theme-r1); border-radius: 10px; }

        const THEMES = {

        const playSpeech = (text) => {
            if (!text) return;
            window.speechSynthesis.cancel();

            window.speechSynthesis.speak(u);

        const compressImage = (base64Str, maxWidth = 600) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    if (width > maxWidth) {
                        height = Math.round((height * maxWidth) / width);
                        width = maxWidth;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.75));
                };
                img.src = base64Str;
            });
        };

        const FlashcardItem = memo(({ card, index, total, isGrid, isZoomed, isExported, aiImages, generating, onAction }) => {
            const [isFlipped, setIsFlipped] = useState(false);
            const startX = useRef(0);
            const isSwiping = useRef(false);

            const handleToggle = useCallback((e) => {
                if (isSwiping.current) return; // Chặn lật thẻ nếu đang thao tác vuốt
                setIsFlipped(prev => {
                    const next = !prev;
                    if (next) playSpeech(card.en);
                    return next;
                });
            }, [card.en]);

            useEffect(() => {
                if (isGrid) return;
                const handler = (e) => {
                    if (e.detail === index) handleToggle();
                };
                window.addEventListener('trigger-flip', handler);
                return () => window.removeEventListener('trigger-flip', handler);
            }, [index, isGrid, handleToggle]);

            // Bổ sung sự kiện Lật tất cả thẻ dành riêng cho chế độ Grid
            useEffect(() => {
                if (!isGrid) return;
                const handler = () => setIsFlipped(prev => !prev);
                window.addEventListener('trigger-flip-all', handler);
                return () => window.removeEventListener('trigger-flip-all', handler);
            }, [isGrid]);

            return (
                <div 
                    className={isGrid ? 'grid-card-wrapper' : `flashcard-container ${isZoomed ? 'zoomed' : ''}`}
                    onPointerDown={(e) => {
                        if (!isGrid) {
                            startX.current = e.clientX;
                            isSwiping.current = false;
                        }
                    }}
                    onPointerMove={(e) => {
                        if (!isGrid && startX.current) {
                            // Nếu di chuyển ngón tay quá 10px -> xác nhận đây là thao tác vuốt
                            if (Math.abs(e.clientX - startX.current) > 10) {
                                isSwiping.current = true;
                            }
                        }
                    }}
                    onPointerUp={(e) => {
                        if (isGrid) return;
                        const diff = startX.current - e.clientX;
                        if (Math.abs(diff) > 40) {
                            window.dispatchEvent(new CustomEvent('nav-slide', { detail: diff > 0 ? 1 : -1 }));

                        // Sau khi nhấc ngón tay, chờ 50ms mới tắt trạng thái vuốt để chặn click (lật)

                                        <h2 className="text-3xl sm:text-5xl font-bold mb-3 drop-shadow-2xl safe-text-rendering text-center tracking-wide">

                                    </div>

                            ) : (

                                    </div>
                                    <div className="h-32 flex items-center justify-center w-full z-[60]">
                                        <button onClick={(e) => { e.stopPropagation(); onAction(card); }} className="px-8 sm:px-10 py-4 sm:py-5 rounded-full bg-indigo-600/30 border border-indigo-500/40 text-[10px] sm:text-xs font-black uppercase tracking-[0.2em] text-white hover:bg-indigo-500/50 transition-all active:scale-95 flex items-center gap-2">
                                            {generating[card.id] ? (
                                                <><svg className="animate-spin w-4 h-4 text-amber-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Đang họa bối cảnh...</>

        const App = () => {
            const initial = window.APP_STATE || { cards: VOCAB_DATA, ai: {}, theme: 'tho', view: 'single' };
            const isExported = window.IS_EXPORTED === true;
            
            // XÁC ĐỊNH CHÍNH XÁC MÔI TRƯỜNG THIẾT BỊ NGAY TỪ ĐẦU (JS CẤP CAO)
            const initMobile = window.innerWidth < 768;
            const [isMobile, setIsMobile] = useState(initMobile);
            
            const [cards] = useState(initial.cards);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isZoomed, setIsZoomed] = useState(false);
            const [isFs, setIsFs] = useState(false);
            const [theme, setTheme] = useState(initial.theme);
            
            // Nếu là thiết bị di động, CHẶN vĩnh viễn ở trạng thái "single" (1 thẻ), bỏ qua setting cũ.
            const [viewMode, setViewMode] = useState(initMobile ? 'single' : initial.view);
            
            const [aiImages, setAiImages] = useState(initial.ai);
            const [generating, setGenerating] = useState({});
            const [isNavActive, setIsNavActive] = useState(true);
            const navTimeoutRef = useRef(null);

            // Xử lý khi kích thước màn hình bị xoay/thay đổi liên tục
            useEffect(() => {
                const checkMobile = () => {
                    const currentIsMobile = window.innerWidth < 768;
                    setIsMobile(currentIsMobile);
                    if (currentIsMobile && viewMode !== 'single') {
                        setViewMode('single'); // Cưỡng ép về 1 hình nếu resize sang giao diện mobile
                    }
                };
                window.addEventListener('resize', checkMobile);
                return () => window.removeEventListener('resize', checkMobile);
            }, [viewMode]);

            const navigate = useCallback((step) => {
                setCurrentIndex(prev => (prev + step + cards.length) % cards.length);
            }, [cards.length]);

            useEffect(() => {
                const resetNav = () => {
                    setIsNavActive(true);
                    if (navTimeoutRef.current) clearTimeout(navTimeoutRef.current);
                    navTimeoutRef.current = setTimeout(() => setIsNavActive(false), 2500);
                };
                window.addEventListener('mousemove', resetNav);
                window.addEventListener('touchmove', resetNav);
                window.addEventListener('click', resetNav);
                window.addEventListener('keydown', resetNav);
                resetNav();
                return () => {
                    window.removeEventListener('mousemove', resetNav);
                    window.removeEventListener('touchmove', resetNav);
                    window.removeEventListener('click', resetNav);
                    window.removeEventListener('keydown', resetNav);
                    if (navTimeoutRef.current) clearTimeout(navTimeoutRef.current);
                };
            }, []);

            useEffect(() => {
                const hFs = () => setIsFs(!!document.fullscreenElement);
                const hNav = (e) => navigate(e.detail);
                document.addEventListener('fullscreenchange', hFs);
                window.addEventListener('nav-slide', hNav);
                return () => {
                    document.removeEventListener('fullscreenchange', hFs);
                    window.removeEventListener('nav-slide', hNav);
                };
            }, [navigate]);

            useEffect(() => {
                if (viewMode !== 'single') return;
                const hKey = (e) => {
                    if (e.key === 'Enter' || e.key === 'ArrowRight') navigate(1);
                    else if (e.key === 'ArrowLeft') navigate(-1);
                };
                window.addEventListener('keydown', hKey);
                return () => window.removeEventListener('keydown', hKey);
            }, [viewMode, navigate]);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

            const handleAiGen = async (c, redo = false) => {
                if (aiImages[c.id] && !redo) return;
                setGenerating(p => ({...p, [c.id]: true}));
                const apiKey = "";
                const seed = Math.floor(Math.random() * 999999);
                const prompt = "Highly detailed educational visual illustration of a scene or object that represents " + c.en + ". 3D professional rendering, soft studio lighting, high resolution. CRITICAL: 100% TEXTLESS, NO letters, NO numbers, NO labels, NO words. Seed " + seed;
                try {
                    const r = await fetch('https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=' + apiKey, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            instances: { prompt },
                            parameters: { sampleCount: 1, aspectRatio: "3:4", negativePrompt: "text, letters, words, writing, typography, signature, numbers, logo, signs, font, watermark" }
                        })
                    });
                    const d = await r.json();
                    if(d.predictions && d.predictions[0]) {
                        const rawBase64 = 'data:image/png;base64,' + d.predictions[0].bytesBase64Encoded;
                        const compressed = await compressImage(rawBase64, 600); // Ép nén giảm dung lượng nhưng vẫn giữ độ nét
                        setAiImages(p => ({...p, [c.id]: compressed}));
                    }
                } catch (e) { console.error(e); }
                setGenerating(p => ({...p, [c.id]: false}));
            };

            const handleThemeCycle = useCallback(() => {
                const keys = Object.keys(THEMES);
                const currentIdx = keys.indexOf(theme);
                const nextTheme = keys[(currentIdx + 1) % keys.length];
                setTheme(nextTheme);
            }, [theme]);

            const exportDoc = () => {
                const css = document.getElementById('custom-css').textContent;
                const js = document.getElementById('react-app-code').textContent;
                const state = JSON.stringify({ cards, ai: aiImages, theme, view: viewMode }); // Loại bỏ biến offline cũ
                const so = "<script", sc = "</" + "script>";
                let h = '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>Cosmos Elite Offline</title>';
                h += so + '>window.IS_EXPORTED = true;' + sc; // Khóa cứng trạng thái xuất file
                h += so + ' id="app-state">window.APP_STATE = ' + state + ';' + sc;
                h += so + ' src="https://unpkg.com/react@18/umd/react.production.min.js">' + sc;
                h += so + ' src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js">' + sc;
                h += so + ' src="https://unpkg.com/@babel/standalone/babel.min.js">' + sc;
                h += so + ' src="https://cdn.tailwindcss.com">' + sc;
                h += so + ' src="https://unpkg.com/lucide@latest">' + sc + '<style id="custom-css">' + css + '</style></head><body><div id="root"></div>';
                h += so + ' id="react-app-code" type="text/babel">' + js + sc + '</body></html>';
                const b = new Blob([h], { type: 'text/html' });
                const u = URL.createObjectURL(b);
                const a = document.createElement('a'); a.href = u; a.download = "Cosmos_Elite_Study_Export.html"; a.click();
            };

            const themeSet = THEMES[theme];
            const themeStyle = { '--theme-bg': themeSet.bg, '--theme-r1': themeSet.r1, '--theme-r2': themeSet.r2 };

            return (
                <div className={'h-[100dvh] w-full overflow-hidden flex flex-col relative bg-black ' + (viewMode==='single'?'touch-none':'')} style={themeStyle}>
                    <div className="master-mandala-bg"></div>
                    <div className="aurora-bg"><div className="blob b1"></div><div className="blob b2"></div></div>
                    
                    {/* Xóa lớp nền (bg, border, shadow) của thanh công cụ trên Mobile để nút hòa vào vũ trụ */}
                    <div className="absolute top-4 sm:top-5 right-4 sm:right-5 z-[100] flex items-center gap-2 sm:gap-3 sm:bg-black/60 sm:p-2 sm:px-4 rounded-full sm:backdrop-blur-xl sm:border sm:border-white/10 sm:shadow-2xl">
                        
                        {/* Nút chuyển đổi Theme: Làm cực kỳ nhỏ (w-2.5) và mờ (opacity-15) để không gây chú ý */}
                        <button 
                            onClick={handleThemeCycle} 
                            className="w-2.5 h-2.5 sm:w-5 sm:h-5 rounded-full opacity-15 sm:opacity-30 hover:opacity-100 transition-all hover:scale-150 flex items-center justify-center relative cursor-pointer" 
                            style={{ backgroundColor: THEMES[theme].color }}
                            title={`Đổi hệ màu (Đang dùng: ${THEMES[theme].label})`}
                        ></button>

                        {/* KIẾM TRA IS_MOBILE CHUẨN JS: Ẩn vĩnh viễn các nút này trên điện thoại để loại bỏ mọi hiện tượng lấp ló */}
                        {!isMobile && (
                            <>
                                <div className="h-4 w-px bg-white/20 mx-1"></div>

                                {/* Nút lưới chỉ có trên máy tính */}
                                <button onClick={() => setViewMode(v => v==='single'?'grid':'single')} className="text-gray-400 hover:text-amber-400 p-1 transition-colors">
                                    <i data-lucide={viewMode==='single'?'layout-grid':'monitor'} className="w-4 h-4 sm:w-5 sm:h-5"></i>
                                </button>
                                
                                {/* Nút Xuất File HTML: Chỉ hiện trên PC và không hiện trong file của học sinh */}
                                {!isExported && (
                                    <button onClick={exportDoc} className="text-indigo-400 pl-3 sm:pl-4 border-l border-white/20 hover:text-indigo-200 transition-colors p-1" title="Xuất file HTML để gửi học sinh">
                                        <i data-lucide="download-cloud" className="w-4 h-4 sm:w-5 sm:h-5"></i>
                                    </button>
                                )}
                            </>
                        )}
                    </div>

                    {/* Thanh Điều Hướng Dạng Gương - CHỈ HIỆN TRÊN DESKTOP Ở CHẾ ĐỘ LƯỚI */}
                    {!isMobile && viewMode === 'grid' && (
                        <div className={`fixed bottom-6 right-6 sm:bottom-8 sm:right-8 z-[100] flex flex-col items-center gap-1.5 bg-white/10 backdrop-blur-md border border-white/20 p-1.5 rounded-full transition-opacity duration-700 ${isNavActive ? 'opacity-100' : 'opacity-0 pointer-events-none'} shadow-2xl`}>
                            <button onClick={() => document.getElementById('grid-scroll-container')?.scrollTo({top: 0, behavior: 'smooth'})} className="p-2 text-white/70 hover:text-amber-400 hover:bg-white/20 rounded-full active:scale-90 transition-all" title="Cuộn lên đầu">
                                <i data-lucide="chevron-up" className="w-5 h-5"></i>
                            </button>
                            <div className="w-3 h-px bg-white/20"></div>
                            <button onClick={() => {
                                const el = document.getElementById('grid-scroll-container');
                                if(el) el.scrollTo({top: (el.scrollHeight - el.clientHeight) / 2, behavior: 'smooth'});
                            }} className="p-2 text-white/70 hover:text-amber-400 hover:bg-white/20 rounded-full active:scale-90 transition-all" title="Cuộn đến giữa trang">
                                <i data-lucide="circle" className="w-3 h-3 fill-current opacity-70"></i>
                            </button>
                            <div className="w-3 h-px bg-white/20"></div>
                            <button onClick={() => {
                                const el = document.getElementById('grid-scroll-container');
                                if(el) el.scrollTo({top: el.scrollHeight, behavior: 'smooth'});
                            }} className="p-2 text-white/70 hover:text-amber-400 hover:bg-white/20 rounded-full active:scale-90 transition-all" title="Cuộn xuống cuối">
                                <i data-lucide="chevron-down" className="w-5 h-5"></i>
                            </button>
                        </div>
                    )}

                    {viewMode === 'single' ? (
                        <main className="flex-1 flex flex-col items-center justify-center p-0 sm:p-6 z-10 w-full h-full relative">
                            <FlashcardItem key={cards[currentIndex].id} card={cards[currentIndex]} index={currentIndex} total={cards.length} isGrid={false} isZoomed={isZoomed} isExported={isExported} aiImages={aiImages} generating={generating} onAction={handleAiGen} />
                            
                            {/* Dàn nút điều khiển (Zoom, Next, Prev, Fullscreen) - CHỈ HIỆN Ở MÁY TÍNH VÀ HOÀN TOÀN BỊ XÓA BỎ TRÊN MOBILE */}
                            {!isMobile && (
                                <div className="flex items-center justify-center gap-6 mt-12 z-20">
                                    <button onClick={() => !document.fullscreenElement ? document.documentElement.requestFullscreen().catch(()=>{}) : document.exitFullscreen()} className="btn-glass p-4 rounded-full"><i data-lucide={isFs ? "minimize" : "maximize"} className="w-6 h-6"></i></button>
                                    <button onClick={() => navigate(-1)} className="btn-glass p-6 rounded-full active:scale-90 transition-transform"><i data-lucide="chevron-left" className="w-7 h-7"></i></button>
                                    <button onClick={() => navigate(1)} className="btn-glass p-6 rounded-full active:scale-90 transition-transform"><i data-lucide="chevron-right" className="w-7 h-7"></i></button>
                                    <button onClick={() => setIsZoomed(!isZoomed)} className="btn-glass p-3.5 rounded-full"><i data-lucide={isZoomed ? "zoom-out" : "zoom-in"} className="w-5 h-5"></i></button>
                                </div>
                            )}
                        </main>
                    ) : (
                        <main id="grid-scroll-container" className="flex-1 w-full h-full overflow-x-hidden overflow-y-auto z-10 scroll-smooth">
                            <div className="w-full max-w-[1450px] mx-auto px-4 sm:px-8 lg:px-12 pt-28 sm:pt-32 pb-40">
                                <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-x-8 gap-y-24 sm:gap-y-36 justify-items-center">
                                    {cards.map((c, idx) => (
                                        <FlashcardItem key={c.id} card={c} index={idx} total={cards.length} isGrid={true} isExported={isExported} aiImages={aiImages} generating={generating} onAction={handleAiGen} />
                                    ))}
                                </div>
                            </div>
                        </main>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script></body></html>
