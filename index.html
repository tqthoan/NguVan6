uộc","Chủ mưu"],"answer":1,"explanation":"Phước vừa kích động bạo lực nhưng lại rủ đi chơi đầu tiên."},{"q":"Tình huống truyện mang sắc thái gì?","options":["Bi tráng","Kì ảo","Bất ngờ, hóm hỉnh, sâu sắc","Bế tắc"],"answer":2,"explanation":"Nút thắt cởi bằng tri thức và vé xem phim đầy thú vị."},{"q":"Việc lựa chọn ngôi kể 'tôi' mang lại tác dụng?","options":["Biết nghĩ cả 3","Khách quan","Bộc lộ chân thực suy diễn bồng bột và hối lỗi","Sử thi"],"answer":2,"explanation":"Hóa thân vào tâm lý học trò để bài học phục thiện thấm thía."},{"q":"Tương phản giữa 'ná thun' và 'sách luật' ẩn dụ?","options":["Đồ chơi","Bạo lực đối lập văn minh thiện chí","Lười học","Giàu nghèo"],"answer":1,"explanation":"Sự chiến thắng của tri thức trước trả đũa nguyên thủy."},{"q":"Hành động 'thò tay vào túi quần' của Nghi nhằm?","options":["Đẩy kịch tính, tạo ảo giác rút vũ khí","Tìm tiền","Thói quen xấu","Kéo dài"],"answer":0,"explanation":"Thủ pháp tạo bước ngoặt xuất sắc bẫy tâm lý người đọc."},{"q":"Vì sao 'tôi' không trả lời ngay mà lại 'ngơ ngác'?","options":["Phim không hay","Đấu tranh sĩ diện","Bị 'đứng hình' trước thiện chí rẽ nhánh","Chờ lệnh"],"answer":2,"explanation":"Cơn sốc tâm lý tích cực làm tê liệt ý định thù hằn."},{"q":"Ngôn ngữ dùng các từ 'nghen mày', 'chớ', 'tao', 'mày'?","options":["Giảm giá trị","Đậm khẩu ngữ học trò, gần gũi, hóm hỉnh","Thiếu giáo dục","Khó hiểu"],"answer":1,"explanation":"Tạo vẻ hồn nhiên tinh nghịch của tuổi thơ."},{"q":"Nếu đánh nhau thực sự xảy ra rồi mới hòa giải?","options":["Hay hơn","Phá vỡ thông điệp ngăn chặn bạo lực từ trứng nước","Mạnh mẽ hơn","Không đổi"],"answer":1,"explanation":"Tổn thương làm sự hòa giải mất đi tính bất ngờ và trọn vẹn."},{"q":"Chi tiết 'Phước lén giấu ná thun' chứng minh tâm lý?","options":["Thích giấu đồ","Nhát gan","Bạo lực bốc đồng tự triệt tiêu trước tình yêu thương","Hay quên"],"answer":2,"explanation":"Sự thức tỉnh của phần thiện trước sự tử tế của bạn."},{"q":"Tại sao không để Nghi kể chuyện?","options":["Khôn ,"explanation":"Nâng bi kịch trẻ thơ thành nỗi đau nhân cách."},{"q":"Trạng từ 'chợt' trong câu kết 'chợt thấy nhẹ nhõm'?","options":["Rũ bỏ gánh nặng ngay khi cái thiện được thực thi","Nhiệt độ","Thất thường","Buồn bã"],"answer":0,"explanation":"Sự thanh tẩy tâm hồn diễn ra trọn vẹn diệu kỳ."},{"q":"Biểu tượng 'đám gai mác hủ' mang ẩn dụ?","options":["Thời tiết","Cái ác","Lưới gai ích kỷ kìm hãm lòng nhân hậu","Lao động"],"answer":2,"explanation":"Vừa là cạm bẫy vật lý vừa là ẩn dụ thói vô tâm."},{"q":"Cái chết của chim non cảnh báo gì dưới góc nhìn sinh thái?","options":["Người không thắng trời","Vô dụng","Tư duy lấy người làm trung tâm đoạt mạng muôn loài","Nuôi chim lồng"],"answer":2,"explanation":"Sự can thiệp thô bạo vào tự nhiên dẫn đến bi kịch tinh thần."},{"q":"Lời 'Mé mày đang đợi đấy!' thể hiện triết lý?","options":["Tình mẫu tử vật thiêng liêng đáng tôn trọng","Đừng bay gần nhà","Sợ bị đánh","Có ích"],"answer":0,"explanation":"Sự nhân hóa vật vào hệ quy chiếu mẫu tử."},{"q":"Dế Vần phá vỡ khuôn mẫu truyền mẫu nào về người cha?","options":["Vắng nhà","Người cha hoàn hảo, thay bằng người dám nhận sai","Lao động","Độc ác"],"answer":1,"explanation":"Người cha rất 'Người' - vĩ đại ở tinh thần phục thiện."},{"q":"Hình ảnh 'ánh nắng thu' ở cuối mang dư âm?","options":["Sắp có bão","Chói lòa","Sự thanh tẩy, chữa lành tâm hồn và tươi sáng","Giờ học"],"answer":2,"explanation":"Tạo cái kết viên mãn, lan tỏa tính nhân văn ấm áp."},{"q":"Tư tưởng chung của cả 3 tác phẩm học kỳ 2?","options":["Tri thức","Cạnh tranh","Lòng trắc ẩn bao dung là chìa khóa kết nối vạn vật","Sai lầm"],"answer":2,"explanation":"Hòa giải lỗi lầm bằng tình thương là sợi dây xuyên suốt."}]}];

            m.appendChild(grid);
        }
        function renderQuiz(m) {
            const qS = s.rev ? s.q : s.st.questions; const qI = s.rev ? s.q[s.idx] : s.idx; const qD = s.st.questions[qI];
            m.innerHTML = `<div class="mb-2 px-1 flex flex-col gap-1.5"><div class="flex justify-between items-center text-[10px] font-bold text-slate-600 uppercase mb-1"><span>${s.rev?'MASTERY CHALLENGE ACTIVE':'NORMAL PROGRESSION'}</span><span>Câu ${s.idx+1} / ${qS.length}</span></div>
                <div class="h-1 bg-slate-800 rounded-full overflow-hidden shadow-inner"><div class="h-full bg-gradient-to-r from-sky-600 to-sky-400 transition-all duration-700" style="width:${(s.idx+1)/qS.length*100}%"></div></div></div>`;
            if(s.rev) {
                const streak = s.m[qI] || 0;
                const tracker = document.createElement('div'); tracker.className = "flex gap-3 mb-3 items-center text-[10px] font-bold text-slate-400 uppercase bg-slate-900/50 p-1.5 rounded-xl w-fit mx-1 shrink-0";
                tracker.innerHTML = `<div class="mastery-dot ${streak>=1?'on':''}"></div><div class="mastery-dot ${streak>=2?'on':''}"></div> <span class="text-sky-400 ml-1 font-black leading-none uppercase">ĐÚNG 2 LẦN LIÊN TIẾP ĐỂ MASTER</span>`;
                m.appendChild(tracker);
            }
            const qT = document.createElement('div'); qT.className = "text-xl md:text-3xl font-black mb-4 text-white leading-tight tracking-tight drop-shadow-md text-left px-1 text-pretty"; qT.innerText = qD.q; m.appendChild(qT);
            const optGrid = document.createElement('div'); optGrid.className = "grid gap-4 sm:gap-2.5";
            qD.options.forEach((o, i) => {
                const b = document.createElement('button'); b.disabled = s.lock;
                let cls = "w-full text-left py-[18px] px-6 sm:py-5 sm:px-8 rounded-2xl border-2 transition-all flex items-center justify-between text-lg md:text-2xl font-bold mb-0 leading-tight ";
                if(!s.lock) cls += "border-slate-800 bg-slate-900/30 hover:border-sky-500/50 hover:bg-slate-800/60 active:scale-[0.98]";
                else { if(i===qD.answer) cls+="border-emerald-500 bg-emerald-500/10 text-emerald-100 shadow-[0_0_20px_rgba(16,185,129,0.1)]";
                       else if(i===s.opt) cls+="border-rose-500 bg-rose-500/10 text-rose-100 shadow-[0_0_20px_rgba(244,63,94,0.1)] line-through decoration-black decoration-2";
                       else cls+="border-slate-900 opacity-20"; }
                b.className = cls; b.innerHTML = `<span class="flex-1 flex items-baseline text-left text-pretty leading-tight"><span class="mr-6 text-slate-600 font-black font-mono text-base uppercase shrink-0">${String.fromCharCode(65+i)}</span>${o}</span>`;
                b.onclick = () => { s.lock=true; s.opt=i; if(i===qD.answer){ s.c++; if(s.rev) s.m[qI]=(s.m[qI]||0)+1; }else{ s.w++; if(!s.rev) s.wr.add(qI); else s.m[qI]=0; } render(); };
                m.appendChild(b);
            });
            if(s.lock) {
                const ex = document.createElement('div'); ex.className="mt-6 p-6 sm:p-10 bg-sky-500/5 border-l-4 border-amber-500 rounded-2xl text-xl md:text-3xl text-amber-200 italic mb-4 shadow-inner ring-1 ring-sky-500/10";
                ex.innerHTML = `<div class="flex items-center gap-2 mb-1 text-[10px] font-black text-sky-400 uppercase tracking-[0.2em] leading-none">GIẢI THÍCH</div><p class="leading-snug text-pretty font-bold">${qD.explanation}</p>`;
                m.appendChild(ex);
                const n = document.createElement('button'); n.className="w-full mt-4 py-4 sm:py-6 bg-slate-800 hover:bg-slate-700 text-sky-400 font-black rounded-3xl border border-slate-700 uppercase text-lg transition-all active:scale-95";
                n.innerText = s.idx < qS.length-1 ? "Tiếp theo (Enter)" : "Xem kết quả (Enter)";
                n.onclick = next; m.appendChild(n);
            }
        }
        function next() {
            if(s.rev) { if(s.idx >= s.q.length-1){ const rem = s.q.filter(id=>(s.m[id]||0)<2); if(rem.length===0) s.step='res'; else { s.q=rem; s.idx=0; } }else s.idx++; }
            else { if(s.idx < s.st.questions.length-1) s.idx++; else s.step='res'; }
            s.lock=false; s.opt=null; render();
        }
        function renderRes(m) {
            m.innerHTML = '<div class="text-center py-6 text-white text-pretty leading-none"><div class="text-7xl mb-8">🏆</div><h2 class="text-4xl font-black mb-8 uppercase tracking-tighter">LUYỆN TẬP HOÀN TẤT</h2></div>';
            if(s.wr.size > 0 && !s.rev) {
                const rb = document.createElement('button'); rb.className="w-full py-6 bg-amber-600 hover:bg-amber-500 text-[#020617] rounded-3xl font-black text-xl uppercase mb-4 shadow-xl";
                rb.innerText = "Luyện Mastery (" + s.wr.size + " câu sai)"; rb.onclick = startRev; m.appendChild(rb);
            }
            const hm = document.createElement('button'); hm.className="w-full py-5 glass text-white font-black rounded-3xl uppercase text-lg tracking-widest shadow-2xl";
            hm.innerText = "VỀ DANH MỤC"; hm.onclick = goHome; m.appendChild(hm);
        }
        window.addEventListener('keydown', (e) => { if(e.key === 'Enter' && s.lock) next(); });
        render();
    </script>
</body>
</html>
